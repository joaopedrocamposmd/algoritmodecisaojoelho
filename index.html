  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #f4f7f6;
      --s1: rgba(255, 255, 255, 0.70);
      --s2: rgba(255, 255, 255, 0.50);
      --s3: rgba(255, 255, 255, 0.85);
      --s4: #e8eeec;
      --bdr: rgba(59, 135, 123, 0.15);
      --bdr2: rgba(59, 135, 123, 0.30);
      --t1: #2c3e50;
      --t2: #445566;
      --t3: #6b8299;
      --t4: #8fa3b8;
      --green: #2ecc71;
      --green-bg: rgba(46, 204, 113, .08);
      --green-bdr: rgba(46, 204, 113, .25);
      --blue: #3b877b;
      --blue-bg: rgba(59, 135, 123, .08);
      --blue-bdr: rgba(59, 135, 123, .25);
      --amber: #e67e22;
      --amber-bg: rgba(230, 126, 34, .07);
      --amber-bdr: rgba(230, 126, 34, .22);
      --red: #e74c3c;
      --red-bg: rgba(231, 76, 60, .07);
      --red-bdr: rgba(231, 76, 60, .22);
      --purple: #8e44ad;
      --purple-bg: rgba(142, 68, 173, .06);
      --purple-bdr: rgba(142, 68, 173, .20);
      --cyan: #2a6058;
      --cyan-bg: rgba(42, 96, 88, .06);
      --cyan-bdr: rgba(42, 96, 88, .20);
      --teal: #3b877b;
      --teal-bg: rgba(59, 135, 123, .07);
      --teal-bdr: rgba(59, 135, 123, .22);
      --r: 8px;
      --r2: 12px;
      --blur: 12px;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'IBM Plex Mono', 'Roboto Mono', monospace
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--t1);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(59, 135, 123, .06), transparent 70%);
      pointer-events: none;
      z-index: 0
    }

    .wrap {
      max-width: 1020px;
      margin: 0 auto;
      padding: 28px 18px 120px;
      position: relative;
      z-index: 1
    }

    header {
      text-align: center;
      padding: 36px 0 20px
    }

    .sys-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      background: rgba(59, 135, 123, .08);
      border: 1px solid rgba(59, 135, 123, .20);
      border-radius: 99px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--teal);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 14px
    }

    .sys-badge i {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green)
    }

    h1 {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.2;
      margin-bottom: 6px;
      color: var(--t1)
    }

    .sub {
      font-size: 13px;
      color: var(--t3);
      max-width: 640px;
      margin: 0 auto;
      font-weight: 300
    }

    .sticky-nav {
      position: relative;
      top: auto;
      z-index: 100;
      background: transparent;
      border-bottom: none;
      padding: 8px 0;
      margin: 0;
      display: none;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap
    }

    .sticky-nav.vis {
      display: flex
    }

    .sticky-nav button {
      padding: 5px 14px;
      border-radius: 8px;
      border: 1px solid var(--bdr);
      background: var(--s2);
      color: var(--t3);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: .15s;
      white-space: nowrap
    }

    .sticky-nav button:hover {
      border-color: var(--teal);
      color: var(--teal)
    }

    .sticky-nav .nav-label {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--teal);
      flex: 1
    }

    .path-sel {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin: 16px 0 24px
    }

    .path-card {
      padding: 20px;
      background: var(--s1);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--bdr);
      border-radius: var(--r2);
      cursor: pointer;
      transition: .2s;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, .05)
    }

    .path-card:hover {
      border-color: var(--bdr2);
      background: var(--s3)
    }

    .path-card.active {
      border-color: var(--teal);
      background: var(--blue-bg)
    }

    .path-card.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--teal)
    }

    .path-icon {
      font-size: 26px;
      margin-bottom: 8px
    }

    .path-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px
    }

    .path-desc {
      font-size: 11.5px;
      color: var(--t3);
      line-height: 1.5
    }

    .path-card.active .path-title {
      color: var(--teal)
    }

    @media(max-width:600px) {
      .path-sel {
        grid-template-columns: 1fr
      }
    }

    /* Module selection cards */
    .mod-sel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 8px 0 24px
    }

    .ctx-summary {
      padding: 14px 16px;
      background: var(--s2);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--bdr);
      border-radius: var(--r2);
      margin-bottom: 16px
    }

    .ctx-summary-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--t3);
      margin-bottom: 8px
    }

    .ctx-summary-body {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      font-size: 12px;
      color: var(--t2);
      line-height: 1.6
    }

    .ctx-item strong {
      color: var(--t1)
    }

    .ctx-derive-label {
      font-size: 12px;
      color: var(--teal);
      font-weight: 600;
      margin: 4px 0 8px 0;
      min-height: 18px
    }

    .bmi-tabs {
      display: flex;
      gap: 0;
      margin: 10px 0 12px;
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      overflow: hidden
    }

    .bmi-tab {
      flex: 1;
      padding: 7px 10px;
      font-size: 12px;
      background: var(--s1);
      border: none;
      color: var(--t2);
      cursor: pointer;
      transition: .15s
    }

    .bmi-tab.active {
      background: var(--teal);
      color: #fff;
      font-weight: 600
    }

    .bmi-tab:hover:not(.active) {
      background: var(--s2)
    }

    .ctx-bmi-result {
      font-size: 13px;
      font-weight: 600;
      color: var(--teal);
      margin: 6px 0 4px;
      padding: 6px 10px;
      background: var(--s2);
      border-radius: var(--r);
      border: 1px solid var(--bdr)
    }

    .mod-card {
      padding: 18px;
      background: var(--s1);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--bdr);
      border-radius: var(--r2);
      cursor: pointer;
      transition: .2s;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, .05)
    }

    .mod-card:hover {
      border-color: var(--bdr2);
      background: var(--s3)
    }

    .mod-card.disabled {
      opacity: .4;
      cursor: not-allowed;
      pointer-events: none
    }

    .mod-icon {
      font-size: 24px;
      margin-bottom: 6px
    }

    .mod-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 3px
    }

    .mod-desc {
      font-size: 11px;
      color: var(--t3);
      line-height: 1.5
    }

    @media(max-width:600px) {
      .mod-sel {
        grid-template-columns: 1fr
      }
    }

    /* Steps */
    .step {
      background: var(--s1);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--bdr);
      border-radius: var(--r2);
      overflow: hidden;
      animation: fadeUp .3s ease both;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, .05)
    }

    .step+.step {
      margin-top: 10px
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .step-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      background: var(--s2);
      border-bottom: 1px solid var(--bdr)
    }

    .sn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      background: var(--s4);
      color: var(--t3)
    }

    .sn.on {
      background: var(--teal);
      color: #fff
    }

    .sn.ok {
      background: var(--green);
      color: #fff
    }

    .st {
      font-size: 13px;
      font-weight: 600;
      flex: 1
    }

    .sv {
      font-size: 11px;
      color: var(--t3);
      max-width: 260px;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .s-edit {
      background: none;
      border: 1px solid var(--bdr);
      color: var(--t4);
      padding: 2px 9px;
      border-radius: 6px;
      font-size: 10px;
      cursor: pointer;
      font-family: inherit;
      margin-left: 5px;
      transition: .15s
    }

    .s-edit:hover {
      border-color: var(--teal);
      color: var(--t2)
    }

    .step-body {
      padding: 16px
    }

    .q {
      font-size: 13.5px;
      color: var(--t2);
      margin-bottom: 10px
    }

    .opts {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .opt {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 13px;
      background: var(--s2);
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      cursor: pointer;
      transition: .15s
    }

    .opt:hover {
      border-color: var(--bdr2);
      background: var(--s3)
    }

    .opt.sel {
      border-color: var(--teal);
      background: var(--blue-bg)
    }

    .orad {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 2px solid var(--t4);
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .opt.sel .orad {
      border-color: var(--teal);
      background: var(--teal)
    }

    .opt.sel .orad::after {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #fff
    }

    .ol {
      font-size: 12.5px;
      font-weight: 600
    }

    .od {
      font-size: 11px;
      color: var(--t3);
      line-height: 1.5;
      margin-top: 1px
    }

    .mopt {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 13px;
      background: var(--s2);
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      cursor: pointer;
      transition: .15s
    }

    .mopt:hover {
      border-color: var(--bdr2);
      background: var(--s3)
    }

    .mopt.sel {
      border-color: var(--teal);
      background: var(--blue-bg)
    }

    .mchk {
      width: 15px;
      height: 15px;
      border-radius: 4px;
      border: 2px solid var(--t4);
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: transparent
    }

    .mopt.sel .mchk {
      border-color: var(--teal);
      background: var(--teal);
      color: #fff
    }

    .mnext {
      margin-top: 8px;
      text-align: right
    }

    .mnext button {
      padding: 7px 20px;
      border-radius: 8px;
      border: none;
      background: var(--teal);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: .2s;
      box-shadow: 0 2px 8px rgba(59, 135, 123, .20)
    }

    .mnext button:hover {
      background: var(--cyan);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 135, 123, .25)
    }

    .mnext button:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none
    }

    .cref {
      margin: 6px 0 8px;
      padding: 7px 11px;
      background: rgba(59, 135, 123, .04);
      border: 1px solid rgba(59, 135, 123, .12);
      border-radius: 8px;
      font-size: 11px;
      color: var(--t3);
      line-height: 1.6
    }

    .cref strong {
      color: var(--teal);
      font-weight: 600
    }

    /* Results */
    .result {
      background: var(--s1);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--bdr);
      border-radius: var(--r2);
      padding: 20px;
      margin-top: 12px;
      animation: fadeUp .35s ease both;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, .05)
    }

    .result.repair {
      border-color: var(--green-bdr);
      background: var(--green-bg)
    }

    .result.hto {
      border-color: var(--blue-bdr);
      background: var(--blue-bg)
    }

    .result.puc {

    }

    .result.ptj {

    .result.conserv {

    .result.combo {

    .result.exams {

    .result.pf_mpfl {

    .rtag.bone_redflag {
      background: var(--red);
      color: #fff
    }

    .rtag.bone_redirect {
      background: var(--purple);
      color: #fff
    }

    .rh {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 10px
    }

    .rb {
      font-size: 12.5px;
      color: var(--t2);
      line-height: 1.7
    }

    .rb ul {
      padding-left: 16px;
      margin: 6px 0
    }

    .rb li {
      margin-bottom: 3px
    }

    .rb li.warn {
      color: var(--amber);
      font-weight: 600
    }

    .rb .note {
      margin-top: 10px;
      padding: 8px 10px;
      background: rgba(59, 135, 123, .04);
      border-radius: 6px;
      font-size: 11px;
      color: var(--t3);
      border: 1px solid var(--bdr)
    }

    .rrefs {
      margin-top: 10px;
      font-size: 11px;
      color: var(--t3)
    }

    .rrefs summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--t2)
    }

    .rrefs p {
      margin-top: 4px;
      line-height: 1.6
    }

    .ref-link {
      color: var(--teal);
      text-decoration: none;
      border-bottom: 1px dotted rgba(59, 135, 123, .35);
      transition: color .15s, border-color .15s;
      font-weight: 500
    }

    .ref-link:hover {
      color: var(--cyan);
      border-bottom-color: var(--cyan)
    }

    /* DDx */
    .ddx {
      padding: 14px;
      background: var(--s2);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      margin-bottom: 8px
    }

    .ddx-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px
    }

    .ddx-name {
      font-size: 13px;
      font-weight: 700
    }

    .ddx-prob {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap
    }

    .ddx-prob.likely {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green-bdr)
    }

    .ddx-prob.possible {
      background: var(--amber-bg);
      color: var(--amber);
      border: 1px solid var(--amber-bdr)
    }

    .ddx-keys {
      font-size: 11px;
      color: var(--t3);
      line-height: 1.5;
      margin-bottom: 4px
    }

    .ddx-exam {
      font-size: 11px;
      color: var(--t2)
    }

    .ddx-exam strong {
      color: var(--teal)
    }

    .exam-panel {
      background: var(--s2);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--blue-bdr);
      border-radius: var(--r2);
      padding: 16px;
      margin-top: 12px
    }

    .exam-cat-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--teal);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .8px
    }

    .exam-item {
      display: flex;
      gap: 8px;
      padding: 6px 0;
      font-size: 12px;
      border-bottom: 1px solid var(--bdr)
    }

    .exam-item:last-child {
      border-bottom: none
    }

    .exam-item .ei-name {
      font-weight: 600;
      min-width: 160px;
      flex-shrink: 0
    }

    .exam-item .ei-why {
      color: var(--t3);
      flex: 1
    }

    /* PROMs */
    .prom-form {
      background: var(--s2);
      border: 1px solid var(--purple-bdr);
      border-radius: var(--r2);
      padding: 16px;
      margin-top: 8px
    }

    .prom-form h3 {
      font-size: 13px;
      font-weight: 700;
      color: var(--purple);
      margin-bottom: 10px
    }

    .prom-q {
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--bdr)
    }

    .prom-q:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0
    }

    .prom-q-text {
      font-size: 12px;
      margin-bottom: 6px;
      color: var(--t2)
    }

    .prom-opts {
      display: flex;
      gap: 4px;
      flex-wrap: wrap
    }

    .prom-opt {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--bdr);
      background: var(--s3);
      font-size: 11px;
      cursor: pointer;
      transition: .15s;
      color: var(--t3)
    }

    .prom-opt:hover {
      border-color: var(--bdr2);
      color: var(--t2)
    }

    .prom-opt.sel {
      border-color: var(--purple);
      background: var(--purple-bg);
      color: var(--purple);
      font-weight: 600
    }

    .prom-score {
      margin-top: 12px;
      padding: 10px;
      background: rgba(142, 68, 173, .06);
      border: 1px solid var(--purple-bdr);
      border-radius: 8px;
      font-size: 12px;
      text-align: center
    }

    .prom-score .score-num {
      font-size: 24px;
      font-weight: 700;
      color: var(--purple);
      font-family: var(--font-sans)
    }

    /* Numeric inputs */
    .num-input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap
    }

    .num-input-row label {
      font-size: 12px;
      font-weight: 600;
      min-width: 80px
    }

    .num-input-row input {
      width: 75px;
      padding: 6px 8px;
      background: var(--s3);
      border: 1px solid var(--bdr);
      border-radius: 6px;
      color: var(--t1);
      font-family: var(--font-mono);
      font-size: 13px;
      text-align: center
    }

    .num-input-row input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(59, 135, 123, .12)
    }

    .num-input-row .unit {
      font-size: 11px;
      color: var(--t3)
    }

    .num-input-row .hint {
      font-size: 10px;
      color: var(--t4)
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0
    }

    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield
    }

    /* Constraint boxes (jointline) */
    .constraint-box {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px
    }

    .constraint-box.cck {
      background: rgba(230, 126, 34, .08);
      border: 1px solid rgba(230, 126, 34, .25)
    }

    .constraint-box.hinge {
      background: rgba(231, 76, 60, .08);
      border: 1px solid rgba(231, 76, 60, .25)
    }

    .constraint-box.crps {
      background: rgba(46, 204, 113, .06);
      border: 1px solid rgba(46, 204, 113, .2)
    }

    .constraint-box ul {
      margin: 4px 0 4px 16px;
      padding: 0
    }

    .constraint-box li {
      margin: 2px 0
    }

    .constraint-action {
      margin-top: 6px;
      padding: 6px 8px;
      background: rgba(255, 255, 255, .04);
      border-radius: 4px;
      font-weight: 600
    }

    .uka-bearing {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(59, 135, 123, .06);
      border: 1px solid rgba(59, 135, 123, .2);
      font-size: 12px
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 200;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--bdr);
      background: var(--s1);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--t3);
      transition: .2s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08)
    }

    .theme-toggle:hover {
      border-color: var(--teal);
      color: var(--teal);
      transform: scale(1.08)
    }

    /* Dark theme */
    [data-theme="dark"] {
      --bg: #0f1419;
      --s1: rgba(22, 28, 36, 0.85);
      --s2: rgba(28, 36, 46, 0.70);
      --s3: rgba(34, 42, 54, 0.90);
      --s4: #1e2a38;
      --bdr: rgba(59, 135, 123, 0.18);
      --bdr2: rgba(59, 135, 123, 0.35);
      --t1: #e0e6ed;
      --t2: #a0b0c4;
      --t3: #6b8299;
      --t4: #4a6078;
      --green: #2ecc71;
      --green-bg: rgba(46, 204, 113, .10);
      --green-bdr: rgba(46, 204, 113, .28);
      --blue: #4a9e90;
      --blue-bg: rgba(59, 135, 123, .12);
      --blue-bdr: rgba(59, 135, 123, .30);
      --amber: #e67e22;
      --amber-bg: rgba(230, 126, 34, .10);
      --amber-bdr: rgba(230, 126, 34, .28);
      --red: #e74c3c;
      --red-bg: rgba(231, 76, 60, .10);
      --red-bdr: rgba(231, 76, 60, .28);
      --purple: #a56cc1;
      --purple-bg: rgba(142, 68, 173, .10);
      --purple-bdr: rgba(142, 68, 173, .25);
      --cyan: #2a6058;
      --cyan-bg: rgba(42, 96, 88, .10);
      --cyan-bdr: rgba(42, 96, 88, .25);
      --teal: #4a9e90;
      --teal-bg: rgba(59, 135, 123, .10);
      --teal-bdr: rgba(59, 135, 123, .28)
    }

    [data-theme="dark"] body::after {
      background: radial-gradient(ellipse at 50% 0%, rgba(59, 135, 123, .08), transparent 70%)
    }

    [data-theme="dark"] .theme-toggle {
      box-shadow: 0 2px 8px rgba(0, 0, 0, .25)
    }

    /* Footer */
    .footer {
      margin-top: 28px;
      padding: 14px 16px;
      background: var(--s1);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--bdr);
      border-radius: var(--r2);
      font-size: 10.5px;
      color: var(--t4);
      line-height: 1.6
    }

    .footer strong {
      color: var(--t3)
    }

    @media(max-width:600px) {
      .step-head {
        padding: 10px 12px
      }

      .step-body {
        padding: 12px
      }

      .result {
        padding: 14px
      }

      .exam-item {
        flex-direction: column
      }

      .exam-item .ei-name {
        min-width: auto
      }

      .num-input-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px
      }
    }

    /* ── ROM Goniometer ── */
    .rom-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: rgba(59, 135, 123, .04);
      border-radius: var(--r);
      border: 1px solid var(--bdr);
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: default
    }

    .rom-wrap svg {
      width: 100%;
      height: 100%;
      display: block
    }

    .rom-readouts {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap
    }

    .rom-ro {
      flex: 1;
      min-width: 80px;
      padding: 8px 10px;
      background: var(--s2);
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      text-align: center
    }

    .rom-ro-l {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .7px;
      margin-bottom: 3px
    }

    .rom-ro-v {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700
    }

    .rom-ro.ext .rom-ro-l,
    .rom-ro.ext .rom-ro-v {
      color: #e67e22
    }

    .rom-ro.flex .rom-ro-l,
    .rom-ro.flex .rom-ro-v {
      color: var(--teal)
    }

    .rom-ro.arc .rom-ro-l {
      color: var(--t3)
    }

    .rom-ro.arc .rom-ro-v {
      color: var(--t1)
    }

    .rom-inputs {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
      flex-wrap: wrap
    }

    .rom-ig {
      display: flex;
      align-items: center;
      gap: 4px
    }

    .rom-ig label {
      font-size: 10px;
      font-weight: 600;
      color: var(--t3);
      min-width: 55px
    }

    .rom-ig input {
      width: 60px;
      padding: 4px 6px;
      font-family: var(--font-mono);
      font-size: 12px;
      text-align: center;
      background: var(--s3);
      border: 1px solid var(--bdr);
      border-radius: 5px;
      color: var(--t1);
      -moz-appearance: textfield;
      appearance: textfield
    }

    .rom-ig input::-webkit-inner-spin-button,
    .rom-ig input::-webkit-outer-spin-button {
      -webkit-appearance: none
    }

    .rom-ig input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 2px rgba(59, 135, 123, .12)
    }

    .rom-ig .u {
      font-size: 9px;
      color: var(--t4)
    }

    .rom-note {
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: var(--r);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.5;
      border: 1px solid var(--bdr);
      background: var(--s2);
      color: var(--t2)
    }

    .rom-note.normal {
      border-color: rgba(46, 204, 113, .25);
      background: rgba(46, 204, 113, .06);
      color: #27ae60
    }

    .rom-note.mild {
      border-color: rgba(230, 126, 34, .25);
      background: rgba(230, 126, 34, .06);
      color: #d35400
    }

    .rom-note.moderate {
      border-color: rgba(230, 126, 34, .30);
      background: rgba(230, 126, 34, .08);
      color: #d35400
    }

    .rom-note.severe {
      border-color: rgba(231, 76, 60, .25);
      background: rgba(231, 76, 60, .06);
      color: #c0392b
    }

    /* Prosthetic pathway */
    .prosth-lab {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin: 10px 0
    }

    .prosth-field {
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    .prosth-field label {
      font-size: 11px;
      font-weight: 600;
      color: var(--t3)
    }

    .prosth-field label .req {
      color: var(--red)
    }

    .prosth-field input {
      padding: 7px 10px;
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      background: var(--s2);
      color: var(--t1);
      font-family: var(--font-mono);
      font-size: 13px;
      width: 100%;
      -moz-appearance: textfield
    }

    .prosth-field input:focus {
      border-color: var(--teal);
      outline: none;
      box-shadow: 0 0 0 2px rgba(59, 135, 123, .12)
    }

    .prosth-field input::-webkit-inner-spin-button,
    .prosth-field input::-webkit-outer-spin-button {
      -webkit-appearance: none
    }

    .prosth-field .pf-unit {
      font-size: 10px;
      color: var(--t4);
      font-family: var(--font-mono)
    }

    .prosth-alert {
      padding: 10px 14px;
      border-radius: var(--r);
      margin: 8px 0;
      font-size: 12px;
      line-height: 1.5
    }

    .prosth-alert.warn {
      background: var(--red-bg);
      border: 1px solid var(--red-bdr);
      color: var(--red)
    }

    .prosth-alert.info {
      background: var(--blue-bg);
      border: 1px solid var(--blue-bdr);
      color: var(--teal)
    }

    .prosth-alert.caution {
      background: var(--amber-bg);
      border: 1px solid var(--amber-bdr);
      color: var(--amber)
    }

    .prosth-phase {
      text-align: center;
      padding: 12px 0;
      margin: 6px 0
    }

    .prosth-phase span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 16px;
      background: var(--s3);
      border: 1px solid var(--bdr);
      border-radius: 99px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--teal)
    }

    .prosth-hardstop {
      padding: 12px 16px;
      background: var(--red-bg);
      border: 2px solid var(--red);
      border-radius: var(--r2);
      margin: 10px 0;
      font-size: 12.5px;
      line-height: 1.6
    }

    .prosth-hardstop strong {
      color: var(--red);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: .5px
    }

    .prosth-summary {
      background: var(--s3);
      border: 1px solid var(--bdr);
      border-radius: var(--r2);
      padding: 18px;
      margin-top: 14px
    }

    .prosth-summary-title {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .prosth-summary-text {
      font-family: var(--font-mono);
      font-size: 11.5px;
      line-height: 1.7;
      color: var(--t2);
      white-space: pre-wrap;
      background: var(--s2);
      padding: 12px;
      border-radius: var(--r);
      border: 1px solid var(--bdr)
    }

    /* Prosth structured output */
    .prosth-dx-card {
      margin: 10px 0;
      padding: 14px 16px;
      border-radius: var(--r2);
      border: 1px solid var(--bdr);
      background: var(--s2)
    }

    .prosth-dx-card .dx-title {
      font-weight: 700;
      font-size: 13.5px;
      color: var(--t1);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .prosth-dx-card .dx-title .dx-sev {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase
    }

    .prosth-dx-card .dx-sev.sev-high {
      background: rgba(231, 76, 60, .12);
      color: #c0392b
    }

    .prosth-dx-card .dx-sev.sev-mod {
      background: rgba(230, 126, 34, .12);
      color: #d35400
    }

    .prosth-dx-card .dx-sev.sev-low {
      background: rgba(46, 204, 113, .12);
      color: #27ae60
    }

    .prosth-dx-card .dx-sev.sev-investigate {
      background: rgba(41, 128, 185, .12);
      color: #2980b9
    }

    .prosth-dx-card .dx-sev.sev-idiopathic {
      background: rgba(167, 139, 250, .12);
      color: var(--purple)
    }

    .prosth-dx-card .dx-sev.sev-ext {
      background: rgba(149, 165, 166, .12);
      color: #7f8c8d
    }

    .prosth-dx-card details {
      margin: 6px 0
    }

    .prosth-dx-card details summary {
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      color: var(--teal);
      padding: 4px 0;
      user-select: none
    }

    .prosth-dx-card details summary:hover {
      color: var(--t1)
    }

    .prosth-dx-card details[open] summary {
      margin-bottom: 4px
    }

    .prosth-dx-card details>div {
      font-size: 12px;
      line-height: 1.65;
      color: var(--t2);
      padding: 6px 0 2px 4px;
      border-left: 2px solid var(--bdr);
      padding-left: 12px
    }

    .prosth-section-header {
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--t3);
      margin: 18px 0 6px;
      padding-bottom: 5px;
      border-bottom: 1px solid var(--bdr)
    }

    .prosth-section-header:first-child {
      margin-top: 6px
    }

    .prosth-constraint {
      margin: 12px 0;
      padding: 10px 14px;
      border-radius: var(--r);
      background: rgba(230, 126, 34, .06);
      border: 1px solid rgba(230, 126, 34, .18);
      font-size: 12px;
      line-height: 1.6
    }

    .prosth-alert.normal {
      background: var(--green-bg);
      border: 1px solid var(--green-bdr);
      color: var(--green)
    }

    /* SA Module */
    .sa-phase {
      text-align: center;
      padding: 12px 0;
      margin: 6px 0
    }

    .sa-phase span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 16px;
      background: rgba(231, 76, 60, .08);
      border: 1px solid rgba(231, 76, 60, .22);
      border-radius: 99px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--red)
    }

    .sa-alert {
      padding: 10px 14px;
      border-radius: var(--r);
      margin: 8px 0;
      font-size: 12px;
      line-height: 1.5
    }

    .sa-alert.urgent {
      background: rgba(231, 76, 60, .10);
      border: 2px solid rgba(231, 76, 60, .5);
      color: var(--red);
      font-weight: 600
    }

    // ── SA CALCULATORS ──
    function calculateSAS(a) {
      // SAS — Tverring et al. BMC Infect Dis 2025;25:926 — Table 2
      // Logistic regression: logit(SA) = -3.82 - 7.03×ratio + 1.72×RETTS + 0.02×WBC_k + 2.45×abnormal
      var gSyn = a._sa_sf_glucose, gSer = a._sa_glucose_serum;
      var sfWBC = a._sa_sf_wbc;
      var appearance = a._sa_sf_appearance || 'clear';
      if (gSyn == null || gSer == null || gSer === 0 || sfWBC == null) return null;

      var ratio = Math.min(Math.max(gSyn / gSer, 0), 1); // clamp 0-1
      var wbcK = sfWBC / 1000; // convert to ×10³/µL
      var abnormal = appearance !== 'clear' ? 1 : 0; // binary: any non-clear = abnormal

      // RETTS proxy: map clinical state to 0-3
      var clinState = a.sa_clinical_state || 'stable';
      var pres = a.sa_presentation_multi || [];
      var hasFever = pres.includes('fever');
      var retts;
      if (clinState === 'septic_shock') retts = 3;
      else if (clinState === 'sirs') retts = 2;
      else if (hasFever) retts = 1;
      else retts = 0;

      // Coefficients from Table 2
      var logit = -3.82 + (-7.03 * ratio) + (1.72 * retts) + (0.02 * wbcK) + (2.45 * abnormal);
      var prob = 1 / (1 + Math.exp(-logit));
      var probPct = prob * 100;

      // Bands by probability thresholds (from paper: 2% and 10%)
      var band = probPct < 2 ? 'LOW' : probPct < 10 ? 'MID' : 'HIGH';
      var pct = probPct < 2 ? '<2%' : probPct < 10 ? '2-10%' : '>10%';

      var appLabels = { clear: 'Límpido', cloudy: 'Ligeiramente turvo', turbid: 'Turvo', purulent: 'Purulento', bloody: 'Hemático' };
      var rettsLabels = ['Estável (0)', 'Febre / ligeiro (1)', 'SIRS (2)', 'Choque séptico (3)'];

      // Components for detail display — with risk direction
      // For glucose ratio: reference is ratio=0.8 (normal). Contribution relative to normal = coef × (ratio - 0.8)
      var ratioRef = 0.8;
      var ratioRisk = (-7.03 * ratio) - (-7.03 * ratioRef); // negative = worse than normal
      var components = [
        { name: 'Rácio glicose sinovial/sérica', value: ratio.toFixed(2), coef: '−7.03', contribution: (-7.03 * ratio).toFixed(2), riskDelta: ratioRisk.toFixed(2), riskDir: ratio < 0.55 ? 'high' : ratio < 0.70 ? 'mod' : 'low', detail: 'Contínuo 0-1. < 0.55 = risco elevado. Ref. normal ≈ 0.80.' },
        { name: 'Prioridade triagem (proxy RETTS)', value: rettsLabels[retts], coef: '+1.72', contribution: (1.72 * retts).toFixed(2), riskDelta: (1.72 * retts).toFixed(2), riskDir: retts >= 2 ? 'high' : retts >= 1 ? 'mod' : 'low', detail: 'RETTS 0-3: estável (0), febre (1), SIRS (2), choque (3).' },
        { name: 'WBC sinovial', value: sfWBC.toLocaleString() + '/µL (' + wbcK.toFixed(1) + '×10³)', coef: '+0.02', contribution: (0.02 * wbcK).toFixed(2), riskDelta: (0.02 * wbcK).toFixed(2), riskDir: wbcK >= 50 ? 'high' : wbcK >= 25 ? 'mod' : 'low', detail: 'Contínuo, linear (×10³/µL). Não dicotomizar.' },
        { name: 'Aspecto macroscópico anormal', value: (appLabels[appearance] || appearance) + (abnormal ? ' → Anormal' : ' → Normal'), coef: '+2.45', contribution: (2.45 * abnormal).toFixed(2), riskDelta: (2.45 * abnormal).toFixed(2), riskDir: abnormal ? 'high' : 'low', detail: 'Binário: qualquer aspecto ≠ límpido = anormal.' }
      ];

      return { prob: probPct, probStr: probPct.toFixed(1), band: band, pct: pct, ratio: ratio.toFixed(2), logit: logit, components: components };
    }

    function calculateSARC(a) {
      var sfWBC = a._sa_sf_wbc;
      var gram = a._sa_sf_gram || 'not_done';
      var crystals = a._sa_sf_crystals || 'none';
      var pres = a.sa_presentation_multi || [];
      var risk = a.sa_risk_multi || [];
      var pain_gt2d = !pres.includes('onset_hyper'); // >2 days if not hyperacute
      var hasPrevSA = risk.includes('prev_sa');
      var hasEffusion = pres.includes('effusion_tense') || pres.includes('effusion_mild');
      if (sfWBC == null) return null;
      var logit = -5.2; // intercept
      var components = [];
      // Each variable
      var v1 = sfWBC >= 30000;
      if (v1) logit += 4.51;
      components.push({ name: 'WBC sinovial ≥ 30.000', present: v1, or: '90.8', direction: '+', value: sfWBC.toLocaleString() + '/µL' });
      var v2 = gram === 'pos' || gram === 'neg_bacilli';
      if (v2) logit += 3.07;
      components.push({ name: 'Organismos identificados ao Gram', present: v2, or: '21.5', direction: '+', value: gram === 'pos' ? 'Cocos Gram+' : gram === 'neg_bacilli' ? 'Bacilos Gram−' : gram === 'not_done' ? 'Não realizado' : 'Sem organismos' });
      var v3 = pain_gt2d;
      if (v3) logit += 1.93;
      components.push({ name: 'Dor > 2 dias', present: v3, or: '6.9', direction: '+', value: v3 ? 'Sim (início não hiperagudo)' : 'Não (hiperagudo < 48h)' });
      var v4 = hasPrevSA;
      if (v4) logit += 1.61;
      components.push({ name: 'Artrite séptica prévia', present: v4, or: '5.0', direction: '+', value: v4 ? 'Sim' : 'Não' });
      var v5 = hasEffusion;
      if (v5) logit += 1.57;
      components.push({ name: 'Derrame clínico presente', present: v5, or: '4.8', direction: '+', value: v5 ? 'Sim' : 'Não' });
      var v6 = crystals === 'urate' || crystals === 'pyrophosphate';
      if (v6) logit -= 2.30;
      var crystalVal = crystals === 'urate' ? 'Urato (gota)' : crystals === 'pyrophosphate' ? 'Pirofosfato (pseudogota)' : crystals === 'not_done' ? 'Não pesquisado (não entra no cálculo)' : 'Ausentes (não entra no cálculo)';
      components.push({ name: 'Cristais identificados (protector)', present: v6, or: '0.1', direction: '−', value: crystalVal });
      var p = 1 / (1 + Math.exp(-logit));
      return { prob: (p * 100).toFixed(1), risk: p > 0.4 ? 'HIGH' : p > 0.1 ? 'MID' : 'LOW', components: components };
    }

    // ── SA ARTHROCENTESIS DECISION ENGINE ──
    // Colored check/cross for criteria detail
    function ck(v) { return v ? '<span class="sa-crit-met">✓</span>' : '<span class="sa-crit-miss">✗</span>'; }

    function computeArthroDecision(a) {
      var pres = a.sa_presentation_multi || [];
      var risk = a.sa_risk_multi || [];
      var ddxClarify = a.sa_ddx_clarify_multi || [];

      // Step 1 data
      var hasFever = pres.includes('fever');
      var hasTenseEff = pres.includes('effusion_tense');
      var hasEffMild = pres.includes('effusion_mild');
      var hasAnyEff = hasTenseEff || hasEffMild;
      var hasSeverePain = pres.includes('pain_severe');
      var hasModPain = pres.includes('pain_moderate');
      var hasAnyPain = hasSeverePain || hasModPain;
      var hasHyperacute = pres.includes('onset_hyper');
      var hasAcute = pres.includes('onset_acute');
      var hasSubacute = pres.includes('onset_subacute');
      var hasProcedure = pres.includes('prior_procedure');
      var hasGaitLoss = pres.includes('gait_inability');
      var hasWarmth = pres.includes('warmth_redness');
      var hasTrauma = pres.includes('trauma_recent');

      // Step 2 data
      var hasRA = risk.includes('ra');
      var hasImmunosupp = risk.includes('immunosupp');
      var hasIVDU = risk.includes('ivdu');
      var hasDM = risk.includes('dm');
      var hasProsthOther = risk.includes('prosthesis_other');
      var hasProsthSame = risk.includes('prosthesis_same');
      var hasPrevSA = risk.includes('prev_sa');
      var hasSkinInfection = risk.includes('skin_infection');
      var hasBacteremia = risk.includes('recent_bacteremia');
      var riskCount = risk.filter(function (v) { return v !== 'none_rf'; }).length;

      // Step 3 data
      var clinState = a.sa_clinical_state || 'stable';
      var hasSIRS = hasFever || clinState === 'sirs' || clinState === 'septic_shock';

      // Step 4 numeric data
      var temp = a._sa_temp;
      var wbcSerum = a._sa_wbc_serum;
      var crp = a._sa_crp;

      // Auto-detect SIRS from numeric data
      var numericSIRS = (temp != null && (temp >= 38 || temp <= 36)) || (wbcSerum != null && (wbcSerum > 12 || wbcSerum < 4));
      if (numericSIRS) hasSIRS = true;

      // Step 5 DDx data
      var hxGout = ddxClarify.includes('hx_gout');
      var hxCPPD = ddxClarify.includes('hx_cppd');
      var rxChondro = ddxClarify.includes('rx_chondrocalcinosis');
      var anticoag = ddxClarify.includes('anticoagulated');

      // Local signs count (now includes moderate pain)
      var localSigns = [hasAnyEff, hasWarmth, hasAnyPain, hasFever].filter(Boolean).length;

      var mandatory = [];
      var recommended = [];
      var warnings = [];
      var pjiRedirect = false;
      var criteria = [];

      // ── MANDATORY CRITERIA (M1-M8) ──

      var m1 = hasHyperacute && !hasTrauma && hasFever;
      if (m1) mandatory.push('Monoartrite hiperaguda atraumática + febre');
      criteria.push({ name: 'Monoartrite hiperaguda atraumática + febre', met: m1, type: 'M', detail: 'Início <48h (' + ck(hasHyperacute) + ') + atraumático (' + ck(!hasTrauma) + ') + febre (' + ck(hasFever) + ')' });

      var m2 = hasAnyEff && hasSeverePain && hasGaitLoss;
      if (m2) mandatory.push('Efusão + dor severa em repouso + incapacidade de marcha');
      criteria.push({ name: 'Efusão + dor severa + incapacidade marcha', met: m2, type: 'M', detail: 'Efusão (' + ck(hasAnyEff) + ') + dor severa (' + ck(hasSeverePain) + ') + marcha (' + ck(hasGaitLoss) + ')' });

      var m3 = hasProsthOther;
      if (m3) mandatory.push('Prótese articular noutra articulação — risco de IPP hematogénia');
      criteria.push({ name: 'Prótese articular (outra articulação)', met: m3, type: 'M', detail: 'Disseminação hematogénia → risco de IPP' });

      var m4 = hasRA && (hasFever || hasSeverePain);
      if (m4) mandatory.push('Flare desproporcional em doença reumatológica (AR/inflamatória + febre ou dor severa)');
      criteria.push({ name: 'Flare desproporcional em doente reumatológico', met: m4, type: 'M', detail: 'AR (' + ck(hasRA) + ') + febre/dor severa (' + ck(hasFever || hasSeverePain) + ')' });

      var m5 = hasSIRS && (hasAnyEff || hasWarmth);
      if (m5) {
        var sirsC = [];
        if (hasFever) sirsC.push('febre');
        if (clinState === 'sirs') sirsC.push('SIRS clínico');
        if (clinState === 'septic_shock') sirsC.push('choque séptico');
        if (numericSIRS && !hasFever && clinState === 'stable') sirsC.push('critério SIRS numérico' + (temp >= 38 ? ' (T ' + temp + '°C)' : '') + (wbcSerum > 12 ? ' (WBC ' + wbcSerum + '×10³)' : ''));
        mandatory.push('Resposta inflamatória sistémica (' + sirsC.join(' + ') + ') + articulação inflamada');
      }
      criteria.push({ name: 'SIRS/febre + articulação inflamada', met: m5, type: 'M', detail: 'SIRS (' + ck(hasSIRS) + (numericSIRS ? ' [numérico]' : '') + ') + efusão/calor (' + ck(hasAnyEff || hasWarmth) + ')' });

      var m6 = hasProcedure && (hasWarmth || hasFever || hasAnyPain);
      if (m6) mandatory.push('Procedimento articular recente (<6 sem) + sinais inflamatórios novos');
      criteria.push({ name: 'Procedimento recente + sinais inflamatórios', met: m6, type: 'M', detail: 'Procedimento (' + ck(hasProcedure) + ') + calor/febre/dor (' + ck(hasWarmth || hasFever || hasAnyPain) + ')' });

      var m7 = hasBacteremia && (hasAnyEff || hasWarmth || hasAnyPain);
      if (m7) mandatory.push('Bacteremia recente/documentada + articulação inflamada — SA hematogénia provável');
      criteria.push({ name: 'Bacteremia recente + articulação inflamada', met: m7, type: 'M', detail: 'Bacteremia (' + ck(hasBacteremia) + ') + sinais articulares (' + ck(hasAnyEff || hasWarmth || hasAnyPain) + ')' });

      var m8 = hasSkinInfection && hasAnyEff;
      if (m8) mandatory.push('Porta de entrada cutânea activa + efusão articular — risco de disseminação');
      criteria.push({ name: 'Infecção cutânea activa + efusão', met: m8, type: 'M', detail: 'Porta cutânea (' + ck(hasSkinInfection) + ') + efusão (' + ck(hasAnyEff) + ')' });

      // ── RECOMMENDED CRITERIA (R1-R6) ──

      var r1 = !mandatory.length && localSigns >= 2 && !hasFever;
      if (r1) recommended.push('≥2 sinais locais (efusão + calor + dor) sem febre documentada');
      criteria.push({ name: '≥2 sinais locais sem febre', met: r1, type: 'R', detail: 'Sinais locais: ' + localSigns + '/4 (efusão, calor, dor, febre)' });

      var r2 = !mandatory.length && riskCount >= 2 && (hasAnyEff || hasAnyPain);
      if (r2) recommended.push('≥2 factores de risco do hospedeiro + monoartrite aguda');
      criteria.push({ name: '≥2 factores de risco + monoartrite', met: r2, type: 'R', detail: 'Factores risco: ' + riskCount + ' · Efusão/dor: ' + ck(hasAnyEff || hasAnyPain) });

      var r3 = !mandatory.length && hasIVDU && (hasAnyEff || hasAnyPain || hasWarmth);
      if (r3) recommended.push('UDIV + monoartrite aguda — risco elevado de SA hematogénia e MRSA');
      criteria.push({ name: 'UDIV + monoartrite', met: r3, type: 'R', detail: 'UDIV (' + ck(hasIVDU) + ') + sinais articulares (' + ck(hasAnyEff || hasAnyPain || hasWarmth) + ')' });

      if (r4) recommended.push('Imunossupressão + monoartrite aguda — apresentação atípica frequente (SANJO 2023)');
      criteria.push({ name: 'Imunossupressão + monoartrite (não-AR)', met: r4, type: 'R', detail: 'Immunosupp (' + ck(hasImmunosupp) + ') + sinais (' + ck(hasAnyEff || hasAnyPain) + ') + não-AR (' + (hasRA ? '<span class="sa-crit-miss">AR presente → M4</span>' : ck(true)) + ')' });

      var r5 = !mandatory.length && crp != null && crp >= 100 && hasAnyEff;
      if (r5) recommended.push('PCR ≥ 100 mg/L + efusão articular (LR+ 3.4 para infecção bacteriana)');
      criteria.push({ name: 'PCR ≥ 100 + efusão', met: r5, type: 'R', detail: 'PCR: ' + (crp != null ? crp + ' mg/L' : 'n/a') + ' · Efusão: ' + ck(hasAnyEff) });

      var r6 = !mandatory.length && hasAcute && hasFever && hasAnyEff;
      if (r6) recommended.push('Artrite aguda (2-7d) + febre + efusão — artrocentese indicada');
      criteria.push({ name: 'Início agudo + febre + efusão', met: r6, type: 'R', detail: 'Agudo (' + ck(hasAcute) + ') + febre (' + ck(hasFever) + ') + efusão (' + ck(hasAnyEff) + ')' });

    }

      // ── NO ARTHROCENTESIS PATH ──
      if (a.sa_do_arthro === false) {

        body += buildDDxDashboard(a, false);
        body += '<div style="margin:12px 0;padding:10px 14px;background:var(--teal-bg);border:1px solid var(--teal-bdr);border-radius:var(--r);font-size:12px;line-height:1.6">'
          + '<strong>Limitação:</strong> Sem dados do líquido sinovial, a exclusão definitiva de artrite séptica não é possível. '
          + 'Tratar o diagnóstico mais provável e reavaliar em 48-72h.'
          + '<br><br><strong>Critérios para artrocentese urgente diferida:</strong>'
          + '<br>• Sem melhoria após 48-72h de tratamento empírico'
          + '<br>• Agravamento dos sintomas'
          + '<br>• Aparecimento de febre ou sinais sistémicos'
          + '</div>';

        // Patient info for excluded/DDx path
        var patInfoDDx = 'INFORMAÇÃO AO DOENTE — Dor e Inchaço no Joelho\n\n'
          + 'O QUE TEM:\n'
          + 'Após avaliação, a causa mais provável da dor e inchaço no seu joelho não é uma infecção. O diagnóstico mais provável será indicado pelo seu médico.\n\n'
          + 'MEDICAÇÃO:\n'
          + '• Tome os medicamentos prescritos conforme indicado.\n'
          + '• Anti-inflamatórios: tomar sempre com o estômago cheio.\n\n'
          + 'ACTIVIDADE:\n'
          + '• Pode caminhar conforme tolerância.\n'
          + '• Aplique gelo no joelho durante 15-20 minutos, 3-4 vezes ao dia, se houver inchaço.\n'
          + '• Evite actividades que agravem a dor.\n\n'
          + 'SINAIS DE ALERTA — Procure ajuda urgente se:\n'

          + '• Agravamento significativo da dor ou inchaço\n'

          + 'PRÓXIMA CONSULTA:\n'
          + '• Reavaliação em 48-72 horas se sem melhoria.\n'

          + '<button class="sa-copy-btn" onclick="copyPatientInfo(this)">Copiar para área de transferência 📋</button>'

      var hasGU = source.includes('gu_source');
      var hasBloodCxPos = source.includes('blood_cx_pos');
      var hasBloodCxNeg = source.includes('blood_cx_neg');
      var hasBloodCxPending = source.includes('blood_cx_pending');
      var hasSkinSource = source.includes('skin_source');
      var hasUTISource = source.includes('uti_source');
      var hasRespSource = source.includes('resp_source');

        (sarc && parseFloat(sarc.prob) > 40) || // SARC >40%

        (sarc && parseFloat(sarc.prob) > 10) || // SARC 10-40%

      var excludedConfident = !confirmed && !highProb && !probable && sas && sas.band === 'LOW' && gramNeg;
      var excludedProvisional = !confirmed && !highProb && !probable && sas && sas.band === 'LOW' && !gramDone;
      var excluded = excludedConfident || excludedProvisional;

      var cat, title, severity;
      if (confirmed) { cat = 'sa_confirmed'; title = 'Artrite Séptica — Organismos Identificados ao Gram'; severity = 'HIGH'; }
      else if (highProb) { cat = 'sa_confirmed'; title = 'Artrite Séptica — Alta Probabilidade'; severity = 'HIGH'; }
      else if (probable) { cat = 'sa_probable'; title = 'Artrite Séptica — Provável'; severity = 'MID'; }
      else if (excludedConfident) { cat = 'sa_excluded'; title = 'Artrite Séptica — Excluída / Improvável'; severity = 'LOW'; }
      else if (excludedProvisional) { cat = 'sa_excluded'; title = 'Artrite Séptica — Risco Baixo (Gram não realizado — considerar completar)'; severity = 'LOW'; }
      else { cat = 'sa_probable'; title = 'Artrite Séptica — Indeterminado (Tratar como Provável)'; severity = 'MID'; }

      var abx = '', abxAlt = '', abxDuration = '4 semanas (28 dias)';
      if (hasGU) {
        abx = 'Ceftriaxona 1g IV q24h'; abxAlt = 'Transição oral: Cefixima 400mg q12h ou Ciprofloxacina 500mg q12h';
      } else if (gram === 'pos' && !hasMRSArisk) {
        abx = 'Flucloxacilina 2g IV q6h'; abxAlt = 'Alternativa: Cefazolina 2g IV q8h';
      } else if (gram === 'pos' && hasMRSArisk) {

      } else if (gram === 'neg_bacilli') {
        abx = 'Ceftriaxona 2g IV q24h'; abxAlt = 'Alternativa: Cefepima 2g IV q8h';
      } else {
        abx = 'Vancomicina 15-20 mg/kg IV q12h + Ceftriaxona 2g IV q24h'; abxAlt = 'Cobertura dupla empírica até identificação do agente';
      }

      else if (hasImmunosupp || hasMRSArisk) abxDuration = '≥ 6 semanas (imunossupressão / MRSA / drenagem tardia)';
      // blood_cx_pos: flag for antibiogram-directed therapy
      var abxNote = '';

        abxNote += '<div class="sa-alert info" style="margin:8px 0"><strong>Hemoculturas positivas — ajustar antibioterapia ao antibiograma.</strong> '

      var overallTxt, overallNote = '';

      }
      else if (probable) { overallTxt = 'ARTRITE SÉPTICA — PROVÁVEL'; }
      else if (excludedConfident) { overallTxt = 'ARTRITE SÉPTICA — IMPROVÁVEL'; }

    function buildSASDetail(sas) {

          + '<td>' + c.name + '<br><span style="font-size:10px;opacity:.7">' + c.detail + '</span></td>'
          + '<td>' + c.value + '</td>'

        + '<br><strong>Fórmula:</strong> logit(SA) = −3.82 − 7.03 × rácio + 1.72 × RETTS + 0.02 × WBC(×10³) + 2.45 × anormal → p = 1/(1+e<sup>−logit</sup>)'
        + '<br><strong>Ref.:</strong> Tverring J et al. BMC Infect Dis 2025;25:926. AUC 0.971 (IC 95%: 0.957–0.987), 668 doentes. Validação interna (bootstrapping). '

    // ── DDx DASHBOARD ENGINE ──
    function scoreDDx(a, hasSF) {
      var pres = a.sa_presentation_multi || [];
      var risk = a.sa_risk_multi || [];
      var ddxClarify = a.sa_ddx_clarify_multi || [];
      var sfWBC = hasSF ? (a._sa_sf_wbc || 0) : null;
      var sfPMN = hasSF ? (a._sa_sf_pmn || 0) : null;
      var crystals = hasSF ? (a._sa_sf_crystals || 'not_done') : 'not_done';
      var gram = hasSF ? (a._sa_sf_gram || 'not_done') : null;
      var appearance = hasSF ? (a._sa_sf_appearance || 'clear') : null;
      var hasTrauma = pres.includes('trauma_recent');
      var hasRA = risk.includes('ra');
      var hasFever = pres.includes('fever');
      var hasEffusion = pres.includes('effusion_tense') || pres.includes('effusion_mild');
      var isSubacute = pres.includes('onset_subacute');
      var isHyperacute = pres.includes('onset_hyper');
      var isAcute = pres.includes('onset_acute');
      var isElderly = risk.includes('age_80');

      // DDx clarification data

      var hxCPPD = ddxClarify.includes('hx_cppd');
      var uricHigh = ddxClarify.includes('uric_acid_high');
      var rxChondro = ddxClarify.includes('rx_chondrocalcinosis');
      var rxOA = ddxClarify.includes('rx_oa_changes');
      var rxNormal = ddxClarify.includes('rx_normal');
      var anticoag = ddxClarify.includes('anticoagulated');
      var recentGIGU = ddxClarify.includes('recent_gi_gu');
      var sexActive = ddxClarify.includes('sexually_active');
      var polyart = ddxClarify.includes('polyarticular');
      var ddx = [];

      // ── GOUT ──
      var gout = { id: 'gout', name: 'Gota Aguda', score: 0, forFactors: [], againstFactors: [] };
      if (isHyperacute) { gout.score += 3; gout.forFactors.push('Início hiperagudo (típico)'); }
      if (isAcute) { gout.score += 1; gout.forFactors.push('Início agudo'); }
      if (pres.includes('warmth_redness')) { gout.score += 2; gout.forFactors.push('Calor e eritema intensos'); }
      if (risk.includes('alcohol')) { gout.score += 1; gout.forFactors.push('Hepatopatia / etilismo'); }
      if (risk.includes('renal')) { gout.score += 1; gout.forFactors.push('IRC / hiperuricemia'); }
      if (crystals === 'urate') { gout.score += 10; gout.forFactors.push('Cristais de urato confirmados'); }
      if (hasSF && sfWBC != null && sfWBC > 50000) { gout.againstFactors.push('WBC > 50.000 — mais típico de séptica (mas gota pode atingir 50-100k)'); }
      if (hasFever && !hasSF) { gout.againstFactors.push('Febre presente (gota pode causar febre ligeira, mas febre alta sugere séptica)'); gout.score -= 1; }
      if (crystals === 'none') { gout.score -= 2; gout.againstFactors.push('Sem cristais na pesquisa'); }
      if (hxGout) { gout.score += 4; gout.forFactors.push('História de crises gotosas prévias'); }
      if (uricHigh) { gout.score += 2; gout.forFactors.push('Ácido úrico sérico elevado'); }
      if (!uricHigh && hxGout) { gout.forFactors.push('(Ácido úrico pode estar normal durante crise aguda — não exclui)'); }
      gout.tx = '<strong>Colchicina:</strong> 1mg seguido de 0.5mg 1h depois (≤1.5mg/dia). <strong>AINE:</strong> Naproxeno 500mg q12h ou Indometacina 50mg q8h (se não-CI). <strong>Corticóide:</strong> Prednisolona 30-40mg/dia 5 dias (se CI a AINE/colchicina) ou infiltração intra-articular (acetato de metilprednisolona 40mg ou acetonido de triamcinolona — preferir metilprednisolona se cartilagem remanescente significativa; triamcinolona hexacetonido se sinovite agressiva). <strong>Seguimento:</strong> Avaliar indicação para terapêutica hipouricemiante (alopurinol/febuxostat) após resolução da crise.';
      ddx.push(gout);

      // ── PSEUDOGOUT / CPPD ──
      var cppd = { id: 'cppd', name: 'Pseudogota (CPPD)', score: 0, forFactors: [], againstFactors: [] };
      if (isElderly) { cppd.score += 2; cppd.forFactors.push('Idade > 80 anos'); }
      if (isAcute || isHyperacute) { cppd.score += 1; cppd.forFactors.push('Início agudo/hiperagudo'); }
      if (risk.includes('renal')) { cppd.score += 1; cppd.forFactors.push('Doença metabólica associada'); }

        if (mech === 'pivot' && (loc === 'lfc' || loc === 'ltp' || loc === 'multiple'))

          footprint = '<div class="note" style="border-left:4px solid var(--blue);padding:8px 12px;margin:8px 0;font-size:12px"><strong>Padrão Hiperextensão:</strong> Plateau + côndilos anteriores → LCA/LCP/CPL. Avaliação multiligamentar recomendada.</div>';

        // R1: Major associated lesion
        if (hasMajor) {
          var assocNames = [];
          if (assoc.includes('acl')) assocNames.push('LCA');
          if (assoc.includes('pcl')) assocNames.push('LCP');
          if (assoc.includes('plc')) assocNames.push('CPL');

            cat: 'bone_redirect', title: '↩ Redirect — Lesão Associada Major (' + assocNames.join(' + ') + ')',

        // R2: Grade 3 + articular extension
        if ((grade === 'g3a' || grade === 'g3b') && artSurf === 'yes') {

              + '</ul>'
              + '<div style="margin-top:8px;padding:6px 10px;background:rgba(230,126,34,.08);border-radius:6px;font-size:11px"><strong>RTP estimado:</strong> 18-21 dias. Resolução RM mediana 42 semanas, mas >50% volume resolve aos 3 meses.</div>',

        // R3: Grade 1-2 isolated
        if (grade === 'g1' || grade === 'g2') {

        return {
          cat: 'bone_conserv', title: '🩹 Contusão Óssea Grau 3 — Sem Extensão Articular',
          body: footprint + '<ul>'
            + '<li><strong>Descarga parcial 2-4 semanas</strong> + crioterapia + AINEs</li>'
            + '<li><strong>RTP estimado:</strong> ' + (grade === 'g3a' ? '~18.3 dias' : '~21.4 dias') + '</li>'

      }

      // ═══ SIFK ═══
      if (diag === 'sifk') {
        var stage = a.sifk_stage || '1';
        var sloc = a.sifk_loc || 'mfc';
        var ssize = a.sifk_size || 'small';
        var isMedial = (sloc === 'mfc' || sloc === 'mtp');
        var kl = a.sifk_kl || 'kl01';
        var prev = a.sifk_prev || 'none';
        var dexa = a.sifk_dexa || 'not_done';

        // Lateralized root tear & extrusion
        var root = isMedial ? (a.sifk_root_med || 'unknown') : (a.sifk_root_lat || 'unknown');
        var extrus = isMedial ? (a.sifk_extrus_med || 'unknown') : (a.sifk_extrus_lat || 'unknown');
        var meniscusLabel = isMedial ? 'medial' : 'lateral';

        // HKA
        // Deformity data
        var dd = ans.sifk_deformData;
        var hkaVal = dd ? dd.hka : null;
        var hkaAvail = (hkaVal != null);
        var hkaDev = hkaAvail ? dd.dev : 0;
        var isVarus = hkaAvail && dd.isVarus;
        var isValgus = hkaAvail && dd.isValgus;
        var hasMalAlign = isVarus || isValgus;
        // Concordant = deformity loads the affected compartment (varo→medial, valgo→lateral)
        var concordant = (isMedial && isVarus) || (!isMedial && isValgus);
        var osteoTechnique = dd && dd.osteoTechnique ? dd.osteoTechnique : '';
        var osteoSite = dd ? dd.osteoSite : 'unknown';

        // SIFK Score calculation (Pareek 2020 — 5 variables)
        var sifkPts = 0;
        // Variable 1: lateral meniscus extrusion (always applicable for scoring)
        var exLatScore = isMedial ? 'unknown' : extrus;
        if (!isMedial && (extrus === 'gt5' || extrus === '3to5')) sifkPts++;
        // Variable 2: KL4
        if (kl === 'kl4') sifkPts++;
        // Variable 3: SIFK on MFC

        // Variable 4: lateral meniscus root tear
        if (!isMedial && (root === 'yes_repair' || root === 'yes_irrep')) sifkPts++;
        // Variable 5: medial meniscus extrusion
        var exMedScore = isMedial ? extrus : 'unknown';
        if (isMedial && (extrus === 'gt5' || extrus === '3to5')) sifkPts++;

        var sifkRisk = sifkPts >= 3 ? 'HIGH' : sifkPts >= 2 ? 'MEDIUM' : 'LOW';

        // HKA + deformity analysis badge
        var hkaBadge = '';
        if (hkaAvail) {

        } else {
          hkaBadge = '<div style="margin:4px 0 8px;padding:8px 12px;border-radius:6px;border-left:4px solid var(--amber);background:rgba(0,0,0,.02);font-size:12px;">'
            + '<strong>HKA:</strong> Não avaliado — <strong>Telemetria bipodal em carga recomendada</strong> para definir alinhamento e indicação de osteotomia (medir HKA, mMPTA, mLDFA, JLCA).'

        // Root tear flag (lateralized)

        // R5: Stage 4
        if (stage === '4') {

        if (stage === '3') {

              + '<li><strong>Preservação articular prioritária:</strong> Core decompression ± mosaicplastia</li>'
              + (concordant && osteoTechnique ? '<li><strong>' + osteoTechnique + ' associada</strong> — Mau alinhamento concordante (' + (isVarus ? 'Varo ' + Math.abs(hkaDev).toFixed(1) + '°' : 'Valgo ' + Math.abs(hkaDev).toFixed(1) + '°') + ') + SIFK ' + (isMedial ? 'medial' : 'lateral') + ' → correcção obrigatória (princípio: osteotomia no osso deformado)</li>' : concordant && osteoSite === 'unknown' ? '<li><strong>⚠ Osteotomia de correcção indicada</strong> — mMPTA e mLDFA necessários para definir se HTO ou DFO</li>' : '')

        }

        if ((stage === '1' || stage === '2') && (prev === 'conserv_gt3m')) {

        var bisphoNote = '';

        else if (dexa === 'not_done')
          bisphoNote = '<li>Bifosfonatos: <strong>solicitar DEXA</strong> antes de iniciar — indicados se osteopenia/osteoporose OU RM com critérios progressão</li>';
        else

        return {

          body: sifkBadge + hkaBadge + rootFlag + extrusFlag + '<ul>'
            + '<li><strong>Descarga parcial 6-8 semanas</strong> (muletas)</li>'
            + bisphoNote
            + '<li><strong>Vitamina D + Cálcio</strong> — corrigir deficiência (obrigatório)</li>'
            + (root === 'yes_repair' ? '<li><strong>⚠ ' + rootLabel + ' repair pullout OBRIGATÓRIO</strong> — 1ª linha. Previne progressão</li>' : '')
            + '<li>PEMF (campo electromagnético pulsado) — considerar (evidência emergente)</li>'
            + '<li><strong>RM controlo aos 3 meses</strong></li>'
            + (concordant ? '<li><strong>⚠ Mau alinhamento concordante:</strong> Se falha conservadora → osteotomia de correcção indicada' + (osteoTechnique ? ' (' + osteoTechnique + ')' : ' — completar avaliação mMPTA/mLDFA para definir local') + '</li>' : '')
            + (sifkRisk === 'HIGH' ? '<li><strong>⚠ SIFK Score HIGH:</strong> Se sem melhoria precoce, considerar intervenção mesmo em estádio 1-2</li>' : '')
            + '</ul>',

        };
      }

      // ═══ STRESS FRACTURE ═══
      if (diag === 'stress_fx') {
        var sfType = a.sfx_type || 'fatigue';
        var sfLoc = a.sfx_loc || 'mtp';
        var sfDisp = a.sfx_disp || 'no';

        if (sfDisp === 'yes') {

              + '</ul>',
            refs: ''
          };
        }

        var riskList = '';
        if (hasREDS) riskList += '<li><strong>⚠ RED-S detectado:</strong> Referenciação endocrinologia + nutrição obrigatória</li>';
        if (sfRisk.includes('vitd')) riskList += '<li>Corrigir défice vitamina D</li>';
        if (sfRisk.includes('load')) riskList += '<li>Ajustar carga de treino (progressão gradual)</li>';

        if (sfType === 'insufficiency') {

            cat: 'bone_conserv', title: '🩹 Fractura Insuficiência — Tratamento Conservador + Metabólico',
            body: '<ul>'
              + '<li><strong>Descarga relativa 4-8 semanas</strong> conforme localização</li>'
              + '<li><strong>Bifosfonatos</strong> (osso osteopénico)</li>'
              + '<li><strong>Investigação metabólica:</strong> DEXA, vitamina D, PTH, cálcio, função tiroideia</li>'

              + '<li>RM controlo para verificar consolidação</li>'

            refs: ''
          };
        }

        return {
          cat: 'bone_conserv', title: '🩹 Fractura Stress Fadiga — Tratamento Conservador',
          body: '<ul>'
            + '<li><strong>Descarga relativa 4-8 semanas</strong></li>'
            + '<li>Correcção factores: carga treino, calçado, superfície</li>'
            + riskList
            + (sfLoc === 'patella' ? '<li>Patela não-deslocada: ortótese extensão 6 semanas</li>' : '')
            + '<li>RM controlo para verificar consolidação</li>'
            + '</ul>',
          refs: ''
        };
      }

      // ═══ OCD ═══
      if (diag === 'ocd') {
        var mat = a.ocd_maturity || 'juvenile';
        var icrs = a.ocd_icrs || 'i';
        var ocdSize = a.ocd_size || 'lt2';
        var loose = a.ocd_loose || 'no';
        var ocdPrev = a.ocd_prev || 'none';

        // Urgent: loose body with locking
        if (loose === 'yes_lock') {
          return {
            cat: 'bone_urgent', title: '🚨 OCD — Corpo Livre com Bloqueio Mecânico',

              + '<li><strong>Artroscopia urgente:</strong> Remoção ou fixação do corpo livre</li>'

              + '<li>Se inviável: remoção + tratar leito osteocondral conforme tamanho</li>'
              + '</ul>',
            refs: 'ICRS · PMC 2022'
          };
        }

        // ICRS I-II Stable
        if (icrs === 'i' || icrs === 'ii') {
          if (mat === 'juvenile' && (ocdPrev === 'none' || ocdPrev === 'conserv_lt3m')) {

              cat: 'bone_conserv', title: '🩹 OCD Juvenil Estável (ICRS ' + icrs.toUpperCase() + ') — Conservador',
              body: '<ul>'
                + '<li><strong>Restrição de actividade 3-6 meses</strong> + ortótese descarga</li>'

                + '<li>Critério de falha: sem cicatrização RM aos 6 meses OU sintomas mecânicos</li>'
                + '<li>Prognóstico favorável: >70% cicatrização em JOCD ICRS I-II</li>'

              refs: 'Heyworth AJSM 2023 · Gunton 2013'
            };
          }
          // Adult ICRS I-II
          return {
            cat: 'bone_fixation', title: '🔧 OCD Adulto (ICRS ' + icrs.toUpperCase() + ') — Drilling / Microfractura',
            body: '<ul>'
              + '<li><strong>Drilling (TAD ou RAD) / Microfractura</strong></li>'
              + '<li>Prognóstico conservador reservado em adultos (<30%)</li>'
              + '<li>Considerar intervenção precoce mesmo em lesão estável</li>'
              + '</ul>',
            refs: 'ICRS · Heyworth 2023'
          };
        }

        // ICRS III Unstable in situ
        if (icrs === 'iii') {
          return {
            cat: 'bone_fixation', title: '🔧 OCD Instável (ICRS III) — Fixação',
            body: '<ul>'
              + '<li><strong>Fragmento viável:</strong> Fixação (parafusos headless, darts, SmartNails, PGA/PLA bioabsorvíveis) + drilling da base</li>'
              + '<li><strong>Fragmento inviável:</strong> Remoção + restauração por tamanho:</li>'
              + '<li style="margin-left:20px">&lt;2 cm²: Microfractura / AMIC</li>'
              + '<li style="margin-left:20px">2-4 cm²: OATS / Mosaicplastia</li>'
              + '<li style="margin-left:20px">&gt;4 cm²: ACI ou osteochondral allograft</li>'
