input[type=number]{-moz-appearance:textfield;appearance:textfield}

.theme-toggle{position:fixed;top:14px;right:14px;z-index:200;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--s1);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t3);transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,.08)}

[data-theme="dark"] body::after{background:radial-gradient(ellipse at 50% 0%,rgba(59,135,123,.08),transparent 70%)}

.footer{margin-top:28px;padding:14px 16px;background:var(--s1);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));border:1px solid var(--bdr);border-radius:var(--r2);font-size:10.5px;color:var(--t4);line-height:1.6}.footer strong{color:var(--t3)}

<script>
// Theme toggle
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('themeToggle').textContent=isDark?'☀️':'🌙';
  try{localStorage.setItem('ubnic-theme',isDark?'light':'dark');}catch(e){}
}
(function(){try{const t=localStorage.getItem('ubnic-theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',()=>{document.getElementById('themeToggle').textContent='🌙';});}}catch(e){}})();

const OKS_Q=[
{q:'Como descreveria a dor que habitualmente sente no joelho?',opts:['Nenhuma','Muito ligeira','Ligeira','Moderada','Intensa'],sc:[4,3,2,1,0]},

{q:'Tem tido dificuldade em entrar e sair de um carro ou transportes públicos?',opts:['Nenhuma','Muito pouca','Moderada','Extrema dificuldade','Impossível'],sc:[4,3,2,1,0]},
{q:'Durante quanto tempo consegue andar antes da dor se tornar intensa? (com ou sem bengala)',opts:['>30 minutos','16–30 minutos','5–15 minutos','Apenas em casa','Nem em casa'],sc:[4,3,2,1,0]},
{q:'Depois de se sentar à mesa, qual a dificuldade em levantar-se da cadeira?',opts:['Nenhuma','Pouca','Moderada','Muito difícil','Impossível'],sc:[4,3,2,1,0]},
{q:'Coxeia por causa do joelho?',opts:['Raramente/nunca','Às vezes / início marcha','Frequentemente','Quase sempre','Sempre'],sc:[4,3,2,1,0]},
{q:'Consegue ajoelhar-se e voltar a levantar-se?',opts:['Sim, facilmente','Alguma dificuldade','Dificuldade moderada','Extrema dificuldade','Impossível'],sc:[4,3,2,1,0]},
{q:'É incomodado pela dor no joelho durante a noite na cama?',opts:['Nunca','1–2 noites','Algumas noites','Maioria das noites','Todas as noites'],sc:[4,3,2,1,0]},
{q:'Quanto a dor interfere com o trabalho habitual (incluindo tarefas domésticas)?',opts:['Nada','Um pouco','Moderadamente','Muito','Totalmente'],sc:[4,3,2,1,0]},
{q:'Sente que o joelho pode "ceder" ou falhar?',opts:['Nunca','Raramente','Às vezes','Frequentemente','Sempre'],sc:[4,3,2,1,0]},
{q:'Consegue fazer as compras sozinho(a)?',opts:['Sim, facilmente','Alguma dificuldade','Dificuldade moderada','Extrema dificuldade','Impossível'],sc:[4,3,2,1,0]},
{q:'Consegue descer um lance de escadas?',opts:['Sim, facilmente','Alguma dificuldade','Dificuldade moderada','Extrema dificuldade','Impossível'],sc:[4,3,2,1,0]}

// ============================================================
//  1ª CONSULTA — DECISION ENGINE (DDx + Exams)
// ============================================================
function decideFirst(a){
  const loc=a.loc, pat=a.pattern, trig=a.trigger, sg=a.signs_multi||[], hx=a.hx_multi||[];
  let ddx=[], exams=[];
  const hasSg=v=>sg.includes(v);
  const aclSigns=hasSg('lachman')||hasSg('pivot')||hasSg('lever');

  // ── MEDIAL ──
  if(loc==='medial'||loc==='diffuse'){
    let mp=(hasSg('mcm_m')||hasSg('thess_m')||pat==='locking'||trig==='squat')?'likely':'possible';
    ddx.push({name:'Rotura meniscal medial (corpo/corno/raiz)',prob:mp,
      keys:'Dor interlinha ± bloqueio. McMurray/Thessaly +. Agachamento → root tear.',
      exam:'RM joelho (protocolo meniscal, cortes finos raiz).'});
    if(pat==='instab'||trig==='trauma_pivot') ddx.push({name:'Ramp lesion (meniscocapsular PM)',prob:'possible',
      keys:'Dor postero-medial + instabilidade. Até 24% c/ lesão LCA. RM Se ~65–72% — subdiagnosticada. Procurar artroscopicamente via portal PM.',
      exam:'RM (cortes sagitais e coronais PM). Artroscopia diagnóstica via portal PM se alta suspeita.'});
    if(hasSg('med_cyst')) ddx.push({name:'Quisto parameniscal medial',prob:'likely',
      keys:'Massa palpável interlinha (patognomónico). Associado a rotura horizontal.',
      exam:'RM: quisto + rotura meniscal subjacente. Eco complementar.'});
    let oap=(pat==='mech'&&trig==='none')?'likely':'possible';
    ddx.push({name:'Artrose compartimento medial',prob:oap,
      keys:'Dor mecânica progressiva, crepitação, rigidez < 30 min. Idade > 50, varo.',
      exam:'RX carga Schuss monopodal + Rosenberg. Telemetria se varo.'});
    if(pat==='night'||trig==='none') ddx.push({name:'SIFK / SONK',prob:hasSg('jlt_m')&&pat==='night'?'likely':'possible',
      keys:'Início súbito, nocturna, sem trauma. Côndilo medial. > 55a. Root tear ~70%.',
      exam:'RM urgente: edema subcondral, fractura, raiz posterior.'});
    if(hasSg('valgus')||trig==='trauma_contact') ddx.push({name:'Lesão LCM',prob:hasSg('valgus')?'likely':'possible',
      keys:'Trauma valgo. Valgus stress + 30°. Se + 0° → canto postero-medial.',
      exam:'RM: grau lesão (I–III), componente profundo, associadas.'});
    if(hasSg('pes')) ddx.push({name:'Bursite anserina / tendinopatia pata de ganso',prob:'likely',
      keys:'Dor ~5 cm distal interlinha medial. Comum em OA, sobrepeso.',
      exam:'Diagnóstico clínico. Eco se dúvida.'});
  }
  // ── PF ──
  if(loc==='pf'||loc==='diffuse'){
    let pp=(hasSg('clarke')||hasSg('pf_crep'))?'likely':'possible';
    ddx.push({name:'Condromalácia / Artrose PF',prob:pp,
      keys:'Dor retropatelar, escadas (descida), agachamento, cinema sign. Crepitação PF.',
      exam:'RX axial patela Merchant 45° + perfil carga. RM se lesão focal.'});
    if(hasSg('appreh')||hasSg('j_sign')) ddx.push({name:'Instabilidade patelar',prob:'likely',
      keys:'Apprehension patognomónico. J-sign. Hx luxação/subluxação. Patela alta, TT-TG, displasia troclear.',
      exam:'RM: MPFL, displasia troclear (Dejour), condral. TC rotacional (TT-TG).'});
    if(hasSg('bassett')) ddx.push({name:'Tendinopatia rotuliana (Jumper\'s knee)',prob:'likely',
      keys:'Bassett patognomónico. Polo inferior patela extensão. Salto repetitivo.',
      exam:'Ecografia dinâmica (gold standard): espessamento, hipoecogenicidade, neovascularização.'});
  }
  // ── LATERAL ──
  if(loc==='lateral'||loc==='diffuse'){
    if(hasSg('mcm_l')||hasSg('jlt_l')) ddx.push({name:'Rotura meniscal lateral',prob:hasSg('mcm_l')?'likely':'possible',
      keys:'Dor interlinha lateral. McMurray lateral +. Quisto parameniscal frequente.',
      exam:'RM joelho.'});
    if(hasSg('lat_cyst')) ddx.push({name:'Quisto parameniscal lateral',prob:'likely',
      keys:'Massa interlinha lateral. Mais frequente que medial. Rotura horizontal associada.',
      exam:'RM: quisto + rotura associada.'});
    if(hasSg('noble')||(pat==='activity'&&loc==='lateral')) ddx.push({name:'Síndrome banda iliotibial',prob:hasSg('noble')?'likely':'possible',
      keys:'Dor lateral a ~30° flexão. Corredores. Noble/Ober +.',
      exam:'Diagnóstico clínico. RM se dúvida.'});
    if(hasSg('varus')||hasSg('dial')) ddx.push({name:'Lesão canto postero-lateral (PLC)',prob:hasSg('dial')?'likely':'possible',
      keys:'Varus stress + rotação ext tibial. Dial +30°: PLC. +30°+90°: PLC+LCP.',
      exam:'RM + RX stress varo.'});
  }
  // ── POSTERIOR ──
  if(loc==='posterior'||loc==='diffuse'){
    if(hasSg('post_dr')||hasSg('sag')) ddx.push({name:'Rotura LCP',prob:'likely',
      keys:'Post drawer + Sag sign = alta prob. Se: 90%, Sp: 99%. Dashboard injury.',
      exam:'RM + RX stress posterior (Telos).'});
    if(hasSg('baker')) ddx.push({name:'Quisto de Baker',prob:'likely',
      keys:'Massa fluctuante fossa poplítea. Secundário a patologia intra-articular >90%.',
      exam:'Eco poplítea (confirmar, excluir aneurisma/TVP). RM: causa subjacente.'});
    if(hasSg('ham_tend')||hasSg('ham_res')) ddx.push({name:'Tendinopatia isquiotibiais distais',prob:hasSg('ham_res')?'likely':'possible',
      keys:'Inserção PM (semimembranoso) ou PL (bicípite). Flexão resistida dolorosa.',
      exam:'Ecografia dinâmica ± RM.'});
  }
  // ── ACL (cross-location) ──
  if(aclSigns) ddx.push({name:'Rotura LCA',prob:'likely',
    keys:'Lachman +, Pivot shift + (mais específico), Lever sign +. Trauma rotacional, pop, derrame agudo.',
    exam:'RM mandatória: LCA parcial/completa, meniscos, contusões ósseas, ligamentos.'});

  // Fallback: always at least 1 DDx
  if(ddx.length===0){
    const fb={medial:{name:'Gonalgia medial inespecífica',keys:'Dor medial sem sinais patognomónicos. Ponderar artrose incipiente, meniscal degenerativa, tendinopatia anserina.',exam:'RX carga Schuss + Rosenberg + RM joelho.'},
      pf:{name:'Dor anterior do joelho',keys:'Retropatelar/peripatelar sem sinais específicos. Condromalácia, síndrome PF, tendinopatia.',exam:'RX axial Merchant + perfil carga. Eco tendão rotuliano.'},
      lateral:{name:'Gonalgia lateral inespecífica',keys:'Dor lateral sem sinais patognomónicos. Meniscal, ITB, artrose lateral, PLC ligeiro.',exam:'RM joelho.'},
      posterior:{name:'Dor posterior do joelho',keys:'Quisto Baker, tendinopatia isquiotibial, lesão LCP ligeira.',exam:'Eco poplítea + RM joelho.'},
      diffuse:{name:'Gonalgia difusa',keys:'Mal localizada. Artrose multicompartimental, doença inflamatória, SIFK.',exam:'RX carga bilateral + analítica (VS, PCR, FR).'}};
    ddx.push({...(fb[loc]||fb.diffuse),prob:'possible'});
  }
  // Sort DDx
  const po={likely:0,possible:1};
  ddx.sort((a,b)=>(po[a.prob]||1)-(po[b.prob]||1));

  // Compile exams
  let ex=new Map();
  if(pat==='mech'||pat==='inflam'||loc==='diffuse') ex.set('RX Joelho carga (Schuss+Rosenberg+Perfil)','Baseline artrose.');
  ddx.forEach(d=>{
    if(d.exam) d.exam.split('. ').forEach(e=>{
      let cl=e.replace(/\./g,'').trim();
      if(cl&&!ex.has(cl)) ex.set(cl,'Para: '+d.name);
    });
  });
  if(pat==='inflam'){
    ex.set('VS, PCR, Hemograma','Marcadores inflamatórios — se elevados: doença activa.');
    ex.set('FR, Anti-CCP','Se suspeita AR. Anti-CCP: Se 95%, Sp 98%.');
    ex.set('Ácido úrico','Se suspeita gota.');
    ex.set('Artrocentese (se derrame)','Celularidade, cristais (gota/pseudogota), cultura. Líquido inflamatório: >2000 cél/mm³.');
    ex.set('DAS28 / CDAI (solicitar a Reumatologia)','Score actividade doença: DAS28 <2.6 = remissão; >3.2 = activa. Crítico para decidir PUC vs PTJ na reavaliação.');
    ex.set('Ecografia sinovial (power Doppler)','Detecta sinovite subclínica. Ajuda a diferenciar AR activa vs "AR tipo OA" (sinóvia atrófica/fibrosa).');
    ex.set('RX mãos e pés (se AR suspeita)','Erosões precoces — estadiamento AR.');
    ex.set('⚠ Referenciar Reumatologia','Se doença inflamatória confirmada/suspeita — fundamental para estratégia Treat-to-Target. Controlo da doença antes de decisão cirúrgica.');
  }

  return {ddx,exams:[...ex.entries()].map(([n,w])=>({n,w}))};
}

// ============================================================
//  REAVALIAÇÃO — DECISION ENGINE (expanded from v4)
// ============================================================
function decideFU(a){
  const C=a.cart,M=a.menisc,AL=a.align||'neutral',ACL=a.acl,P=a.profile,AS=a.assoc||[],PR=a.proms;
  const dd=a.deformData||{};
  const oksScore=typeof a.oks_score==='number'?a.oks_score:null;
  const varus=AL==='mod'||AL==='sev', anyVar=AL==='mild'||varus;
  const hasDeformAnalysis=dd.hasMPTA||dd.hasLDFA;
  const aclDef=ACL==='def', young=P==='young', old=P==='older'||P==='comorbid';
  const ha=v=>AS.includes(v);
  const multi=ha('pf_severe')||ha('lat'), ptjAbs=ha('inflam_active')||ha('fixed');
  const inflammRemission=ha('inflam_remission');
  // OKS-based PROM note
  let pn='';
  if(oksScore!==null){
    let cat=oksScore<20?'severo (< 20)':oksScore<27?'moderado-severo (20–26)':oksScore<30?'moderado (27–29)':oksScore<40?'ligeiro (30–39)':'bom (≥ 40)';
    pn=`<div class="note"><strong>OKS pré-operatório: ${oksScore}/48</strong> — ${cat}. ${oksScore<27?'Forte indicação para intervenção.':oksScore<30?'Ponderar intervenção vs optimização conservador.':'Optimizar conservador; cirurgia se indicação mecânica.'} MCID = 5 pontos.</div>`;
  } else if(PR&&PR!=='skip'){
    pn=`<div class="note"><strong>PROMs:</strong> ${PR==='severe'?'OKS<20 — severo.':PR==='moderate'?'OKS 20–27 — moderado.':PR==='mild'?'OKS 28–35 — ligeiro.':'OKS>35 — bom.'}</div>`;
  }
  // Osteotomy label + site note (from numeric deformity analysis)
  const osteoLabel=(!hasDeformAnalysis)?'Osteotomia':dd.osteoSite==='dfo'?'DFO':dd.osteoSite==='dlo'?'DLO':'OWHTO';
  let osteoNote='';
  if(varus||anyVar){
    if(hasDeformAnalysis){
      osteoNote='<div class="note"><strong>Análise deformidade (ângulos mecânicos):</strong> HKA '+dd.hka+'° · Varo '+dd.varusTotal.toFixed(1)+'°'+(dd.hasMPTA?' · mMPTA '+dd.mpta+'°':'')+(dd.hasLDFA?' · mLDFA '+dd.mldfa+'°':'')+(dd.hasJLCA?' · JLCA '+dd.jlca+'°':'')+'<br><strong>Local:</strong> '+dd.osteoReason+'<br>'+(dd.hasMPTA&&dd.simMPTA?'<strong>MPTA simulado pós-HTO:</strong> '+dd.simMPTA.toFixed(1)+'°'+(dd.simMPTA>95?' ⚠ >95° — JLO excessiva → DLO':dd.simMPTA>94?' ⚠ limítrofe (>94°)':' ✓ aceitável')+'<br>':'')+(dd.jlcaNote?'<strong>JLCA:</strong> '+dd.jlcaNote+'<br>':'')+'<strong>Alvo:</strong> WBL 50–62% platô · MPTA ≤94° · JLO <5° (Consensus 2022 Grau B).</div>';
    } else if(dd.hka){
      osteoNote='<div class="note"><strong>HKA mec.: '+dd.hka+'° (varo '+dd.varusTotal.toFixed(1)+'°).</strong> mMPTA e mLDFA não disponíveis — <strong>essenciais para definir local osteotomia</strong>: se mMPTA <84° → HTO; se mLDFA >90° → DFO; ambos alterados → DLO. Se MPTA simulado >95° → DLO (Babis 2002; Schröter). Medir na telemetria.</div>';
    }
  }
  // Inflammatory remission advisory note — enriched with EPRD 2026, OA-like RA phenotype, Bio-OTA
  const inflammNote=inflammRemission?'<div class="note warn-box" style="border-left:4px solid #e67e22;padding:8px 12px;margin:8px 0;background:#fef9e7;"><strong>⚠ Artrite Inflamatória em Remissão — Fenótipo "AR tipo OA" — PUC/HTO Possível com Cautela</strong><br>'+
'<p style="margin:4px 0;">A artrite inflamatória era classicamente <strong>contraindicação absoluta</strong> para PUC e HTO. A revolução farmacológica (MTX + biológicos anti-TNF/IL-6/JAK) criou um <strong>novo fenótipo clínico</strong>: a "AR tipo OA" — doença controlada com desgaste unicompartimental mecânico focal (esclerose, osteófitos) em vez de erosões difusas e pan-sinovite.</p>'+
'<details style="margin:6px 0;"><summary style="cursor:pointer;font-weight:bold;color:#e67e22;">📊 Evidência — Registos e Estudos (clique para expandir)</summary>'+
'<ul style="margin:4px 0;">'+
'<li><strong>EPRD 2026 — Registo Alemão 2026</strong>: 793 AR vs 67.653 OA, pareamento Mahalanobis 1:5. <strong>Revisão major aos 2a: 3.5% AR vs 3.3% OA (p=0.860)</strong>; pareada 3.5% vs 3.1% (p=0.650). Revisão minor: 2.2% vs 1.3% (p=0.071); pareada 2.2% vs 1.5% (p=0.236). Sem diferença em revisões sépticas ou assépticas. <strong>Padrão comparável aos 9 anos</strong> (major pareada: 9.6% vs 9.6%, p=0.610). <em>O diagnóstico de AR per se não predispõe a falha mecânica precoce na era biológica.</em></li>'+
'<li><strong>Deckey 2024 Mayo Clinic — </strong>: Propensity-matched, n=1422 AR vs 1422 controlos (database 2010–2021): <strong>conversão PUC→PTJ 2a: 2.6% vs 2.0% (p=0.31); global: 3.4% vs 2.8% (p=0.45)</strong>. Conclusão explícita: "AR não é contraindicação para PUC".</li>'+
'<li><strong>Takahara 2025 — "Bio-OTA"</strong>: série de AR em remissão sob MTX + bDMARDs submetidos a HTO. JOA 63.6→90.7; VAS 48.6→11.4. <strong>Sem não-uniões</strong>, sem conversão a PTJ aos 5 anos. MTX em dose reumatológica não impediu consolidação.</li>'+
'<li><strong>UK KOG 2021 — Consenso</strong>: DMARDs modernos melhoraram significativamente o prognóstico; jovem com doença controlada não deve ser excluído de osteotomia.</li>'+
'<li><strong>EFORT 2018 Open Rev —</strong> Artropatia inflamatória <u>activa</u> promove OA multicompartimental e falência precoce PUC. Distinção activa vs remissão é portanto crítica.</li>'+
'<li><strong>EULAR 2022 —</strong> Remissão = DAS28 <2.6 ou CDAI ≤2.8 mantida ≥6m. DMARDs podem ser reduzidos (não parados) em remissão sustentada.</li>'+
'</ul></details>'+
'<details style="margin:6px 0;"><summary style="cursor:pointer;font-weight:bold;color:#e67e22;">🔍 Diferenciação Radiográfica: AR Activa vs "AR tipo OA"</summary>'+
'<table style="width:100%;border-collapse:collapse;font-size:0.85em;margin:4px 0;">'+
'<tr style="background:#fdebd0;"><th style="padding:4px;border:1px solid #e67e22;text-align:left;">Característica</th><th style="padding:4px;border:1px solid #e67e22;">AR Activa ❌</th><th style="padding:4px;border:1px solid #e67e22;">AR Remissão "OA-like" ✓</th></tr>'+
'<tr><td style="padding:3px;border:1px solid #ddd;">Perda cartilagem</td><td style="padding:3px;border:1px solid #ddd;text-align:center;">Difusa, bi/tricompartimental</td><td style="padding:3px;border:1px solid #ddd;text-align:center;">Focal, unicompartimental (medial)</td></tr>'+
'<tr><td style="padding:3px;border:1px solid #ddd;">Osso subcondral</td><td style="padding:3px;border:1px solid #ddd;text-align:center;">Osteopenia, erosões císticas, s/ osteófitos</td><td style="padding:3px;border:1px solid #ddd;text-align:center;">Esclerose, osteófitos marginais</td></tr>'+
'<tr><td style="padding:3px;border:1px solid #ddd;">Alinhamento</td><td style="padding:3px;border:1px solid #ddd;text-align:center;">Valgo severo, instabilidade</td><td style="padding:3px;border:1px solid #ddd;text-align:center;">Varo ou valgo ligeiro, ligamentos competentes</td></tr>'+
'<tr><td style="padding:3px;border:1px solid #ddd;">PCR / VS</td><td style="padding:3px;border:1px solid #ddd;text-align:center;">Elevados</td><td style="padding:3px;border:1px solid #ddd;text-align:center;">Normais ou levemente elevados</td></tr>'+
'<tr><td style="padding:3px;border:1px solid #ddd;">Sinóvia (intra-op)</td><td style="padding:3px;border:1px solid #ddd;text-align:center;">Hipertrófica, pannus activo</td><td style="padding:3px;border:1px solid #ddd;text-align:center;">Atrófica, fibrosa</td></tr>'+
'<tr style="background:#fdebd0;font-weight:bold;"><td style="padding:3px;border:1px solid #e67e22;">Indicação</td><td style="padding:3px;border:1px solid #e67e22;text-align:center;">→ PTJ</td><td style="padding:3px;border:1px solid #e67e22;text-align:center;">→ PUC / HTO possível</td></tr>'+
'</table></details>'+
'<details style="margin:6px 0;"><summary style="cursor:pointer;font-weight:bold;color:#e67e22;">📋 Critérios Obrigatórios e Monitorização</summary>'+
'<strong>Critérios para PUC/HTO:</strong>'+
'<ol style="margin:4px 0;">'+
'<li>Remissão clínica sustentada ≥6m (DAS28 <2.6 ou CDAI ≤2.8, EULAR 2022)</li>'+
'<li>Seguimento Reumatologia activo — DMARDs estáveis (biológicos ± MTX)</li>'+
'<li>Doença <strong>unicompartimental confirmada</strong> — sem erosões multicompartimentais</li>'+
'<li>LCA funcional + colaterais íntegros (critérios PUC standard)</li>'+
'<li>Ausência de sinovite activa clínica e imagiológica (ecografia/RM)</li>'+
'<li>Stock ósseo adequado (osteoporose severa = CI para HTO)</li>'+
'<li>Corticóide ≤10 mg/dia prednisona (doses altas = risco cicatrização)</li>'+
'</ol>'+
'<strong>Nuance Artrite Psoriática (AP):</strong> Tendência a artrofibrose > AR/OA. PUC (menor dissecção) pode ter vantagem na mobilização precoce. AP é formadora de osso (entesófitos) — fixação implante robusta mas risco ossificação heterotópica. <strong>CI absoluta:</strong> psoríase cutânea activa sobre incisão cirúrgica.'+
'<br><strong>Monitorização pós-op reforçada:</strong> Vigiar sinovite recorrente, progressão lateral/PF, flares. Se reactivação → converter PTJ. Manter DMARDs peri-op (coordenar c/ Reumatologia: suspender biológico 1 ciclo pré-op, reiniciar após cicatrização ferida; MTX — sem evidência forte para suspensão sistemática).'+
'<br><strong>Insight estratégico:</strong> Na era da longevidade aumentada, PUC/HTO em AR remissão é uma <em>estratégia estagiada</em> — "compra" 10–15 anos de joelho mais natural antes da eventual PTJ, cuja revisão (se necessária a partir de PUC) é mais simples que revisão de PTJ primária.'+
'</details></div>':'';
  const mk=(cat,t,b,r)=>({cat,title:t,body:b+(cat==='puc'||cat==='combo'||cat==='hto'?inflammNote:'')+osteoNote+pn,refs:r});

  // ── ABSOLUTE PTJ ──
  if(ptjAbs){let r=[];if(ha('inflam_active'))r.push('artrite inflamatória <strong>activa</strong>');if(ha('fixed'))r.push('deformidade fixa');
    return mk('ptj','PTJ — Indicação Absoluta',`<ul><li>${r.join('; ')}</li><li>CI absoluta PUC e HTO.</li>${ha('inflam_active')?'<li class="note"><strong>Doença inflamatória activa/não controlada (DAS28 >3.2):</strong><br>Pan-sinovite + pannus activo → destruição multicompartimental imprevisível. Osteopenia periarticular (citocinas IL-1/IL-6/TNF-α estimulam osteoclastos). Risco de: progressão rápida compartimento não resurfaçado (PUC), não-união (HTO), subsidência componente tibial.<br><strong>Marcadores de doença activa:</strong> PCR/VS elevados, rigidez matinal >30min, erosões difusas s/ osteófitos, estreitamento bi/tricompartimental, sinóvia hipertrófica hipervascular.<br><strong>Pathway:</strong><ol style="margin:4px 0;"><li><strong>Prioritário:</strong> Referir/articular com Reumatologia para controlo agressivo (MTX + biológicos, estratégia Treat-to-Target).</li><li>Se <strong>remissão sustentada</strong> alcançada (DAS28 <2.6 ≥6m, EULAR 2022) e padrão radiográfico evolui para "AR tipo OA" (desgaste focal medial + esclerose + osteófitos, compartimento lateral preservado) → <strong>reavaliar: PUC/HTO tornam-se opções viáveis</strong> (EPRD 2026: revisão 3.5% AR ≈ 3.3% OA; Deckey 2024: p=0.45).</li><li>Enquanto doença activa: <strong>PTJ é a única opção cirúrgica recomendada</strong> — remove toda cartilagem articular e maioria da sinóvia.</li></ol></li>':''}</ul>`,'AAOS 2024; EFORT 2018 Open Rev;3:442-448; Deckey 2024; EPRD 2026; EULAR 2022.');}
  // ── INFLAMMATORY REMISSION — PUC POSSIBLE ──
  if(inflammRemission&&!multi&&!ha('fixed')){
    // Not absolute CI — add warning note to be carried through decision
    // (handled below in PUC recommendations)
  }
  if((C==='kl4'||C==='kl3')&&multi) return mk('ptj','PTJ — Multicompartimental',`KL ${C.slice(2)} + ${ha('pf_severe')?'PF severa':''}${ha('lat')?' + lateral':''}. Exclui PUC.`,'AAOS 2024.');

  // ── BUCKET-HANDLE URGENCY ──
  if(M==='bh') return mk('repair','Reparação Meniscal Urgente (Bucket-Handle)'+(aclDef?' + Rec. LCA':'')+(varus?' + '+osteoLabel:''),
    `<strong>Bucket-handle deslocado — urgência relativa. Reparar, não ressecar.</strong>
<ul><li>Redução artroscópica + reparação (all-inside/inside-out, ≥ 3–4 suturas verticais, 1 sutura/5mm)</li>
<li><strong>Timing:</strong> Idealmente < 3 semanas. Prognóstico melhor se precoce. Rotura crónica não é CI se tecido viável.</li>
<li><strong>Idade:</strong> Reparar mesmo ≥ 60a se tecido não degenerado — sucesso clínico ~78% (Deichsel AJSM 2024).</li>
<li>Se tecido degenerado intra-op / multi-fragmentário irreparável → meniscectomia selectiva conservadora.</li>
${aclDef?'<li class="warn"><strong>LCA def:</strong> Rec. concomitante obrigatória — re-rotura 2× sem LCA funcional (taxa sucesso 60%→85% c/ LCA).</li>':''}
${varus?`<li><strong>Varo:</strong> ${osteoLabel} concomitante/staged protege reparação (sobrecarga medial ${anyVar?'presente':'possível'}).</li>`:''}
${(C==='kl3'||C==='kl4')?'<li class="warn"><strong>KL '+C.slice(2)+':</strong> Artrose avançada compromete resultado. Ponderar artroplastia se dor de carga domina sobre bloqueio.</li>':''}
</ul><div class="note"><strong>ESSKA 2019:</strong> "Numerosas roturas consideradas irreparáveis devem ser reparadas — roturas antigas, em obesos, roturas longas." <strong>Pós-op:</strong> 6 sem s/carga, ROM 0–90° 4 sem. Desporto 4–6m.</div>`,
    'ESSKA 2019/2024; Deichsel AJSM 2024.');

  // ── TRAUMATIC REPAIRABLE (LONGITUDINAL) ──
  if(M==='trauma_rep') return mk('repair','Reparação Meniscal'+(aclDef?' + Rec. LCA':'')+(varus?' + '+osteoLabel:''),
    `<strong>Longitudinal periférica reparável (red-red/red-white).</strong>
<ul><li><strong>Técnica:</strong> All-inside (suturas verticais) ou inside-out. Mínimo 1 sutura/5mm. Abrasão margens p/ estimular cicatrização.</li>
<li><strong>Sucesso:</strong> ~85% se <40a + cartilagem preservada + LCA funcional. Mas idade ≥60a não é CI se tecido viável (sucesso ~78%, Deichsel 2024).</li>
<li><strong>Timing:</strong> Quanto mais precoce, melhor. Roturas crónicas reparáveis se tecido não degenerado (ESSKA 2019).</li>
${aclDef?'<li class="warn"><strong>LCA def:</strong> Rec. concomitante obrigatória — re-rotura 2× sem LCA funcional.</li>':''}
${varus?`<li><strong>Varo:</strong> ${osteoLabel} concomitante protege reparação em varo significativo.</li>`:''}
${(C==='kl3'||C==='kl4')?'<li class="warn">Artrose avançada (KL '+C.slice(2)+') compromete resultados. Ponderar se reparação vale a pena vs artroplastia.</li>':''}
</ul><div class="note"><strong>ESSKA 2019:</strong> Preservação = 1ª linha. Resultados clínicos e radiológicos a longo prazo piores após meniscectomia parcial vs reparação. <strong>Pós-op:</strong> 6 sem s/carga, ROM 0–90°. Desporto 4–6m.</div>`,
    'ESSKA 2019/2024; Deichsel AJSM 2024.');

  // ── RAMP LESION ──
  if(M==='ramp') return mk('repair','Reparação Ramp Lesion'+(aclDef?' + Rec. LCA':'')+(varus?' + '+osteoLabel:''),
    `<strong>Ramp lesion — rotura meniscocapsular postero-medial.</strong>
<ul><li><strong>Diagnóstico:</strong> RM tem sensibilidade limitada (~65–72%). Procurar activamente via portal postero-medial artroscópico. Prevalência até 24% em rec. LCA.</li>
<li><strong>Classificação (Thaunat):</strong> Tipo 1 (meniscocapsular periférica) vs Tipo 2 (membrana sinovial + meniscocapsular) vs superiores (envolvem corno posterior).</li>
<li><strong>Técnica:</strong> Suturas all-inside (dispositivos específicos PM) ou sutura a céu aberto PM se necessário. Portal PM acessório para visualização.</li>
<li><strong>Reparar SEMPRE</strong> se identificada durante rec. LCA — taxa cicatrização >90% na presença de LCA funcional.</li>
${aclDef?'<li class="warn"><strong>LCA def:</strong> Ramp lesion frequentemente associada. Rec. LCA concomitante obrigatória — ramp não cicatriza em joelho instável.</li>':''}
${!aclDef?'<li><strong>Isolada (sem lesão LCA):</strong> Raro. Reparar se sintomática (dor PM, efusão recorrente, instabilidade rotacional). Conservador se estável e assintomática.</li>':''}
${varus?`<li>Varo: ${osteoLabel} concomitante se indicado pelo alinhamento.</li>`:''}
</ul><div class="note"><strong>Pós-op:</strong> Similar a reparação meniscal — 6 sem carga parcial. ROM progressiva. Desporto 4–6m.</div>`,
    'Thaunat 2016; Siboni Curr Rev 2023; ESSKA 2019/2024.');

  // ── RADIAL PERIPHERAL (REPAIRABLE) ──
  if(M==='radial_rep') return mk('repair','Reparação Radial'+(aclDef?' + Rec. LCA':'')+(varus?' + '+osteoLabel:''),
    `<strong>Rotura radial periférica — zona vascular reparável.</strong>
<ul><li><strong>Indicação:</strong> Radial incompleta na zona red-red/red-white. Restaura parcialmente hoop stresses se sutura horizontal (mattress) eficaz.</li>
<li><strong>Técnica:</strong> Suturas horizontais (mattress) cruzando plano da rotura. ≥ 2 suturas. Abrasão margens.</li>
<li><strong>Limitações:</strong> Radial completa na zona avascular (white-white) = mau potencial cicatrização → meniscectomia selectiva limitada ao tecido instável. Se radial completa atinge a raiz → classificar como root tear.</li>
${aclDef?'<li class="warn">LCA def: Rec. concomitante — instabilidade compromete cicatrização.</li>':''}
${varus?`<li>Varo: ${osteoLabel} concomitante protege reparação.</li>`:''}
</ul><div class="note"><strong>Evidência:</strong> Séries pequenas. Cicatrização inferior a longitudinal (~70% vs ~85%). Justifica-se pelo princípio de preservação meniscal. <strong>Pós-op:</strong> 6 sem s/carga.</div>`,
    'ESSKA 2019; Matsubara KSSTA 2019.');

  // ── PARAMENISCAL CYST ──
  if(M==='cyst'){
    let cc=C==='kl4'?'puc':'repair';
    return mk(cc, C==='kl4'?'PUC (KL4 + quisto)':'Descompressão Quisto + Trat. Meniscal',
    `<strong>Quisto parameniscal medial — associado a rotura horizontal.</strong>
<ul><li><strong>Conservador:</strong> Se ligeiro. Aspiração eco-guiada ± corticóide (recidiva ~33%).</li>
<li><strong>Cirurgia (sintomático/recorrente):</strong></li>
<li>· Descompressão artroscópica: single-leaf resection folha instável + eliminar "válvula"</li>
<li>· Excisão artroscópica directa (fat pad approach): preserva mais menisco, melhor p/ grandes/multiloculados</li>
<li>· Reparação + descompressão: se zona vascular, previne recidiva</li>
<li><strong>Princípio:</strong> Tratar a "válvula" (rotura), não o "balão" (quisto). Minimizar meniscectomia.</li>
<li>Cystectomia aberta: reservada > 4 cm ou recorrente.</li>
<li>Recorrência: artroscópica ~7% vs percutânea ~33%.</li>
${C==='kl3'||C==='kl4'?'<li>Artrose significativa: ponderar se quisto causa sintomas ou artrose domina.</li>':''}
</ul>`, 'Syst. Review Meniscal Cysts 2021.');
  }

  // ── DEGENERATIVE FLAP (MECHANICAL SYMPTOMS) ──
  if(M==='flap'){
    if(C==='kl4') return mk('puc','PUC (KL4 + flap)',`Artrose avançada + flap — artroplastia resolve ambos. Meniscectomia isolada KL4: NNT=50.`,'OMEX 2024.');
    return mk('repair','Meniscectomia Parcial Selectiva'+(varus&&young?' + '+osteoLabel:'')+(aclDef?' + Rec. LCA':''),
    `<strong>Flap/aba instável + sintomas mecânicos.</strong>
<ul><li><strong>ESSKA 2016/2024 — 1ª linha:</strong> Conservador 3–6 meses (fisioterapia, reforço muscular, perda ponderal, infiltrações). Meniscectomia parcial = 2ª linha.</li>
<li><strong>Indicação cirúrgica:</strong> Pseudobloqueio/catching PERSISTENTE após conservador ≥ 3 meses + correlação RM-clínica.</li>
<li><strong>Técnica:</strong> Ressecar APENAS tecido instável (flap). Preservar rim periférico máximo. Evitar meniscectomia extensa.</li>
<li><strong>Evidência:</strong> Sem sintomas mecânicos → meniscectomia NÃO superior a conservador (OMEX 10a: resultados equivalentes; FIDELITY: sem benefício; DREAM 2024: treino neuromuscular = cirurgia em roturas traumáticas estáveis).</li>
${varus?'<li>Varo + jovem: '+osteoLabel+' concomitante — meniscectomia em varo acelera artrose (cada 1° varo = +5% carga medial).</li>':''}
${aclDef?'<li class="warn">LCA def pode ser causa do catching → reconstruir antes de meniscectomia.</li>':''}
${C==='kl3'?'<li>KL 3: ponderar se bloqueio mecânico é causa principal vs dor artrótica de carga (→ PUC se dor domina).</li>':''}
</ul><div class="note"><strong>Critérios cirúrgicos:</strong> (1) Sintomas mecânicos, (2) Falência conservador ≥3m, (3) Correlação RM-clínica, (4) KL ≤2 = melhor resultado. <strong>Pós-op:</strong> Carga imediata. Desporto 4–6 sem.</div>`,
    'OMEX 10y 2024; ESSKA 2016/2024; FIDELITY 2020; DREAM 2024.');
  }

  // ── DEGENERATIVE HORIZONTAL ──
  if(M==='horiz'){
    if(C==='kl4') return mk('puc','PUC Medial','KL 4 + horizontal degenerativa → artroplastia.','AAOS 2024.');
    return mk('conserv','Conservador (Horizontal Degenerativa)',
    `<strong>Rotura horizontal degenerativa sem aba instável.</strong>
<ul><li><strong>ESSKA 2016/2024:</strong> Maioria assintomática ou responde a conservador. Fisioterapia = 1ª linha 3–6 meses.</li>
<li>Reabilitação + controlo ponderal + infiltrações (corticóide/ác. hialurónico).</li>
<li>Se quisto parameniscal associado → reclassificar e tratar como "Quisto parameniscal".</li>
<li><strong>Cirurgia</strong> (apenas se sintomas mecânicos persistentes > 3–6m): Single-leaf resection da folha instável. Preservar folha estável/periférica.</li>
<li><strong>Reparação:</strong> Raramente indicada na horizontal degenerativa (tecido sem potencial de cicatrização). Exceção: se zona vascular periférica e tecido viável.</li></ul>`,
    'ESSKA 2016/2024; OMEX 10y 2024.');
  }

  // ── DEGENERATIVE COMPLEX ──
  if(M==='complex'){
    if(C==='kl4') return mk('puc','PUC','KL 4 + complexa → artroplastia.','AAOS 2024.');
    if(C==='kl3'&&(old||!varus)) return mk('puc','PUC','KL 3 + complexa + perfil artroplastia.','AAOS 2024.');
    return mk('repair','Artroscopia: Avaliação + Meniscectomia Selectiva ± Reparação'+(young&&varus?' + '+osteoLabel:''),
    `<strong>Complexa (múltiplos planos) — avaliação artroscópica mandatória.</strong>
<ul><li><strong>ESSKA 2016/2024:</strong> Conservador 3–6 meses primeiro. Cirurgia apenas se sintomas mecânicos persistentes.</li>
<li><strong>Artroscopia:</strong> Avaliar cada componente individualmente:
  <ul style="margin-top:4px;margin-bottom:4px">
  <li>Componentes na zona vascular (red-red/red-white) → <strong>reparar</strong> se possível (longitudinal/radial periférica)</li>
  <li>Componentes na zona avascular com instabilidade → meniscectomia selectiva (APENAS o instável)</li>
  <li>Componentes estáveis assintomáticos → deixar in situ</li>
  </ul></li>
<li><strong>Princípio:</strong> Preservar o máximo de tecido meniscal. Combinar reparação + resseção selectiva na mesma sessão.</li>
${young&&varus?'<li>Jovem + varo: '+osteoLabel+' protege compartimento. Considerar transplante meniscal futuro se perda extensa pós-meniscectomia.</li>':''}
${aclDef?'<li class="warn">LCA def: Rec. concomitante se instabilidade presente.</li>':''}
</ul>`, 'ESSKA 2016/2024; AAOS 2024.');
  }

  // ── KL4 (sem lesão meniscal especial já tratada) ──
  if(C==='kl4'){
    if(aclDef) return mk('puc','PUC — ⚠ Avaliar LCA',
      `KL 4 isolada + LCA def.<ul><li>Oxford mobile: CI sem LCA.</li><li>Fixed-bearing: tolerável baixa demanda.</li><li>Rec. LCA staged → PUC. Ou PTJ.</li></ul>`,
      'Oxford criteria.');
    return mk('puc','PUC Medial',`KL 4 medial isolada — PUC preferencial.
<ul><li>Sobrevida 10a: ~99% Oxford cementless.</li>
${ha('pf_mild')?'<li>PF sem grooving: não compromete PUC.</li>':''}
${ha('sifk')?'<li>SIFK: boa indicação PUC.</li>':''}
</ul>`,'Kawada 2025.');
  }

  // ── KL3 ──
  if(C==='kl3'){
    const isRC=M==='ra'||M==='rc'||M==='ri', isRP=M==='rps'||M==='rpu';
    if(young&&varus){
      if(isRC){
        let t=M==='ri'?'Reconstrução Gracilis':'Pullout'+(M==='rc'?' + Release Capsular':'')+' + Centralização';
        
        return mk('combo',osteoLabel+' + '+t+(aclDef?' + Rec. LCA':''),
          `KL 3 + varo + jovem + root completa.<ul><li>${osteoLabel} + ${t}</li>
<li>HTO protege reparação (Tokumoto 2025: IKDC SMD 0.31, p=0.04).</li>
${aclDef?'<li class="warn">Rec. LCA concomitante.</li>':''}
</ul>`,'Tokumoto 2025; Singh 2025.');
      }
      if(isRP) return mk('hto','HTO'+(M==='rpu'?' + Rep. Root Parcial':'')+(aclDef?' + Rec. LCA':''),
        `KL 3 + varo + jovem + root parcial.<ul><li>OWHTO descomprime + protege raiz.</li>
${M==='rps'?'<li>Estável: monitorizar.</li>':'<li>Instável: reparar fibras.</li>'}
${aclDef?'<li class="warn">Rec. LCA concomitante.</li>':''}
</ul>`,'LaPrade 2015.');
      return mk('hto','HTO'+(aclDef?' + Rec. LCA':''),`KL 3 + varo + jovem.<ul><li>OWHTO correcção eixo.</li>
${aclDef?'<li class="warn">Rec. LCA concomitante/staged.</li>':''}
</ul>`,'Amendola; AAOS 2024.');
    }
    if(old||(P==='mid'&&!varus)){
      if(aclDef) return mk('puc','PUC — ⚠ LCA','KL 3 + perfil PUC + LCA def → avaliar opções.','Kozinn.');
      return mk('puc','PUC Medial',`KL 3 isolada — perfil artroplastia.${ha('pf_mild')?'<ul><li>PF sem grooving: OK.</li></ul>':''}`,'Kawada 2025.');
    }
    return mk('combo','HTO vs PUC — Decisão Partilhada',
      `<strong>Zona decisão partilhada</strong> — KL 3 + perfil intermédio.
<ul><li><strong>Pró-HTO:</strong> < 60a, varo > 3°, alta demanda.</li>
<li><strong>Pró-PUC:</strong> > 60a, baixa demanda.</li>
${(isRC||isRP)?'<li>Root: Se HTO → combinar reparação. Se PUC → abordada pela artroplastia.</li>':''}
${aclDef?'<li class="warn">LCA def → favorece HTO + Rec. LCA sobre PUC.</li>':''}
</ul>`,'UNIKORN 2023.');
  }

  // ── KL 0–2 + ROOT COMPLETE ──
  if((C==='kl01'||C==='kl2')&&(M==='ra'||M==='rc'||M==='ri')){
    let p=[M==='ri'?'Reconstrução Root (Gracilis)':'Reparação Root + Centralização'];
    if(varus)p.push(osteoLabel);if(aclDef)p.push('Rec. LCA');
    let t=M==='ra'?'aguda — timing óptimo':M==='rc'?'crónica — release capsular necessário':'irreparável — gracilis';
    return mk('repair',p.join(' + '),
      `<strong>Root completa ${t}.</strong>
<ul>${M!=='ri'?`<li><strong>Técnica:</strong> Pullout transtibial com 2 simple sutures. Decorticação footprint para cicatrização fibrocartilaginosa.</li>
<li><strong>Centralização mandatória</strong> se extrusão > 3mm — âncoras knotless no rim tibial ± reparação ligamento meniscotibial/MCL profundo. Técnica emergente que aborda a limitação principal da reparação da raiz (extrusão persistente, Krych 2024).</li>
${M==='rc'?'<li>Release capsular posterior extenso (tesouras rotativas). Se intraop tecido inviável → converter p/ gracilis.</li>':''}`:
`<li><strong>Reconstrução:</strong> Autoenxerto gracilis (split/completo) pelo túnel transtibial. Centralização concomitante.</li>`}
<li><strong>Resultados (meta-análise ≥5a):</strong> Progressão OA: 22% reparação vs 66% meniscectomia (OR 0.17). Conversão PTJ: 9.8% vs 36% (OR 0.15). Sobrevida 10a: 79.6% vs 44.4%.</li>
<li><strong>Custo-efectividade:</strong> Reparação é economicamente dominante a 10a ($22,590 vs $31,528 meniscectomia; Faucett AJSM 2019).</li>
<li><strong>Idade:</strong> Reparar mesmo ≥ 60a se cartilagem preservada — sucesso ~78% (Deichsel 2024). Idade NÃO é CI per se.</li>
${varus?`<li><strong>Varo:</strong> ${osteoLabel} concomitante protege reparação (Tokumoto 2025: IKDC SMD 0.31, p=0.04). HTO+Root > HTO isolada.</li>`:''}
${aclDef?'<li class="warn"><strong>LCA def:</strong> Rec. concomitante obrigatória. Planear túneis p/ evitar conflito root-LCA.</li>':''}
</ul><div class="note"><strong>Pós-op:</strong> 6 sem s/carga. ROM 0–90° desde D1. Carga progressiva 6–12 sem. Desporto 6–9m.</div>`,
    'Lee Arthroscopy 2025; Faucett AJSM 2019; Deichsel AJSM 2024; Krych 2024; Tokumoto 2025.');
  }

  // ── KL 0–2 + ROOT PARTIAL ──
  if((C==='kl01'||C==='kl2')&&(M==='rps'||M==='rpu')){
    if(M==='rps') return mk('conserv','Vigilância Activa'+(aclDef?' + Rec. LCA':'')+(varus?' (± HTO profiláctica)':''),
      `<strong>Root parcial estável (Tipo 1).</strong>
<ul><li>Vigilância: RM seriada 3 e 6m (progressão? extrusão > 3mm? edema subcondral?).</li>
<li>Adjuvante: reforço muscular, cunha lateral, controlo ponderal.</li>
<li>Se progressão → reclassificar parcial instável.</li>
${varus?'<li>Varo: ponderar HTO profiláctica.</li>':''}
${aclDef?'<li class="warn">LCA def: prioridade é rec. LCA — instabilidade acelera progressão.</li>':''}
</ul><div class="note">Tipo 1 = ~7% root tears. Sem séries comparativas dedicadas. Extrusão < 3mm com footprint intacto: prognóstico favorável curto prazo.</div>`,
      'LaPrade 2015; Garcia OJSM 2024.');
    // Partial unstable
    let p=['Rep. Root Parcial'];if(varus)p.push('HTO');if(aclDef)p.push('Rec. LCA');
    return mk('repair',p.join(' + '),
      `<strong>Root parcial instável (Tipo 1).</strong>
<ul><li>Desbridamento fibras instáveis + reparação remanescentes (all-inside ou pullout parcial).</li>
<li>Se intraop quase-completa → pullout standard.</li>
<li>Centralização se extrusão > 3mm. Evitar meniscectomia isolada.</li>
${varus?'<li>HTO protege reparação.</li>':''}
${aclDef?'<li class="warn">Rec. LCA concomitante.</li>':''}
</ul><div class="note">Se tecido inviável → gracilis. Pós-op: 6 sem. s/carga.</div>`,
      'LaPrade 2015; ESSKA 2024.');
  }

  // ── KL 0–2 INTACT MENISCUS ──
  if((C==='kl01'||C==='kl2')&&M==='intact'){
    if(varus&&C==='kl2') return mk('hto','HTO'+(aclDef?' + Rec. LCA':''),
      `KL 2 + varo + menisco íntegro.<ul><li>OWHTO correcção eixo.</li>
${aclDef?'<li class="warn">Rec. LCA concomitante/staged.</li>':''}
</ul>`,'AAOS 2024.');
    return mk('conserv','Conservador Optimizado'+(aclDef?' + Rec. LCA':''),
      `<strong>${C==='kl01'?'Cartilagem normal/quase normal':'KL 2'} sem rotura meniscal.</strong>
<ul><li>Reabilitação: fortalecimento quad/isquiotibiais.</li>
<li>Perda ponderal. Palmilhas cunha lateral se varo. Infiltrações.</li>
${aclDef?'<li class="warn">Rec. LCA: prevenir lesão meniscal secundária.</li>':''}
<li>Monitorização: RX carga anual.</li></ul>`,
      'ESSKA 2024; AAOS 2024.');
  }

  return mk('conserv','Avaliação Individualizada','Combinação requer avaliação individualizada.','');
}


// ══════════════════════════════════════════════════
// UI ENGINE — MAIN RENDER
// ══════════════════════════════════════════════════
function render(){
  const nav=$('nav'),lbl=$('nav-label');
  if(!PW){nav.classList.remove('vis');return renderPWSel();}
  nav.classList.add('vis');
  lbl.textContent=PW==='first'?'1ª Consulta — Anamnese → DDx → Exames':'Reavaliação — Diagnóstico → Decisão Terapêutica';
  const steps=PW==='first'?FC:FU;
  if(PW==='first'&&ans.loc&&ans.pattern){
    const si=steps.findIndex(s=>s.id==='signs');
    if(si>=0) steps[si].opts=getSigns(ans.loc,ans.pattern);
  }
  let h='';
  for(let i=0;i<steps.length;i++){
    const s=steps[i],done=isDone(s),active=i===cur;
    if(!done&&!active) continue;
    let vt='';
    if(done){
      if(s.type==='multi'){vt=(ans[s.id+'_multi']||[]).map(v=>{const o=s.opts.find(x=>x.v===v);return o?o.l:'';}).join(', ');}
      else if(s.type==='custom_deformity'){const d=ans.deformData||{};vt='HKA:'+(d.hka||'?')+'°'+(d.hasMPTA?' MPTA:'+d.mpta+'°':'')+(d.hasLDFA?' mLDFA:'+d.mldfa+'°':'');}
      else if(s.type==='custom_proms'){vt=ans.oks_score!=null?'OKS: '+ans.oks_score+'/48':'Saltado';}
      else{const o=s.opts.find(x=>x.v===ans[s.id]);vt=o?o.l:'';}
    }
    h+='<div class="step" style="animation-delay:'+i*.04+'s"><div class="step-head"><div class="sn '+(done?'ok':active?'on':'')+'">'+(done?'✓':(i+1))+'</div><div class="st">'+s.title+'</div>'+(done&&!active?'<div class="sv">'+vt+'</div><button class="s-edit" onclick="goTo('+i+')">Alterar</button>':'')+'</div>'+(active?renderBody(s,i):'')+'</div>';
  }
  if(cur>=steps.length){
    if(PW==='first') h+=renderFirstResult(decideFirst(ans));
    else h+=renderFollowupResult(decideFU(ans));
  }
  $('app').innerHTML=h;
  if(cur>0)setTimeout(function(){var e=document.querySelectorAll('.step,.result');if(e.length)e[e.length-1].scrollIntoView({behavior:'smooth',block:'start'});},80);
}

function renderPWSel(){$('app').innerHTML='<div class="path-sel"><div class="path-card" onclick="setPW(\'first\')"><div class="path-icon">🔍</div><div class="path-title">1ª Consulta</div><div class="path-desc">Anamnese → exame objectivo → diagnósticos diferenciais → exames a pedir.</div></div><div class="path-card" onclick="setPW(\'followup\')"><div class="path-icon">📋</div><div class="path-title">Reavaliação</div><div class="path-desc">Resultados exames → decisão terapêutica (HTO/DFO/DLO/PUC/PTJ/reparação meniscal).</div></div></div>';}

function renderBody(s,i){
  if(s.type==='custom_deformity') return renderDeformity(s,i);
  if(s.type==='custom_proms') return renderPROMs(s,i);
  if(s.type==='multi') return renderMulti(s,i);
  return '<div class="step-body"><div class="q">'+s.q+'</div>'+(s.classRef?'<div class="cref">'+linkRef(s.classRef)+'</div>':'')+'<div class="opts">'+s.opts.map(function(o){return '<div class="opt '+(ans[s.id]===o.v?'sel':'')+'" onclick="pick(\''+s.id+'\',\''+o.v+'\','+i+')"><div class="orad"></div><div><div class="ol">'+o.l+'</div>'+(o.d?'<div class="od">'+o.d+'</div>':'')+'</div></div>';}).join('')+'</div></div>';
}

function renderMulti(s,i){var sel=ans[s.id+'_multi']||[];
  return '<div class="step-body"><div class="q">'+s.q+'</div>'+(s.classRef?'<div class="cref">'+linkRef(s.classRef)+'</div>':'')+'<div class="opts">'+s.opts.map(function(o){return '<div class="mopt '+(sel.includes(o.v)?'sel':'')+'" data-v="'+o.v+'" onclick="toggleMulti(\''+s.id+'\',\''+o.v+'\','+i+')"><div class="mchk">'+(sel.includes(o.v)?'✓':'')+'</div><div><div class="ol">'+o.l+'</div>'+(o.d?'<div class="od">'+o.d+'</div>':'')+'</div></div>';}).join('')+'</div><div class="mnext"><button onclick="confirmMulti(\''+s.id+'\','+i+')">Confirmar →</button></div></div>';
}

function renderDeformity(s,i){const d=ans.deformData||{};
  return `<div class="step-body"><div class="q">${s.q}</div><div class="cref">${linkRef(s.classRef)}</div>
  <div style="margin-top:12px">
    <div class="num-input-row"><label>HKA mec. <span style="color:var(--red)">*</span></label><input type="number" id="inp_hka" value="${d.hka!=null?d.hka:''}" step="0.1" placeholder="ex: 175"><span class="unit">° — obrigatório</span></div>
    <div class="num-input-row"><label>mMPTA</label><input type="number" id="inp_mpta" value="${d.mpta!=null?d.mpta:''}" step="0.1" placeholder="opcional"><span class="unit">°</span><span class="hint">Origem tibial se &lt;84°</span></div>
    <div class="num-input-row"><label>mLDFA</label><input type="number" id="inp_mldfa" value="${d.mldfa!=null?d.mldfa:''}" step="0.1" placeholder="opcional"><span class="unit">°</span><span class="hint">Origem femoral se &gt;90°</span></div>
    <div class="num-input-row"><label>JLCA</label><input type="number" id="inp_jlca" value="${d.jlca!=null?d.jlca:''}" step="0.1" placeholder="opcional"><span class="unit">° (normal 0–2°)</span></div>
  </div>
  <div class="mnext" style="margin-top:12px"><button onclick="confirmDeformity(${i})">Confirmar Análise →</button></div></div>`;
}

function confirmDeformity(idx){
  const hkaRaw=document.getElementById('inp_hka').value;
  if(!hkaRaw){alert('HKA mecânico é obrigatório.');return;}
  const hka=parseFloat(hkaRaw);
  const mptaR=document.getElementById('inp_mpta').value,mldfaR=document.getElementById('inp_mldfa').value,jlcaR=document.getElementById('inp_jlca').value;
  const mpta=mptaR?parseFloat(mptaR):null,mldfa=mldfaR?parseFloat(mldfaR):null,jlca=jlcaR?parseFloat(jlcaR):null;
  const varusTotal=180-hka;
  const hasMPTA=mpta!==null,hasLDFA=mldfa!==null,hasJLCA=jlca!==null;
  const tibialDeform=hasMPTA?(87-mpta):null,femoralDeform=hasLDFA?(mldfa-87):null;
  const simMPTA=hasMPTA?(mpta+varusTotal+3):null;
  let osteoSite='hto',osteoReason='';
  if(hasMPTA&&hasLDFA){
    if(mpta<84&&mldfa<=90){osteoSite='hto';osteoReason='Origem tibial (mMPTA < 84°): OWHTO indicada.';}
    else if(mldfa>90&&mpta>=84){osteoSite='dfo';osteoReason='Origem femoral (mLDFA > 90°): DFO medial closing-wedge indicada.';}
    else if(mldfa>90&&mpta<84){osteoSite='dlo';osteoReason='Deformidade mista (tibial+femoral): DLO a considerar.';}
    else if(simMPTA>95){osteoSite='dlo';osteoReason='HTO isolada criaria MPTA simulado '+simMPTA.toFixed(1)+'° (>95°) → JLO excessiva → DLO (Babis 2002; Schröter 2017).';}
    else{osteoSite='hto';osteoReason='Deformidade predominantemente tibial. OWHTO indicada.';}
  } else {
    let missing=[];if(!hasMPTA)missing.push('mMPTA');if(!hasLDFA)missing.push('mLDFA');
    osteoReason='Local indeterminado — '+missing.join(' e ')+' não fornecido(s). Medir na telemetria em carga.';
  }
  let jlcaNote='';
  if(hasJLCA){
    if(jlca>2){const c=((jlca-2)/2).toFixed(1);jlcaNote='JLCA '+jlca+'° > 2° → deformidade intra-articular. Correcção estimada: ~'+c+'° (Micicoi/Kley: (JLCA−2)/2). Subtrair à correcção óssea. Se > 6°: técnicas especiais (osteotomia condiliana, correcção gradual, DLO).';}
    else jlcaNote='JLCA ≤ 2°: sem ajuste intra-articular necessário.';
  } else jlcaNote='JLCA não fornecido — se > 2° poderá haver deformidade intra-articular → risco sobrecorrecção. Medir.';
  ans.deformData={hka,mpta,mldfa,jlca,varusTotal,tibialDeform,femoralDeform,simMPTA,osteoSite,osteoReason,jlcaNote,hasMPTA,hasLDFA,hasJLCA};
  ans.deform_done=true;
  if(varusTotal<=0)ans.align='neutral';else if(varusTotal<=3)ans.align='mild';else if(varusTotal<=5)ans.align='mod';else ans.align='sev';
  jumpNext();
}

function renderPROMs(s,i){
  let h=`<div class="step-body"><div class="q">${s.q}</div>${s.classRef?`<div class="cref">${linkRef(s.classRef)}</div>`:''}
  <div class="mnext" style="margin-bottom:12px"><button onclick="skipPROMs(${i})">Saltar PROMs →</button></div>
  <div class="prom-form" data-idx="${i}"><h3>Oxford Knee Score (OKS) — 12 perguntas (últimas 4 semanas)</h3>`;
  OKS_Q.forEach((q,qi)=>{
    h+=`<div class="prom-q"><div class="prom-q-text">${qi+1}. ${q.q}</div><div class="prom-opts">`;
    q.opts.forEach((o,oi)=>{h+=`<div class="prom-opt ${promData['oks_'+qi]===oi?'sel':''}" onclick="setProm(${qi},${oi})">${o}</div>`;});
    h+=`</div></div>`;
  });
  let total=0,answered=0;
  OKS_Q.forEach((_,qi)=>{if(promData['oks_'+qi]!==undefined){total+=OKS_Q[qi].sc[promData['oks_'+qi]];answered++;}});
  const complete=answered===12;
  const scoreText=complete?total:(answered>0?total+' ('+answered+'/12)':'—');
  const interp=complete?(total<20?'Função severamente limitada — forte indicação intervenção':total<27?'Limitação significativa — indicação cirúrgica provável':total<30?'Limitação moderada — ponderar intervenção vs optimização':total<40?'Limitação ligeira — optimizar conservador':'Função satisfatória — manter conservador'):'';
  h+=`<div class="prom-score"><div>OKS: <span class="score-num">${scoreText}</span> / 48</div>${interp?'<div style="margin-top:4px;font-size:11px;color:var(--t3)">'+interp+'</div>':''}</div>`;
  h+=`<div class="mnext prom-confirm-area" style="margin-top:8px">${complete?'<button onclick="confirmPROMs('+total+','+i+')">Confirmar OKS '+total+'/48 →</button>':''}</div>`;
  h+=`</div></div>`;
  return h;
}
function setProm(qi,oi){
  promData['oks_'+qi]=oi;
  const container=document.querySelector('.prom-form');
  if(container){
    container.querySelectorAll('.prom-q')[qi]?.querySelectorAll('.prom-opt').forEach((el,i)=>el.classList.toggle('sel',i===oi));
    let total=0,answered=0;
    OKS_Q.forEach((_,i)=>{if(promData['oks_'+i]!==undefined){total+=OKS_Q[i].sc[promData['oks_'+i]];answered++;}});
    const complete=answered===12;
    const interp=complete?(total<20?'Função severamente limitada — forte indicação intervenção':total<27?'Limitação significativa — indicação cirúrgica provável':total<30?'Limitação moderada':total<40?'Limitação ligeira':'Função satisfatória'):'';
    const se=container.querySelector('.prom-score');
    if(se)se.innerHTML='<div>OKS: <span class="score-num">'+(complete?total:(answered>0?total+' ('+answered+'/12)':'—'))+'</span> / 48</div>'+(interp?'<div style="margin-top:4px;font-size:11px;color:var(--t3)">'+interp+'</div>':'');
    const ca=container.parentElement.querySelector('.prom-confirm-area');
    if(ca)ca.innerHTML=complete?'<button onclick="confirmPROMs('+total+','+container.dataset.idx+')">Confirmar OKS '+total+'/48 →</button>':'';
  } else render();
}
function skipPROMs(idx){ans.oks_score=undefined;ans.proms='skip';ans.proms_done=true;jumpNext();}
function confirmPROMs(score,idx){ans.oks_score=score;ans.proms=score<20?'severe':score<27?'moderate':score<30?'moderate_mild':score<40?'mild':'good';ans.proms_done=true;jumpNext();}

// ── RESULTS ──
function renderFirstResult(r){
  let h='<div class="result exams"><div class="rtag exams">Diagnósticos Diferenciais</div><div class="rh">Hipóteses por probabilidade</div>';
  r.ddx.forEach(d=>{h+=`<div class="ddx"><div class="ddx-header"><div class="ddx-name">${d.name}</div><div class="ddx-prob ${d.prob}">${d.prob==='likely'?'Provável':'Possível'}</div></div><div class="ddx-keys">${d.keys}</div><div class="ddx-exam"><strong>Exame:</strong> ${d.exam}</div></div>`;});
  h+='</div>';
  if(r.exams.length){h+='<div class="exam-panel"><div class="exam-cat-title">Exames a Pedir</div>';r.exams.forEach(e=>{h+=`<div class="exam-item"><div class="ei-name">${e.n}</div><div class="ei-why">${e.w}</div></div>`;});h+='</div>';}
  return h;
}

// Compound keys: "ESSKA 2016/2024" or "ESSKA 2019/2024" should resolve to two links
function linkRef(txt){
  if(!txt)return '';
  let out=txt;
  // First resolve compound year forms: "ESSKA 2016/2024" → two links
  out=out.replace(/ESSKA\s+2016\/2024/g,function(){
    const a=defined_REF['ESSKA 2016'],b=defined_REF['ESSKA 2024'];
    return '<a href="'+a[1]+'" target="_blank" rel="noopener" class="ref-link">ESSKA 2016</a>/<a href="'+b[1]+'" target="_blank" rel="noopener" class="ref-link">2024</a>';
  });
  out=out.replace(/ESSKA\s+2019\/2024/g,function(){
    const a=defined_REF['ESSKA 2019'],b=defined_REF['ESSKA 2024'];
    return '<a href="'+a[1]+'" target="_blank" rel="noopener" class="ref-link">ESSKA 2019</a>/<a href="'+b[1]+'" target="_blank" rel="noopener" class="ref-link">2024</a>';
  });
  // Now replace individual tokens, longest first to avoid partial matches
  const keys=Object.keys(defined_REF).sort((a,b)=>b.length-a.length);
  keys.forEach(k=>{
    const url=defined_REF[k][1];
    const esc=k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    // Only replace if not already inside an <a> tag
    out=out.replace(new RegExp('(?!<a[^>]*>)'+esc+'(?![^<]*<\\/a>)','g'),
      '<a href="'+url+'" target="_blank" rel="noopener" class="ref-link">'+k+'</a>');
  });
  return out;
}

function renderFollowupResult(r){
  const cn=r.cat,cnl={repair:'Reparação / Preservação',hto:'Osteotomia',puc:'PUC Medial',ptj:'PTJ',conserv:'Conservador',combo:'Combinado / Decisão Partilhada'};
  let h=`<div class="result ${cn}"><div class="rtag ${cn}">${cnl[cn]||cn}</div><div class="rh">${r.title}</div><div class="rb">${linkRef(r.body)}</div>`;
  if(r.refs)h+=`<details class="rrefs"><summary>Referências</summary><p>${linkRef(r.refs)}</p></details>`;
  h+='</div>';return h;
}

// ── INTERACTIONS ──
function jumpNext(){const steps=PW==='first'?FC:FU;let n=steps.length;for(let i=0;i<steps.length;i++){if(!isDone(steps[i])){n=i;break;}}cur=n;render();}
function setPW(p){PW=p;cur=0;ans={};promData={};render();}
function resetPW(){PW=null;cur=0;ans={};promData={};render();}
function isDone(s){if(s.type==='multi')return ans[s.id+'_done']===true;if(s.type==='custom_deformity')return ans.deform_done===true;if(s.type==='custom_proms')return ans.proms_done===true;return ans[s.id]!==undefined;}
function pick(sid,val,idx){ans[sid]=val;jumpNext();}
function toggleMulti(sid,val,idx){
  let arr=ans[sid+'_multi']||[];
  if(val==='none'||val==='none_sig'){arr=[val];}else{arr=arr.filter(v=>v!=='none'&&v!=='none_sig');if(sid==='assoc'){if(val==='pf_mild')arr=arr.filter(v=>v!=='pf_severe');if(val==='pf_severe')arr=arr.filter(v=>v!=='pf_mild');if(val==='inflam_active')arr=arr.filter(v=>v!=='inflam_remission');if(val==='inflam_remission')arr=arr.filter(v=>v!=='inflam_active');}if(arr.includes(val))arr=arr.filter(v=>v!==val);else arr.push(val);}
  if(!arr.length)arr=['none'];ans[sid+'_multi']=arr;ans[sid+'_done']=false;
  const container=document.querySelectorAll('.step')[Array.from(document.querySelectorAll('.step')).findIndex((_,j)=>{const h=_.querySelector('.st');return h&&h.textContent===(PW==='first'?FC:FU).find(s=>s.id===sid)?.title;})];
  if(container){container.querySelectorAll('.mopt').forEach(el=>{const v=el.getAttribute('data-v');if(v){const s=arr.includes(v);el.classList.toggle('sel',s);const chk=el.querySelector('.mchk');if(chk)chk.textContent=s?'✓':'';}});}else render();
}
function confirmMulti(sid,idx){const arr=ans[sid+'_multi']||['none'];if(sid==='assoc')ans.assoc=arr;if(sid==='signs')ans.signs_multi=arr;if(sid==='hx')ans.hx_multi=arr;ans[sid+'_done']=true;jumpNext();}
function goTo(idx){
  const s=(PW==='first'?FC:FU)[idx];
  delete ans[s.id];delete ans[s.id+'_multi'];delete ans[s.id+'_done'];
  if(s.type==='custom_deformity'){delete ans.deform_done;delete ans.deformData;delete ans.align;}
  if(s.type==='custom_proms'){delete ans.proms_done;delete ans.oks_score;delete ans.proms;}
  cur=idx;render();
}
function restart(){ans={};cur=0;promData={};render();window.scrollTo({top:0,behavior:'smooth'});}
