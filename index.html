          };
        }

        // ICRS IV Displaced
        if (icrs === 'iv') {
          var restMethod = ocdSize === 'lt2' ? 'Microfractura / AMIC' : ocdSize === '2to4' ? 'OATS / Mosaicplastia' : 'ACI / Osteochondral Allograft';
          return {
            cat: loose !== 'no' ? 'bone_urgent' : 'bone_restore', title: (loose !== 'no' ? '🚨' : '🔄') + ' OCD (ICRS IV) — Restauração',
            body: '<ul>'
              + (loose !== 'no' ? '<li><strong>Remoção artroscópica do corpo livre</strong></li>' : '')
              + '<li><strong>Se fragmento viável + fresco:</strong> Fixação</li>'
              + '<li><strong>Se inviável/crónico:</strong> Remoção + restauração</li>'
              + '<li>Tamanho ' + (ocdSize === 'lt2' ? '<2cm²' : ocdSize === '2to4' ? '2-4cm²' : '>4cm²') + ' → <strong>' + restMethod + '</strong></li>'
              + '</ul>',
            refs: 'ICRS · PMC 2021 · PMC 2022'
          };
        }
      }

      // ═══ OSTEOCHONDRAL FRACTURE ═══
      if (diag === 'osteo_fx') {
        var ctx = a.ofx_context || 'direct';
        var frag = a.ofx_frag || 'small';
        var oloose = a.ofx_loose || 'no';

        if (oloose === 'lock') {
          return {
            cat: 'bone_urgent', title: '🚨 Fractura Osteocondral — Corpo Livre com Bloqueio',
            body: '<ul>'
              + '<li><strong>Artroscopia urgente:</strong> Remoção ou fixação</li>'
              + '<li>Se fragmento ≥1cm com osso subcondral → fixação</li>'
              + '<li>Se pequeno/cartilagem → remoção + microfractura se leito >2cm²</li>'
              + (ctx === 'patdisloc' ? '<li><strong>⚠ Luxação patelar:</strong> Tratar instabilidade patelar (MPFL) → Redirigir módulo PF</li>' : '')
              + '</ul>',
            refs: 'RadioGraphics 2018'
          };
        }

        if (frag === 'large_bone') {
          return {
            cat: 'bone_fixation', title: '🔧 Fractura Osteocondral — Fixação Artroscópica',
            body: '<ul>'
              + '<li><strong>Fragmento ≥1cm com osso subcondral → Fixação artroscópica/aberta</strong></li>'
              + (ctx === 'patdisloc' ? '<li><strong>⚠ Luxação patelar:</strong> MPFL repair/reconstrução simultânea ou estadiada → módulo PF</li>' : '')
              + '</ul>',
            refs: ''
          };
        }

        var ofxBody = '<ul>'
          + '<li><strong>Fragmento pequeno / cartilagem pura:</strong> Remoção</li>'
          + '<li>Se leito osteocondral >2cm² → microfractura / AMIC</li>';
        if (ctx === 'patdisloc')
          ofxBody += '<li><strong>⚠ Luxação patelar:</strong> Tratar instabilidade (MPFL) → módulo PF</li>';
        ofxBody += '</ul>';

        return {
          cat: ctx === 'patdisloc' ? 'bone_redirect' : 'bone_conserv',
          title: (ctx === 'patdisloc' ? '↩ ' : '🩹 ') + 'Fractura Osteocondral — ' + (ctx === 'patdisloc' ? 'Redirect PF + Tratamento Leito' : 'Remoção + Tratamento Leito'),
          body: ofxBody, refs: ''
        };
      }

      // ═══ ON SECONDARY ═══
      if (diag === 'on_secondary') {
        var cause = a.on_cause || 'idiopathic';
        var bilat = a.on_bilat || 'uni';
        var ficat = a.on_ficat || 'f01';
        var compart = a.on_compart || 'uni';

        var causeLabel = { steroids: 'corticoterapia', alcohol: 'etilismo', sickle: 'drepanocitose', autoimmune: 'LES/autoimune', post_arthro: 'pós-artroscopia', covid: 'pós-COVID-19', idiopathic: 'idiopática' }[cause] || cause;

        var bilatFlag = bilat === 'bilat' ? '<div class="note" style="border-left:4px solid var(--red);padding:8px 12px;margin:8px 0;font-size:12px"><strong>⚠ ON Bilateral — Rastreio sistémico obrigatório + referenciação reumatologia.</strong></div>' : '';
        var covidFlag = cause === 'covid' ? '<div class="note" style="border-left:4px solid var(--amber);padding:8px 12px;margin:8px 0;font-size:12px"><strong>⚠ ON pós-COVID-19:</strong> Necrose mais precoce com doses inferiores de corticóides (Za P 2025). Monitorização apertada.</div>' : '';

        if (ficat === 'f4') {
          return {
            cat: 'bone_replace', title: '🔄 ON Secundária Ficat IV — Artroplastia',
            body: bilatFlag + covidFlag + '<ul>'
              + '<li><strong>Tratar/remover causa:</strong> ' + causeLabel + '</li>'
              + '<li><strong>' + (compart === 'uni' ? 'UKA' : 'PTJ') + '</strong> — ' + (compart === 'uni' ? 'Unicompartimental' : 'Multicondiliar → PTJ') + '</li>'
              + '</ul>',
            refs: 'Za P 2025'
          };
        }
        if (ficat === 'f3') {
          return {
            cat: compart === 'uni' ? 'bone_fixation' : 'bone_replace',
            title: (compart === 'uni' ? '🔧' : '🔄') + ' ON Secundária Ficat III — ' + (compart === 'uni' ? 'Core Decompression' : 'Artroplastia'),
            body: bilatFlag + covidFlag + '<ul>'
              + '<li><strong>Tratar/remover causa:</strong> ' + causeLabel + '</li>'
              + (compart === 'uni' ? '<li><strong>Core decompression ± enxerto</strong> — Colapso focal</li>' : '<li><strong>PTJ</strong> — Colapso extenso multicondiliar</li>')
              + '</ul>',
            refs: 'Za P 2025'
          };
        }
        // Ficat 0-II
        return {
          cat: 'bone_conserv', title: '🩹 ON Secundária Ficat 0-II — Conservador',
          body: bilatFlag + covidFlag + '<ul>'
            + '<li><strong>Tratar/remover causa:</strong> ' + causeLabel + (cause === 'steroids' ? ' — reduzir dose' : cause === 'alcohol' ? ' — cessação' : '') + '</li>'
            + '<li><strong>Descarga parcial + bifosfonatos</strong></li>'
            + '<li>Monitorização RM</li>'
            + (bilat === 'bilat' ? '<li>Referenciação reumatologia para rastreio sistémico</li>' : '')
            + '</ul>',
          refs: 'Za P 2025'
        };
      }

      return { cat: 'bone_conserv', title: 'Dados Insuficientes', body: '<p>Informação incompleta para recomendação. Completar avaliação imagiológica.</p>', refs: '' };
    }

    function decideTend(a) {
      // Red flag check
      const rf = a.tend_rf_multi || ['none'];
      if (rf.some(v => v !== 'none')) {
        const flags = [];
        if (rf.includes('ottawa')) flags.push('<li class="warn"><strong>⚠ Regras de Ottawa positivas</strong> — RX urgente para exclusão de fractura. NÃO prosseguir com módulo de tendinopatias.</li>');
        if (rf.includes('wells')) flags.push('<li class="warn"><strong>⚠ Suspeita de Trombose Venosa Profunda (Wells ≥2)</strong> — Eco Doppler venoso URGENTE. Não mobilizar até exclusão.</li>');
        if (rf.includes('compart')) flags.push('<li class="warn"><strong>⚠ Suspeita Síndrome Compartimental</strong> — Medir pressões compartimentais. Fasciotomia se confirmado. URGÊNCIA CIRÚRGICA.</li>');
        if (rf.includes('septic')) flags.push('<li class="warn"><strong>⚠ Suspeita Séptica</strong> — Aspiração diagnóstica + análise laboratorial. Antibioterapia empírica. Bursectomia se refractária.</li>');
        return {
          cat: 'tend_redflag', title: '🚩 Red Flag — Encaminhamento Urgente',
          body: '<ul>' + flags.join('') + '</ul><div class="note">Este módulo NÃO é o percurso adequado. Tratar a urgência antes de reavaliar patologia tendinosa/muscular.</div>',
          refs: ''
        };
      }

      const path = a.tend_path;
      const site = a.tend_bamic_site;
      const grade = a.tend_bamic_grade;
      const cook = a.tend_cook;
      const chron = a.tend_chron;
      const img = a.tend_img;
      const prev = (a.tend_prev_multi || ['none']);
      const hasPrev = v => prev.includes(v);

      // Patient context
      const age = patCtx.ctx_age_val || 45;
      const tegner = patCtx.ctx_tegner || 't3_4';
      const comorbid = patCtx.ctx_comorbid_multi || ['none'];
      const hasCM = v => comorbid.includes(v);
      const isAthlete = tegner === 't7_8' || tegner === 't9_10';
      const isYoung = age < 16;

      // Metabolic alert
      let metabAlert = '';
      const metabFlags = [];
      if (hasCM('dm')) metabFlags.push('Diabetes mellitus');
      if (hasCM('dyslipid')) metabFlags.push('Dislipidemia');
      if (hasCM('irc')) metabFlags.push('Insuficiência renal crónica');
      if (hasCM('cortico_sys')) metabFlags.push('Corticoterapia sistémica');
      if (hasCM('fluoroquin')) metabFlags.push('Fluoroquinolonas');
      if (hasCM('inflam')) metabFlags.push('Doença inflamatória');
      if (metabFlags.length > 0) {
        metabAlert = '<div style="margin:10px 0;padding:10px 12px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.35);border-radius:8px;font-size:12px;line-height:1.6">'
          + '<strong style="color:var(--amber)">⚠ CONDICIONANTE METABÓLICA</strong><br>'
          + metabFlags.join(', ') + ' — homeostase tendinosa comprometida.<br>'
          + '→ Tempo de cicatrização potencialmente 1.5–2× superior. Vigilância reforçada.'
          + (hasCM('fluoroquin') ? '<br>→ <strong>Fluoroquinolonas: suspender se possível</strong> (risco rotura agravado).' : '')
          + '</div>';
      }

      // Imaging alert
      let imgAlert = '';
      if (path === 'musc_soleo' && img === 'us_done') imgAlert = '<li class="warn">⚠ Ecografia insuficiente para sóleo — RM obrigatória para diagnóstico e classificação BAMIC.</li>';
      if (path === 'musc_quad_rf' && (img === 'us_done')) imgAlert = '<li class="warn">⚠ Tendão intramuscular central profundo do recto femoral — ecografia pode subestimar extensão. RM recomendada para classificação BAMIC precisa.</li>';
      if (path === 'hoffa' && img !== 'mri_done' && img !== 'both') imgAlert = '<li class="warn">⚠ RM obrigatória para confirmar conflito da gordura de Hoffa e exclusão de patologia meniscal/condral.</li>';

      // Age alert for osgood/slj
      if ((path === 'osgood' || path === 'slj') && age >= 16) {
        imgAlert += '<li class="warn">⚠ Diagnóstico atípico em adultos (≥16 anos). Considerar tendinopatia insercional ou fractura de stress.</li>';
      }

      // BAMIC "c" alert
      let bamicCAlert = '';
      if (site === 'c') bamicCAlert = '<div style="margin:10px 0;padding:10px 12px;background:rgba(251,113,133,.1);border:1px solid rgba(251,113,133,.35);border-radius:8px;font-size:12px;line-height:1.6">'
        + '<strong style="color:var(--red)">⚠ LESÃO INTRATENDINOSA (BAMIC site "c")</strong><br>'
        + 'Tempo de recuperação significativamente prolongado (2–4 meses). Taxa de recidiva >2× superior a lesões miofasciais ou da junção miotendínea.<br>'
        + '<strong>NÃO acelerar protocolo mesmo que assintomático precocemente.</strong></div>';

      // Garrick test mandate for popliteus
      let garrickNote = '';
      if (path === 'tend_pop') garrickNote = '<li><strong>Critério diagnóstico obrigatório:</strong> Teste de Garrick positivo (dor na rotação externa resistida da tíbia a 90° de flexão). Se negativo → reconsiderar diagnóstico (menisco lateral? síndrome do trato iliotibial? canto posterolateral?).</li>';

      const alerts = metabAlert + bamicCAlert + (imgAlert ? '<ul>' + imgAlert + '</ul>' : '');

      // Prev treatment contextual notes (injected into any result)
      let prevNotes = '';
      const prevItems = [];
      if (hasPrev('nsaids')) prevItems.push('AINEs já utilizados — não repetir como primeira linha se sem resposta prévia. Considerar tópico se oral prévio, ou vice-versa.');
      if (hasPrev('isometric') && !hasPrev('hsr_ecc') && TEND_IDS.includes(path)) prevItems.push('Isométrico prévio sem progressão para Resistência Pesada e Lenta — <strong>prioridade: iniciar programa de carga progressiva</strong> (isométrico isolado é insuficiente para remodelação tendinosa a longo prazo).');
      if (hasPrev('cs_infiltr') && TEND_IDS.includes(path)) prevItems.push('Corticosteróide prévio — evitar repetição (benefício decrescente, risco cumulativo de atrofia tecidular). Ponderar PRP como alternativa biológica.');
      if (hasPrev('surgery')) prevItems.push('<strong>Cirurgia prévia nesta patologia</strong> — recidiva pós-operatória. Reavaliar factores mecânicos não corrigidos. Limiar mais alto para re-intervenção. Reabilitação intensiva prioritária.');
      if (chron === 'recurrence') prevItems.push('<strong>Recidiva:</strong> Identificar factores de risco modificáveis (biomecânica, carga treino, calçado, superficie). Programa de prevenção secundária obrigatório (Nordic Hamstring Exercise ou excêntrico de manutenção 2×/semana indefinidamente).');
      if (hasPrev('prp') && !hasPrev('hsr_ecc') && TEND_IDS.includes(path)) prevItems.push('PRP prévio SEM programa de carga mecânica — PRP isolado tem eficácia limitada. <strong>Associar obrigatoriamente Resistência Pesada e Lenta / excêntrico.</strong>');
      if (prevItems.length > 0) {
        prevNotes = '<div style="margin:10px 0;padding:10px 12px;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.25);border-radius:8px;font-size:12px;line-height:1.6">'
          + '<strong style="color:var(--blue)">📋 AJUSTE — TRATAMENTOS PRÉVIOS</strong><ul style="margin:4px 0 0 14px">'
          + prevItems.map(i => '<li>' + i + '</li>').join('') + '</ul></div>';
      }

      // ─── TENDINOPATIA PATELAR ───
      if (path === 'tend_pat') {
        if (cook === 'degenerative' && hasPrev('prp') && (chron === 'chronic' || hasPrev('hsr_ecc'))) {
          return {
            cat: 'tend_surgery', title: 'Opções Cirúrgicas — Tendinopatia Patelar Refractária',
            body: alerts + prevNotes + '<ul><li>Falência de tratamento conservador ≥6 meses (Resistência Pesada e Lenta + PRP) sem melhoria.</li>'
              + '<li><strong>Artroscopia:</strong> Desbridamento tendão + shaving pólo inferior patela. Excisão tecido degenerativo.</li>'
              + '<li><strong>Cirurgia aberta:</strong> Tenotomia longitudinal + excisão zona degenerativa + reparação (se área extensa / calcificação).</li>'
              + '<li>Expectativas: recuperação lenta (6–12 meses para retorno pleno).</li></ul>'
              + '<div class="note"><strong>PROMs:</strong> VISA-P obrigatório pré-operatório e no follow-up (6 sem, 3m, 6m).</div>',
            refs: 'Cook & Purdam BJSM 2009; Kongsgaard SJMSS 2009; Coombes Lancet 2010'
          };
        }
        if ((cook === 'degenerative' || cook === 'dysrepair') && chron === 'chronic' && hasPrev('hsr_ecc') && !hasPrev('prp')) {
          return {
            cat: 'tend_infiltr', title: 'PRP Intratendinoso — Tendinopatia Patelar',
            body: alerts + prevNotes + '<ul><li><strong>PRP intratendinoso leucócitos-pobre:</strong> Opção biológica para casos crónicos refractários à Resistência Pesada e Lenta (≥3 meses).</li>'
              + '<li>Protocolo: PRP ecoguiado → repouso relativo 3–7 dias (proteger fase inflamatória) → retomar Resistência Pesada e Lenta dia 7–10.</li>'
              + '<li class="warn"><strong>⚠ Corticosteróide intratendinoso: CONTRAINDICAÇÃO ABSOLUTA</strong> — risco rotura mecânica do tendão (Coombes Lancet 2010).</li>'
              + '<li>Alternativas: Dry needling intratendinoso, high-volume injection peritendinosa.</li></ul>'
              + '<div class="note"><strong>PROMs:</strong> VISA-P baseline → 6 semanas pós-PRP → 12 semanas. Se VISA-P <50 às 12 semanas → escalar para opções cirúrgicas.</div>',
            refs: 'Cook & Purdam BJSM 2009; Kongsgaard SJMSS 2009; Coombes Lancet 2010'
          };
        }
        return {
          cat: 'tend_conserv', title: 'Programa de Carga Mecânica — Tendinopatia Patelar',
          body: alerts + prevNotes + '<ul><li><strong>Princípio:</strong> O tendão precisa de carga mecânica para remodelar. Repouso absoluto é contraproducente.</li>'
            + '<li><strong>Fase 1 — Analgesia e Gestão de Carga Inicial:</strong> Extensão isométrica 60° × 45s × 5 repetições, 4×/dia. Eficácia analgésica variável entre doentes — se alívio <30% em 1 semana → avançar directamente para Resistência Pesada e Lenta submáxima.</li>'
            + '<li><strong>Fase 2 — Resistência Pesada e Lenta (Heavy Slow Resistance):</strong> Agachamento bilateral + prensa + hack squat. Tempo sob tensão: 3s concêntrico + 3s excêntrico. Progressão por tolerância: 4×15 Repetição Máxima → 4×12 → 4×10 → 4×8 → 4×6 Repetição Máxima. Frequência 3×/semana. <strong>Critério avanço:</strong> dor EVA ≤5/10 durante exercício E dissipação em ≤24 horas.</li>'
            + '<li><strong>Alternativa:</strong> Excêntrico em plano declinado 25° (Alfredson) se Resistência Pesada e Lenta não tolerada.</li>'
            + '<li><strong>Fase 3 — Integração Funcional:</strong> Pliometria bilateral → unilateral → específica. Corrida progressiva linear → mudança direcção → sprint.</li>'
            + '<li class="warn"><strong>⚠ Corticosteróide intratendinoso: CONTRAINDICAÇÃO ABSOLUTA</strong> (risco rotura + atrofia colagénio — Coombes Lancet 2010).</li>'
            + '<li>AINEs: ciclo curto (5–7 dias) se dor EVA >6/10. Preferir tópico.</li></ul>'
            + '<div class="note"><strong>Progressão por critérios, NÃO por tempo.</strong> Os tempos indicados são medianas esperadas. Critério universal: EVA ≤5/10 + dissipação 24h.<br><strong>PROMs:</strong> VISA-P obrigatório — baseline → 6 sem → 12 sem → alta.</div>',
          refs: 'Cook & Purdam BJSM 2009; Kongsgaard SJMSS 2009; Rio BJSM 2015; Coombes Lancet 2010'
        };
      }

      // ─── TENDINOPATIA QUADRICIPITAL ───
      if (path === 'tend_quad') {
        const isRefract = chron === 'chronic' && hasPrev('hsr_ecc');
        if (isRefract && hasPrev('prp')) {
          return {
            cat: 'tend_surgery', title: 'Cirurgia — Tendinopatia Quadricipital Refractária',
            body: alerts + prevNotes + '<ul><li>Falência conservador ≥6 meses + PRP. Desbridamento tendão + excisão tecido degenerativo.</li>'
              + '<li>Expectativas: recuperação 6–12 meses.</li></ul>',
            refs: 'Cook & Purdam BJSM 2009'
          };
        }
        if (isRefract) {
          return {
            cat: 'tend_infiltr', title: 'PRP Peritendinoso — Tendinopatia Quadricipital',
            body: alerts + prevNotes + '<ul><li>PRP peritendinoso ecoguiado para casos refractários à Resistência Pesada e Lenta.</li>'
              + '<li>Protocolo similar à tendinopatia patelar.</li>'
              + '<li class="warn">⚠ Corticosteróide peritendinoso com extrema cautela (mesmo risco de rotura que patelar em doentes com factores de risco).</li></ul>',
            refs: 'Cook & Purdam BJSM 2009; Coombes Lancet 2010'
          };
        }
        return {
          cat: 'tend_conserv', title: 'Programa de Carga Mecânica — Tendinopatia Quadricipital',
          body: alerts + prevNotes + '<ul><li>Protocolo similar à tendinopatia patelar com ajustes: isométrico a 90° flexão (máxima solicitação do tendão quadricipital). Wall Sit isométrico como complemento.</li>'
            + '<li>Resistência Pesada e Lenta: mesma progressão por critérios (EVA ≤5/10 + dissipação 24h).</li>'
            + '<li>AINEs tópico primeira linha. Oral ciclo curto se insuficiente.</li></ul>'
            + '<div class="note"><strong>PROMs:</strong> VISA-P adaptado ou LEFS — baseline → 6 sem → 12 sem → alta.</div>',
          refs: 'Cook & Purdam BJSM 2009; Kongsgaard SJMSS 2009'
        };
      }

      // ─── SÍNDROME DO TRATO ILIOTIBIAL ───
      if (path === 'stit') {
        if (chron === 'chronic' && hasPrev('cs_infiltr') && hasPrev('pt')) {
          return {
            cat: 'tend_surgery', title: 'Release Artroscópico — Síndrome do Trato Iliotibial Refractária',
            body: alerts + prevNotes + '<ul><li>Falência conservador >6 meses. Taxa sucesso >85%.</li>'
              + '<li>Release artroscópico do trato iliotibial (Z-plasty ou excisão em janela).</li>'
              + '<li>Reabilitação pós-operatória: fortalecimento glúteo médio + correcção biomecânica.</li></ul>',
            refs: 'Gunter & Schwellnus CJSM 2004'
          };
        }
        return {
          cat: 'tend_conserv', title: 'Protocolo Conservador — Síndrome do Trato Iliotibial',
          body: alerts + prevNotes + '<ul><li><strong>Fase 1 — Acalmar:</strong> Cessação da actividade provocadora (corrida/ciclismo). Crioterapia + AINEs tópicos.</li>'
            + '<li><strong>Infiltração local (corpo adiposo):</strong> Metilprednisolona — teste diagnóstico + terapêutico. Redução 50–60% da dor em 14 dias (RCT Gunter & Schwellnus). Facilita início da reabilitação.</li>'
            + '<li><strong>Fase 2 — Correcção Biomecânica:</strong> NÃO alongar o Trato Iliotibial (fáscia inextensível). Reduzir tensão do Tensor da Fáscia Lata + fortalecer Glúteo Médio: clamshells, pontes unilaterais, abdução em DL, monster walks, side plank. Foam rolling: Tensor da Fáscia Lata e glúteos (NÃO sobre epicôndilo lateral). 4–5×/semana.</li>'
            + '<li><strong>Fase 3 — Retorno à Corrida:</strong> Agachamentos unipodais com controlo valgo dinâmico → pliometria → corrida progressiva (plano → declive suave, ↑10%/semana). Critério: corrida 30 min sem dor.</li></ul>'
            + '<div class="note"><strong>Progressão por critérios.</strong> Fase 1→2: dor EVA <3/10 na marcha. Fase 2→3: força abdutores anca >80% contralateral.</div>',
          refs: 'Gunter & Schwellnus CJSM 2004; Cook & Purdam BJSM 2009'
        };
      }

      // ─── TENDINOPATIA POPLÍTEO ───
      if (path === 'tend_pop') {
        return {
          cat: 'tend_conserv', title: 'Protocolo Conservador — Tendinopatia do Poplíteo',
          body: alerts + prevNotes + '<ul>' + garrickNote
            + '<li><strong>Excêntrico:</strong> Rotação interna resistida controlada do joelho. Progressão por critérios de dor (EVA ≤5/10).</li>'
            + '<li><strong>Correcção biomecânica:</strong> Avaliar hiperpronação do pé → palmilhas ortopédicas se indicado.</li>'
            + '<li><strong>Infiltração:</strong> Corticosteróide ecoguiado na bainha tendinosa APENAS se refractário >3 meses ao tratamento conservador.</li>'
            + '<li><strong>Cirurgia (rara):</strong> Tenotomia artroscópica para "snapping popliteus" refractário. Risco: instabilidade rotacional subtil.</li></ul>',
          refs: 'Patologia Lateral — ficheiros projecto'
        };
      }

      // ─── PATA DE GANSO ───
      if (path === 'tend_pag') {
        const isAcute = chron === 'acute' || chron === 'subacute';
        if (isAcute && !hasPrev('cs_infiltr')) {
          return {
            cat: 'tend_infiltr', title: 'Infiltração Intrabursal — Tendinobursopatia Pata de Ganso (Fase Aguda)',
            body: alerts + prevNotes + '<ul><li><strong>1ª linha alívio rápido:</strong> Corticosteróide intrabursal ecoguiado (metilprednisolona). RCT demonstra superioridade vs fisioterapia isolada nas primeiras 6 semanas.</li>'
              + '<li class="warn">⚠ EVITAR infiltração intratendinosa (risco rotura). Apenas intrabursal.</li>'
              + '<li>Gelo 15 min 3×/dia + AINEs tópicos.</li>'
              + '<li>Iniciar fisioterapia após alívio (semana 2): alongamento isquiotibiais mediais + correcção valgo dinâmico (fortalecimento glúteo médio).</li>'
              + '<li>Se OA medial coexistente → integrar programa GLA:D (Good Life with osteoArthritis: Denmark).</li></ul>',
            refs: 'Cook & Purdam BJSM 2009'
          };
        }
        return {
          cat: 'tend_conserv', title: 'Protocolo Conservador — Tendinobursopatia Pata de Ganso',
          body: alerts + prevNotes + '<ul><li><strong>Fase crónica / pós-infiltração:</strong> Alongamento isquiotibiais mediais + correcção valgo dinâmico (fortalecimento glúteo médio).</li>'
            + '<li>Se OA medial coexistente → integrar programa GLA:D (Good Life with osteoArthritis: Denmark).</li>'
            + '<li><strong>PRP:</strong> Evidência emergente para tendinobursopatias crónicas refractárias — pode oferecer resultados mais duráveis que corticosteróides.</li></ul>'
            + '<div class="note"><strong>PROMs:</strong> LEFS — baseline → 4 sem → alta.</div>',
          refs: 'Cook & Purdam BJSM 2009'
        };
      }

      // ─── ROTURAS TENDÃO ───
      if (RUPT_IDS.includes(path)) {
        const pct = a.tend_rupt_pct;
        if (pct === 'complete' || pct === 'gt50') {
          const isQT = path.startsWith('rupt_quad');
          return {
            cat: 'tend_urgent', title: '⚡ Cirurgia ' + (pct === 'complete' ? 'Urgente' : 'Provável') + ' — Rotura ' + (isQT ? 'Tendão Quadricipital' : 'Tendão Patelar'),
            body: alerts + prevNotes + '<ul><li class="warn"><strong>' + (pct === 'complete' ? 'Rotura completa → CIRURGIA URGENTE (<2 semanas ideal)' : 'Rotura >50% → Forte indicação cirúrgica') + '</strong></li>'
              + '<li><strong>Técnica:</strong> Reparação primária com suturas transósseas ± reforço cerclage (Krackow).' + (isQT ? ' Avaliar algoritmo Elattar: se coto atinge patela sem tensão → reparação primária; senão → V-Y lengthening.' : '') + '</li>'
              + '<li><strong>Atraso >3 semanas → resultados inferiores</strong> (retracção + atrofia). Atraso >6 semanas = reconstrução com autoenxerto (isquiotibiais) ou aloenxerto.</li>'
              + '<li>Reabilitação: imobilização extensão → desbloqueio progressivo 15°/semana → carga completa 6 semanas → fortalecimento progressivo 3–4 meses.</li></ul>',
            refs: 'Whitmore Ann Joint 2025'
          };
        }
        if (pct === '25_50') {
          return {
            cat: 'tend_conserv', title: 'Vigilância Activa — Rotura Parcial 25–50%',
            body: alerts + prevNotes + '<ul><li>Protocolo conservador com vigilância: imobilização em extensão (tala articulada bloqueada 0°) × 3–4 semanas.</li>'
              + '<li><strong>Ecografia seriada:</strong> 2, 4 e 6 semanas. Se progressão da rotura ou novo extension lag → cirurgia.</li>'
              + '<li>Carga parcial → completa progressiva. Desbloqueio 15°/semana a partir semana 3–4.</li>'
              + '<li>Semana 6: isométrico quadricípite + Straight Leg Raise. Semana 8–12: fortalecimento cadeia cinética fechada 0–60°.</li></ul>',
            refs: 'Whitmore Ann Joint 2025'
          };
        }
        return {
          cat: 'tend_conserv', title: 'Conservador — Rotura Parcial Minor (<25%)',
          body: alerts + prevNotes + '<ul><li>Imobilização extensão 3–4 semanas (tala articulada bloqueada 0°). Carga parcial → completa.</li>'
            + '<li>Desbloqueio progressivo 15°/semana a partir semana 3–4. Semana 6: amplitude completa + isométrico.</li>'
            + '<li>Ecografia controlo 4–6 semanas.</li></ul>',
          refs: 'Whitmore Ann Joint 2025'
        };
      }

      // ─── LESÕES MUSCULARES (BAMIC) ───
      if (MUSC_IDS.includes(path)) {
        if (grade === '4') {
          return {
            cat: 'tend_surgery', title: 'Cirurgia — Rotura Muscular Completa (BAMIC Grau 4)',
            body: alerts + prevNotes + '<ul><li class="warn"><strong>Grau 4 = descontinuidade total → indicação cirúrgica.</strong></li>'
              + '<li>Reparação primária ou tenodese se retracção significativa.</li>'
              + (path === 'musc_isq' ? '<li>Isquiotibiais: particularmente avulsão isquiática proximal → fixação com âncoras. Forte indicação em atletas.</li>' : '')
              + (path === 'musc_quad_rf' ? '<li>Recto femoral: reparação + reabilitação prolongada (4–6 meses).</li>' : '')
              + '</ul>',
            refs: 'Pollock BJSM 2014; Macdonald BJSM 2019'
          };
        }

        // Build BAMIC protocol
        let proto = '';
        const muscName = path === 'musc_isq' ? 'Isquiotibiais' : path === 'musc_quad_rf' ? 'Recto Femoral' : path === 'musc_gastroc' ? 'Gastrocnémio Medial' : 'Sóleo';
        const isoExercises = path === 'musc_isq' ? 'isometria isquiotibiais (15°, 30°, 60°) × 5 × 30s, pontes glúteas bilateral'
          : path === 'musc_quad_rf' ? 'isometria quadricípite multi-ângulo, Straight Leg Raise'
            : path === 'musc_gastroc' ? 'dorsiflexão resistida, heel raises bilateral'
              : 'heel raises sentado (joelho fletido 20–30° — isola sóleo), dorsiflexão resistida';

        if (site === 'a') {
          proto = '<li><strong>Site (a) Miofascial — Mediana retorno desporto: 2–3 semanas.</strong></li>'
            + '<li>Fase 1: POLICE (Protection, Optimal Loading, Ice, Compression, Elevation). ' + isoExercises + '.</li>'
            + '<li>Fase 2: ' + (path === 'musc_isq' ? 'Nordic Hamstring Exercise parcial → Romanian Deadlift unilateral leve → drills corrida.' : path === 'musc_quad_rf' ? 'Extensão joelho progressiva → leg extension leve → agachamento parcial.' : 'Heel raises bilateral → unilateral → bicicleta.') + '</li>'
            + '<li>Fase 3: Corrida progressiva (50→70→85→95% velocidade máxima). Treino específico.</li>';
        } else if (site === 'b') {
          proto = '<li><strong>Site (b) Junção Miotendínea — Mediana retorno desporto: 4–8 semanas.</strong></li>'
            + '<li>Fase 1: POLICE. Canadianas se dor na marcha. Isometria ângulo indolor.</li>'
            + '<li>Fase 2: ' + (path === 'musc_isq' ? 'Flywheel excêntrico knee-dominant → pontes progressivas → bicicleta.' : path === 'musc_quad_rf' ? 'Extensão joelho excêntrica controlada → leg press arco limitado.' : 'Heel raises bilateral progressivos → Alfredson adaptado (excêntrico).') + '</li>'
            + '<li>Fase 3: ' + (path === 'musc_isq' ? 'Nordic Hamstring Exercise completo → Romanian Deadlift com carga → drills submáximos.' : 'Fortalecimento completo → pliometria bilateral → corrida progressiva.') + '</li>'
            + '<li>Fase 4: Corrida alta velocidade → mudança direcção → pliometria.</li>';
        } else {
          proto = '<li><strong>Site (c) Intratendinosa — Mediana retorno desporto: 8–16 semanas.</strong></li>'
            + '<li>Fase 1: Protecção. Canadianas. NÃO alongar. Isometria suave apenas.</li>'
            + '<li>Fase 2: Isometria prolongada (45s holds) → ponte bilateral → bicicleta sem resistência.</li>'
            + '<li>Fase 3: ' + (path === 'musc_isq' ? 'Flywheel → Nordic Hamstring Exercise parcial → Romanian Deadlift bilateral → trote.' : path === 'musc_quad_rf' ? 'Extensão joelho excêntrica progressiva → agachamento bilateral → bicicleta com resistência.' : 'Heel raises bilateral progressivos → excêntrico plano → bicicleta com resistência.') + '</li>'
            + '<li>Fase 4: ' + (path === 'musc_isq' ? 'Nordic Hamstring Exercise completo com carga → corrida submáxima → pliometria bilateral.' : 'Fortalecimento completo → corrida submáxima → pliometria bilateral.') + '</li>'
            + '<li>Fase 5: Sprint progressivo → treino específico.'
            + (path === 'musc_quad_rf' ? '<br><strong>⚠ Testes isocinéticos OBRIGATÓRIOS</strong> antes de autorizar corrida rápida ou remates (quadricípite ≥3× peso corporal, Índice Simetria Membro >90%).' : '')
            + '</li>';
        }

        // Soleo specifics
        if (path === 'musc_soleo') {
          proto += '<li><strong>Particularidade Sóleo:</strong> Todos os exercícios com joelho fletido 20–30° (isola sóleo vs gastrocnémio). Seated heel raises em vez de standing. Recuperação tipicamente mais lenta que gastrocnémio.</li>';
          if (isAthlete) proto += '<li>Atleta de endurance: avaliar causas de sobrecarga (aumento súbito volume, calçado, terreno).</li>';
        }

        // Gastroc grade 3 specifics
        if (path === 'musc_gastroc' && (grade === '3')) {
          proto += '<li class="warn">⚠ Grau 3: Excluir TVP (Eco Doppler urgente) e síndrome compartimental. Bota Walker com cunha plantarflexão. Reabilitação 8–12 semanas.</li>';
        }

        // RTP criteria
        let rtp = '<div class="note"><strong>Critérios de Retorno ao Desporto (não baseado em tempo):</strong><br>'
          + '• Força isocinética — Índice Simetria Membro >90%<br>'
          + '• Quadricípite ≥3× peso corporal, isquiotibiais ≥1.8× peso corporal<br>'
          + '• Hop Tests (single/triple/crossover) — Índice Simetria Membro >90%<br>'
          + '• Sprint máximo sem dor<br>'
          + (path === 'musc_isq' ? '• Extensão Passiva do Joelho: assimetria <10°<br>' : '')
          + '<strong>PROMs:</strong> LEFS baseline → 4 sem → alta. Escala de Tampa (cinesiofobia) se retorno atrasado sem causa orgânica — se ≥37/68 → intervenção psicológica antes de progredir.</div>';

        return {
          cat: 'tend_conserv', title: 'Protocolo BAMIC — ' + muscName + ' (' + site.toUpperCase() + grade + ')',
          body: alerts + prevNotes + '<ul>' + proto + '</ul>'
            + '<div class="note"><strong>Progressão por critérios, NÃO por tempo.</strong> Critério universal de carga: EVA ≤5/10 durante exercício + dissipação em ≤24 horas.</div>'
            + rtp,
          refs: 'Pollock BJSM 2014; Macdonald BJSM 2019; Pollock BJSM 2022; Hollabaugh Sports Health 2024'
        };
      }

      // ─── BURSITES ───
      if (path === 'burs_prepat') {
        return {
          cat: 'tend_infiltr', title: 'Bursite Pré-patelar — Protocolo',
          body: alerts + prevNotes + '<ul><li><strong>1. Excluir séptica:</strong> Se calor/eritema/febre → aspiração diagnóstica obrigatória (20% séptica, S. aureus). Contagem celular + cultura.</li>'
            + '<li><strong>2. Aséptica:</strong> Corticosteróide intrabursal (metilprednisolona preferida — menor risco atrofia cutânea em zona visível vs triamcinolona). Colocação estritamente intrabursal para evitar atrofia subcutânea/despigmentação.</li>'
            + '<li>Imobilização compressiva 1 semana pós-infiltração. Evitar ajoelhar.</li>'
            + '<li><strong>3. Séptica:</strong> Antibioterapia empírica (flucloxacilina/cefalosporina) + aspirações seriadas. Bursectomia se refractária.</li></ul>',
          refs: ''
        };
      }

      if (path === 'burs_baker') {
        return {
          cat: 'tend_infiltr', title: 'Quisto de Baker — Abordagem Combinada',
          body: alerts + prevNotes + '<ul><li><strong>Princípio:</strong> Sempre secundário a patologia intra-articular (OA, meniscal, sinovite). Tratar a causa.</li>'
            + '<li><strong>Ecografia:</strong> Confirmar, avaliar septos, relação neurovascular.</li>'
            + '<li><strong>Abordagem combinada (melhores resultados):</strong><ol style="margin:4px 0 4px 16px"><li>Corticosteróide intra-articular anterior (suprimir sinovite = fonte de líquido).</li><li>Se quisto tenso: aspiração directa ecoguiada (agulha 18G) + fenestração de septos + injecção corticosteróide no quisto.</li></ol></li>'
            + '<li>Fisioterapia para patologia intra-articular subjacente.</li>'
            + '<li><strong>Cirurgia (rara):</strong> Excisão artroscópica da válvula se recidivante apesar de tratamento intra-articular optimizado.</li></ul>',
          refs: ''
        };
      }

      // ─── DIAGNÓSTICO DIFERENCIAL (DDx) ───
      if (path === 'hoffa') {
        return {
          cat: 'tend_conserv', title: 'Conflito da Gordura de Hoffa — Protocolo',
          body: alerts + prevNotes + '<ul><li><strong>Teste diagnóstico:</strong> Teste de Hoffa positivo (dor nos últimos 10° de extensão com pressão infrapatelar bilateral).</li>'
            + '<li><strong>RM obrigatória</strong> para confirmação e exclusão de patologia meniscal/condral.</li>'
            + '<li><strong>Tratamento (difere da tendinopatia!):</strong></li>'
            + '<li>Evitar carga em hiperextensão (principal irritante). Taping patelar (McConnell).</li>'
            + '<li><strong>Infiltração peritendinosa/perigordural: INDICADA na fase aguda</strong> (ao contrário das tendinopatias puras onde corticosteróide é evitado). Reduz edema do corpo adiposo.</li>'
            + '<li>Fortalecimento quadricípite em arco 0–60° (evitar extensão terminal).</li>'
            + '<li><strong>Cirurgia:</strong> Resecção artroscópica parcial se refractário >6 meses.</li></ul>',
          refs: 'Dragoo KSSTA 2012'
        };
      }

      if (path === 'plica') {
        return {
          cat: 'tend_conserv', title: 'Síndrome da Plica Sinovial — Protocolo',
          body: alerts + prevNotes + '<ul><li><strong>Diagnóstico:</strong> Ressalto palpável e doloroso na plica mediopatelar entre 30–40° flexão. RM pode mostrar espessamento.</li>'
            + '<li>Fortalecimento Vasto Medial Oblíquo + glúteo médio (reduzir lateralização patelar que tensiona plica medial).</li>'
            + '<li>Taping patelar. AINEs ciclo curto.</li>'
            + '<li>Corticosteróide intra-articular se inflamação significativa.</li>'
            + '<li><strong>Cirurgia:</strong> Excisão artroscópica da plica se crónico >6 meses + falha conservador. Bons resultados.</li></ul>',
          refs: ''
        };
      }

      if (path === 'neuro_safeno') {
        return {
          cat: 'tend_conserv', title: 'Neuropatia Compressiva do Nervo Safeno',
          body: alerts + prevNotes + '<ul><li><strong>Diagnóstico:</strong> Dor tipo choque/ardor anteromedial. Teste tensão neural positivo (hiperextensão + abdução anca + flexão joelho). Marcha compensatória.</li>'
            + '<li class="warn"><strong>⚠ Tratamento NÃO é exercício de força.</strong></li>'
            + '<li><strong>Mobilização neural (nerve flossing):</strong> 3×10 repetições, 2×/dia.</li>'
            + '<li>Evitar posições de compressão do nervo.</li>'
            + '<li>Gabapentina/Pregabalina se dor neuropática severa.</li>'
            + '<li><strong>Infiltração perineural ecoguiada</strong> (anestésico local ± corticosteróide) como teste diagnóstico/terapêutico.</li>'
            + '<li><strong>Cirurgia (rara):</strong> Descompressão cirúrgica apenas se falha >6 meses com causa compressiva identificável (fáscia, cicatriz).</li></ul>',
          refs: ''
        };
      }

      if (path === 'osgood' || path === 'slj') {
        const name = path === 'osgood' ? 'Osgood-Schlatter' : 'Sinding-Larsen-Johansson';
        const loc = path === 'osgood' ? 'tuberosidade anterior da tíbia' : 'pólo inferior da patela';
        return {
          cat: 'tend_conserv', title: name + ' — Apofisite de Tracção',
          body: alerts + prevNotes + '<ul><li><strong>Condição do esqueleto imaturo (<16 anos).</strong> Apofisite de tracção na ' + loc + '. Auto-limitada com maturidade esquelética.</li>'
            + '<li class="warn"><strong>⚠ NÃO imobilizar</strong> (contraproducente). Modulação de actividade para manter dor EVA <5/10.</li>'
            + '<li>Reduzir volume de saltos/corrida. Manter actividade tolerada.</li>'
            + '<li>Alongamento quadricípite + isquiotibiais (encurtamento relativo durante estirão de crescimento).</li>'
            + '<li>Gelo pós-actividade 15 min. AINEs ciclo curto apenas em exacerbações.</li>'
            + '<li>Joelheira/strap ' + (path === 'osgood' ? 'infrapatelar' : 'patelar') + ' para alívio sintomático.</li>'
            + '<li><strong>Cirurgia (excepcional):</strong> Ossículo sintomático persistente pós-maturidade esquelética → excisão.</li></ul>',
          refs: 'Circi JAAOS 2017'
        };
      }

      // Fallback
      return { cat: 'tend_conserv', title: 'Avaliação — ' + path, body: alerts + prevNotes + '<ul><li>Patologia seleccionada sem protocolo específico detalhado. Reavaliar diagnóstico.</li></ul>', refs: '' };
    }

    // ============================================================
    //  REAVALIAÇÃO PF — DECISION ENGINE
    // ============================================================
    function decideFU_PF(a) {
      const diag = a.pf_diag;

      // ─── INSTABILIDADE PATELAR ───
      if (diag === 'instab') {
        const dejour = a.pf_dejour || 'none';
        const ttg = a.pf_ttg || 'na';
        const height = a.pf_height || 'normal';
        const mpfl = a.pf_mpfl || 'intact';
        const rotation = a.pf_rotation || 'normal';
        const tilt = a.pf_tilt || 'normal';
        const skeletal = a.pf_skeletal || 'mature';
        const ttgHigh = ttg === 'tc_high' || ttg === 'rm_high';
        const ttgBorder = ttg === 'tc_borderline' || ttg === 'rm_borderline';
        const dysplasiaSevere = dejour === 'b' || dejour === 'c' || dejour === 'd';
        const rotationPath = rotation === 'av_high' || rotation === 'tte_high' || rotation === 'both';

        // Esqueleto immaturo — pathway especial
        if (skeletal === 'immature') {
          let body = '<ul>';
          body += '<li><strong>Reconstrução MPFL com técnica pediátrica</strong> (sem túneis trans-fisários, fixação epifisária)</li>';
          if (dysplasiaSevere) body += '<li class="warn">Displasia troclear severa identificada — trocleoplastia CONTRAINDICADA até maturidade esquelética</li>';
          if (ttgHigh) body += '<li class="warn">TT-TG elevado — osteotomia TAT com CAUTELA EXTREMA (risco fise), preferir diferir até maturidade</li>';
          if (rotationPath) body += '<li class="warn">Deformidade rotacional — aguardar maturidade esquelética se possível</li>';
          body += '<li>Reabilitação intensiva: reforço VMO + cadeia proximal anca</li>';
          body += '</ul><div class="note">Referência: EFORT 2025; Chahla PFR: técnica pediátrica MPFL evita lesão fisária. Reavaliar quando fises encerradas para completar correcções ósseas.</div>';
          return {
            cat: 'pf_mpfl', title: 'MPFL Pediátrico + Diferir Correcções Ósseas', body: body,
            refs: 'EFORT 2025; Chahla PFR; Dejour classification'
          };
        }

        // Adulto — construir "menu à la carte"
        let procedures = [];
        let body = '<p><strong>Algoritmo "Menu à la carte" — correcção personalizada:</strong></p><ul>';

        // 1. MPFL
        if (mpfl === 'torn' || mpfl === 'prev_recon') {
          procedures.push('mpfl');
          body += '<li><strong>Reconstrução MPFL</strong> — base para todos os procedimentos de estabilização. ' + (mpfl === 'prev_recon' ? 'Revisão de reconstrução prévia.' : 'Rotura completa → indicação formal.') + '</li>';
        } else if (mpfl === 'partial' && (dysplasiaSevere || ttgHigh)) {
          procedures.push('mpfl');
          body += '<li><strong>Reconstrução MPFL</strong> — lesão parcial MAS com factores ósseos desfavoráveis → reconstruir.</li>';
        }

        // 2. TAT medialização
        if (ttgHigh) {
          procedures.push('tat_med');
          body += '<li><strong>Osteotomia TAT — Medialização</strong> — TT-TG patológico. Alvo: normalizar para 10–15mm.</li>';
        }

        // 3. TAT distalização
        if (height === 'high') {
          procedures.push('tat_dist');
          body += '<li><strong>Osteotomia TAT — Distalização</strong> — CDI > 1.3–1.4. Melhora engagement troclear precoce.</li>';
        } else if (height === 'mild' && dysplasiaSevere) {
          procedures.push('tat_dist');
          body += '<li><strong>Osteotomia TAT — Distalização</strong> — CDI limítrofe MAS displasia severa → distalizar para optimizar engagement.</li>';
        }

        // 4. Anteromedialização (Fulkerson) — se TT-TG alto + dor PF (sobrecarga lateral)
        if (ttgHigh && tilt !== 'normal') {
          body += '<li>Considerar <strong>Anteromedialização (Fulkerson)</strong> se sobrecarga faceta lateral concomitante.</li>';
        }

        // 5. Trocleoplastia
        if (dysplasiaSevere) {
          procedures.push('trochleo');
          body += '<li><strong>Trocleoplastia de aprofundamento</strong> — displasia Dejour ' + (dejour === 'b' ? 'B' : dejour === 'c' ? 'C' : 'D') + '. Sempre acompanhada de MPFL.</li>';
          if (!procedures.includes('mpfl')) { procedures.push('mpfl'); body += '<li><strong>Reconstrução MPFL</strong> — mandatória com trocleoplastia.</li>'; }
        }

        // 6. Alongamento retináculo lateral
        if (tilt === 'tilt_fixed') {
          procedures.push('lat_length');
          body += '<li><strong>Alongamento retináculo lateral (Z-plasty)</strong> — tilt fixo irredutível. NÃO release isolado.</li>';
        }

        // 7. Osteotomia derotadora
        if (rotationPath) {
          procedures.push('derotation');
          if (rotation === 'av_high') body += '<li><strong>Osteotomia femoral derotadora</strong> — anteversão >30°. Protege reconstruções de falência.</li>';
          if (rotation === 'tte_high') body += '<li><strong>Osteotomia tibial supratuberositária derotadora</strong> — torção tibial ext. >40°. Corrige vetor s/ deformidade pé.</li>';
          if (rotation === 'both') body += '<li><strong>Correcção biplanar</strong> — derotação femoral + tibial. Miserable malalignment.</li>';
        }

        body += '</ul>';

        // Caso mínimo — sem factores ósseos, MPFL isolado suficiente
        if (procedures.length === 0) {
          if (mpfl === 'intact' && !dysplasiaSevere && !ttgHigh && height === 'normal') {
            return {
              cat: 'pf_conserv', title: 'Conservador / Sem Indicação Cirúrgica Actual',
              body: '<p>Anatomia óssea favorável, MPFL intacto. Sem indicação cirúrgica objectiva.</p><ul><li>Reabilitação: reforço VMO + cadeia proximal anca + propriocepção</li><li>Taping McConnell / brace patelar se sintomático</li><li>Reavaliar se recidiva de luxação</li></ul>',
              refs: 'APTA 2019; EFORT 2025'
            };
          }
          // MPFL apenas (anatomia favorável)
          procedures.push('mpfl');
          body = '<ul><li><strong>Reconstrução MPFL isolada</strong> — MPFL incompetente mas anatomia óssea favorável (Dejour A/normal, TT-TG normal, CDI normal). Excelentes resultados.</li></ul>';
          body += '<div class="note">A reconstrução ISOLADA tem taxa de falência alta se TT-TG >20mm ou displasia severa. Neste caso, a anatomia é favorável → MPFL isolado adequado.</div>';
        }

        // Classificar resultado
        let cat = 'pf_mpfl';
        if (procedures.includes('trochleo')) cat = 'pf_trochleo';
        else if (procedures.includes('derotation')) cat = 'pf_derotation';
        else if (procedures.includes('tat_med') || procedures.includes('tat_dist')) cat = 'pf_mpfl_osteot';

        const catNames = { pf_mpfl: 'MPFL', pf_mpfl_osteot: 'MPFL + Osteotomia TAT', pf_trochleo: 'Trocleoplastia + MPFL', pf_derotation: 'Derotação + MPFL' };
        body += '<div class="note"><strong>Princípio:</strong> Corrigir TODOS os factores anatómicos identificados na mesma sessão cirúrgica ("menu à la carte" — Escola de Lyon/Dejour). MPFL isolado sem correcção óssea → taxa falência elevada em displasia severa ou TT-TG >20mm.</div>';
        return {
          cat: cat, title: catNames[cat] || 'Estabilização Patelar', body: body,
          refs: 'Chahla PFR; Dejour classification; EFORT 2025; LTI PMC10012577; CDI PubMed 29309446; TT-TG AJR 19.22556; Derotação PubMed 38365167'
        };
      }

      // ─── SDPF ───
      if (diag === 'sdpf') {

            refs: 'APTA 2019; JOSPT 2019; Décary clusters PubMed 29128344'

          return {
            cat: 'pf_conserv', title: 'SDPF Funcional Refractária — Optimizar Conservador',

        if (mech === 'condral') return { cat: 'pf_mpfl', title: 'Tratamento de Lesão Condral / Corpo Livre', body: '<ul><li>Corpo livre: remoção ou fixação se fragmento viável e grande</li><li>Flap condral: desbridamento ± microfratura</li></ul>', refs: '' };

      // ─── TENDINOPATIA ROTULIANA ───
      if (diag === 'tendinop') {

          return {
            cat: 'pf_tendinopathy', title: 'Programa de Carga Mecânica (HSR / Excêntrico)',
            body: '<ul><li><strong>Heavy Slow Resistance (HSR):</strong> Agachamento + prensa, 85% 1RM, 3s concêntrico / 3s excêntrico — superior ou igual ao excêntrico clássico, maior adesão</li><li><strong>Alternativa:</strong> Excêntrico em plano declinado (Alfredson)</li><li><strong>Dor aguda / época competitiva:</strong> Isométrico (evidência Grau A) para alívio imediato</li><li><strong>CI:</strong> Corticóide intratendinoso (risco rotura + atrofia colagénio)</li><li>Duração mínima: 12 semanas de programa estruturado</li></ul>',
            refs: 'HSR PMC11468026; Isométrico PubMed 29972281; Alfredson protocol'
          };
        }
        if (dur === 'hsr_plateau') {
          return {
            cat: 'pf_tendinopathy', title: 'PRP Intratendinoso + Continuar Carga',
            body: '<ul><li><strong>PRP intratendinoso:</strong> Opção biológica para casos crónicos refractários a HSR/excêntrico</li><li>Repouso relativo 3–7 dias pós-PRP (proteger fase inflamatória)</li><li>Retomar carga progressiva dia 7–10</li><li><strong>Manter CI:</strong> Corticóide intratendinoso → risco rotura</li><li>Peritendinoso com cautela extrema apenas se dor incapacitante</li></ul>',
            refs: 'PRP tendinopatia; Protocolos pós-infiltração doc'

          return {
            cat: 'pf_tendinopathy', title: 'Opções Cirúrgicas — Tendinopatia Refractária',
            body: '<ul><li>Falência conservador ≥6 meses + PRP → considerar cirurgia</li><li><strong>Artroscopia:</strong> Desbridamento tendão, excisão tecido degenerativo pólo inferior</li><li><strong>Cirurgia aberta:</strong> Excisão zona degenerativa + reparação, em casos severos</li><li>Expectativas: recuperação lenta (6–12m retorno pleno)</li></ul>',
            refs: ''

      if (diag === 'condrop') {

            cat: 'pf_conserv', title: 'Condromalácia I–II — Conservador',

            refs: 'PRP PMC12499739'
          };
        }
        if (grade === 'multi') {
          return {
            cat: 'pf_arthroplasty', title: 'Artrose Multicompartimental → PTJ',
            body: '<p>Artrose PF + outro compartimento (medial ou lateral) → artroplastia total do joelho.</p>',

            cat: 'pf_conserv', title: 'Conservador + Infiltrações',

            cat: 'pf_arthroplasty', title: 'Artroplastia PF ou PTJ',
            body: '<ul><li><strong>OA PF isolada severa:</strong> Artroplastia patelo-femoral (se compartimentos tibiofemorais preservados)</li><li><strong>Se multicompartimental:</strong> PTJ</li><li>Conservador prévio: PRP/AH como ponte se não candidato cirúrgico imediato</li></ul>', refs: ''

            cat: 'pf_conserv', title: 'Conservador Optimizado + Considerar Artroplastia PF',

      // ─── OSGOOD-SCHLATTER / SINDING-LARSEN ───
      if (diag === 'osgood') {
        return {
          cat: 'pf_conserv', title: 'Sequelas de Osteocondrose — Gestão Conservadora',
          body: '<ul><li>Tratamento eminentemente conservador: gestão de carga, crioterapia, alongamento</li><li><strong>Cirurgia excepcional:</strong> Apenas para ossículos não unidos sintomáticos na idade adulta</li><li>Técnica: excisão artroscópica ou aberta do ossículo + bursectomia</li></ul>',
          refs: 'PMC12746931; PMC11438430'

      }

      // ─── CORPO LIVRE ───
      if (diag === 'corpo_livre') {
        return {
          cat: 'pf_mpfl', title: 'Artroscopia — Corpo Livre PF',
          body: '<ul><li><strong>Fragmento grande + viável:</strong> Fixação (parafusos bio-absorvíveis / âncoras)</li><li><strong>Fragmento pequeno / degenerado:</strong> Remoção artroscópica</li><li>Avaliar lesão MPFL concomitante (luxação como mecanismo) → reconstruir se incompetente</li><li>Avaliar displasia troclear → completar com "menu à la carte" se factores de risco</li></ul>',
          refs: 'EFORT 2025; Chahla PFR'
        };
      }

      // Fallback
      return { cat: 'pf_conserv', title: 'Reavaliação Necessária', body: '<p>Dados insuficientes para recomendação. Completar avaliação imagiológica.</p>', refs: '' };
    }

    // ============================================================
    //  1ª CONSULTA — DECISION ENGINE (DDx + Exams)
    // ============================================================

    function decideLig(a) {
      var structs = a.lig_struct_multi || [];
      var nLig = structs.length;
      var hasACL = structs.includes('acl');
      var hasPCL = structs.includes('pcl');
      var hasMCL = structs.includes('mcl');
      var hasPLC = structs.includes('plc');
      var chron = a.lig_chron || 'acute';
      var ami = a.lig_ami || 'santi_0';
      var amiGrade = parseInt(ami.replace('santi_', '').replace('a', '').replace('b', '')) || 0;
      var amiFull = ami;
      var romExt = a.rom_ext || 0;
      var romFlex = a.rom_flex || 140;
      var age = patCtx.ctx_age_val || 30;
      var sex = patCtx.ctx_sex || 'M';
      var tegner = patCtx.ctx_tegner || 't5_6';
      var bmi = patCtx.ctx_bmi_val || 25;
      var comorbid = patCtx.ctx_comorbid_multi || ['none'];
      var isLowActivity = (tegner === 't0_2');
      var isHighActivity = (tegner === 't7_8' || tegner === 't9_10');

      // Context badge
      var ctxLine = '<div style="font-size:11px;color:var(--t3);margin-bottom:10px;padding:8px 10px;background:var(--s2);border-radius:var(--r);border:1px solid var(--bdr);line-height:1.6">'
        + '<strong>Contexto:</strong> ' + age + 'a · ' + (sex === 'F' ? '♀' : '♂') + ' · Tegner ' + tegner.replace('t', '').replace('_', '–') + ' · IMC ' + (bmi || '?')
        + ' · ROM ' + romExt + '°/' + romFlex + '° · AMI ' + ami.replace('santi_', '') + '</div>';

      // AMI gate alert
      var amiAlert = '';
      if (ami === 'santi_1b' || ami === 'santi_2a' || ami === 'santi_2b' || ami === 'santi_3') {
        amiAlert = '<div style="margin:10px 0;padding:10px 12px;background:rgba(230,126,34,.1);border:1px solid rgba(230,126,34,.35);border-radius:8px;font-size:12px;line-height:1.6">'
          + '<strong style="color:var(--amber)">⚠ GATE PRÉ-OPERATÓRIO — AMI ' + ami.replace('santi_', '') + '</strong><br>'
          + 'Protocolo SANTI obrigatório antes de cirurgia: (1) Crioterapia 15-20min → (2) Fadiga isquiotibiais → (3) Reactivação VMO <30s → (4) NMES se ≥2a → (5) Reavaliação.'
          + '<br>Frequência: 5×/sem (≥2) ou 3×/sem (1b). Critério clearance: VMO palpável + contracção consistente + extensão activa sem lag.</div>';
      }

      // ═══ MULTILIGAMENT ═══
      if (nLig >= 2) {
        var lux = a.lig_multi_lux || 'no';
        var mech = a.lig_multi_mech || 'low';
        var vasc = a.lig_multi_vasc || 'normal';
        var nerve = a.lig_multi_nerve || 'normal';
        var tissue = a.lig_multi_tissue || 'intact';
        var bicruciate = hasACL && hasPCL;

        // Pattern label
        var pattParts = [];
        if (hasACL) pattParts.push('LCA');
        if (hasPCL) pattParts.push('LCP');
        if (hasMCL) pattParts.push('LCM');
        if (hasPLC) pattParts.push('CPL');
        var pattLabel = pattParts.join(' + ');

        // MLKI classification
        var mlkiClass = '';
        if (bicruciate && hasMCL && hasPLC) mlkiClass = 'MLKI-2C+ML';
        else if (bicruciate && hasMCL) mlkiClass = 'MLKI-2C+M';
        else if (bicruciate && hasPLC) mlkiClass = 'MLKI-2C+L';
        else if (bicruciate) mlkiClass = 'MLKI-2C';
        else mlkiClass = 'MLKI-1C';

        // Schenck reference (only if dislocation documented)
        var schenckRef = '';
        if (lux !== 'no' && bicruciate) {
          if (hasMCL && hasPLC) schenckRef = ' (Ref. Schenck: KD-IV)';
          else if (hasMCL) schenckRef = ' (Ref. Schenck: KD-IIIM)';
          else if (hasPLC) schenckRef = ' (Ref. Schenck: KD-IIIL)';
          else schenckRef = ' (Ref. Schenck: KD-II)';
        } else if (lux !== 'no' && !bicruciate) {
          schenckRef = ' (Ref. Schenck: KD-I)';
        }

        // R0: EMERGENCY
        if (vasc === 'injury' || vasc === 'dimple') {
          var emergBody = ctxLine + '<div style="margin:10px 0;padding:12px;background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.4);border-radius:8px;font-size:13px;line-height:1.7">';
          if (vasc === 'dimple') {
            emergBody += '<strong style="color:var(--red)">🚨 DIMPLE SIGN — LUXAÇÃO IRREDUCTÍVEL</strong><br>'
              + '→ Redução fechada CONTRAINDICADA (risco necrose cutânea).<br>'
              + '→ <strong>Redução aberta cirúrgica IMEDIATA</strong> + reparação LCM.<br>'
              + '→ Avaliação vascular pré e pós-redução obrigatória.';
          } else {
            emergBody += '<strong style="color:var(--red)">🚨 LESÃO VASCULAR CONFIRMADA</strong><br>'
              + '→ <strong>Reparação vascular PRIORITÁRIA</strong> (janela 6h para evitar isquemia irreversível).<br>'
              + '→ Fixador externo provisório para estabilização articular.<br>'
              + '→ Fasciotomia profiláctica se isquemia >4-6h (síndrome compartimental de reperfusão).';
          }
          emergBody += '</div>';
          return { cat: 'lig_emergency', title: '🚨 Emergência — ' + pattLabel + ' · ' + mlkiClass + schenckRef, body: emergBody, refs: 'Murray BJSM 2024. DOI: 10.1136/bjsports-2024-108089' };
        }

        if (vasc === 'abi_low') {
          return {
            cat: 'lig_emergency', title: '🚨 ABI < 0.9 — Avaliação Vascular Urgente · ' + pattLabel,
            body: ctxLine + '<div style="margin:10px 0;padding:12px;background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.4);border-radius:8px;font-size:13px;line-height:1.7">'
              + '<strong style="color:var(--red)">ABI < 0.9 — Angio-TC IMEDIATA</strong><br>'
              + '→ Consulta vascular urgente.<br>'
              + '→ Se oclusão confirmada: reparação vascular prioritária + fixador externo.<br>'
              + '→ Se lesão intimal sem oclusão: monitorização seriada + anticoagulação.<br>'

        var needsLevel2 = !needsLevel1 && bicruciate;

        if (vasc === 'monitoring') {
          vascAlert = '<div style="margin:8px 0;padding:10px 12px;background:rgba(230,126,34,.1);border:1px solid rgba(230,126,34,.35);border-radius:8px;font-size:12px;line-height:1.6">'
            + '<strong style="color:var(--amber)">🔍 MONITORIZAÇÃO VASCULAR ACTIVA (48-72h)</strong><br>'
            + 'ABI + exame vascular seriado: 0h, 4-6h, 24h, 48h. Se alteração → Angio-TC imediata.'

          vascAlert = '<div style="margin:8px 0;padding:10px 12px;background:rgba(59,135,123,.1);border:1px solid rgba(59,135,123,.3);border-radius:8px;font-size:12px;line-height:1.6">'
            + '<strong style="color:var(--teal)">✓ Protocolo Vascular Nível 1 — Sem lesão documentada</strong><br>'
            + 'Admissão para monitorização seriada 48h recomendada (retalho intimal pode causar oclusão diferida).</div>';
        }

        var nerveAlert = '';
        if (nerve !== 'normal') {
          nerveAlert = '<div style="margin:8px 0;padding:10px 12px;background:rgba(142,68,173,.1);border:1px solid rgba(142,68,173,.3);border-radius:8px;font-size:12px;line-height:1.6">'
            + '<strong style="color:var(--purple)">⚡ DÉFICE NERVOSO PERONEAL — ' + (nerve === 'complete' ? 'Completo' : 'Parcial') + '</strong><br>'
            + (nerve === 'complete' ? 'Neurotmesis possível. EMG 3-6 sem. Exploração cirúrgica a considerar.' : 'Neurapraxia provável. EMG 3-6 sem. Monitorização.')
            + '</div>';
        }

        // STAGING DECISION
        var singleCriteria = (romFlex >= 120 && tissue === 'intact' && (ami === 'santi_0' || ami === 'santi_1a') && vasc === 'normal' && nerve === 'normal');
        var stagingNeeded = !singleCriteria || (bicruciate && hasMCL && hasPLC) || tissue === 'blisters' || tissue === 'wound';

        // Graft pool
        var graftPlan = '';
        if (bicruciate) {
          var aclGraft = hasPLC ? 'QT ou RF (preservar HT para estabilidade valga)' : 'HT (3+2 Sonnery-Cottet) ou QT ou RF';
          var pclGraft = 'Aloenxerto Aquiles (comprimento para banda dupla)';
          var plcGraft = hasPLC ? 'LaPrade anatómica (aloenxerto ou auto contralateral)' : '';
          var mclGraft = hasMCL ? 'Reparação + Internal Brace' : '';
          graftPlan = '<div style="margin:10px 0;padding:10px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:8px;font-size:12px;line-height:1.7">'
            + '<strong>Pool de Enxertos:</strong><br>'
            + '• LCA: ' + aclGraft + '<br>'
            + '• LCP: ' + pclGraft + '<br>'
            + (plcGraft ? '• CPL: ' + plcGraft + '<br>' : '')
            + (mclGraft ? '• LCM: ' + mclGraft + '<br>' : '')
            + (hasACL ? '• Reforço anterolateral: ITB (Lemaire — fixação extensão completa, ÚLTIMO)' : '')
            + '<br><em>⚠ Enxertos sintéticos devem ser EVITADOS em estágio único (risco artrofibrose).</em></div>';
        }

        // Tensioning sequence
        var tensionSeq = '';
        if (bicruciate) {
          tensionSeq = '<div style="margin:10px 0;padding:10px 12px;background:rgba(59,135,123,.06);border:1px solid rgba(59,135,123,.2);border-radius:8px;font-size:12px;line-height:1.7">'
            + '<strong>Sequência de Tensionamento (ordem obrigatória):</strong><br>'
            + '1️⃣ LCP — 90° flexão (restaurar step-off)<br>'
            + '2️⃣ LCA — 30° flexão<br>'
            + (hasPLC ? '3️⃣ CPL/LCL — Tíbia reduzida, rotação interna ligeira, 30°<br>' : '')
            + (hasMCL ? (hasPLC ? '4️⃣' : '3️⃣') + ' LCM — 30°, varo/valgo neutro<br>' : '')
            + (hasACL ? (hasPLC && hasMCL ? '5️⃣' : hasPLC || hasMCL ? '4️⃣' : '3️⃣') + ' Lemaire — <strong>EXTENSÃO COMPLETA</strong>, rotação neutra (ÚLTIMO)</div>' : '</div>');
        }

        // Alignment alert for PLC + chronic + varus
        var alignAlert = '';
        if (hasPLC && chron === 'chronic' && bmi) {
          alignAlert = '<div style="margin:8px 0;padding:10px 12px;background:rgba(230,126,34,.1);border:1px solid rgba(230,126,34,.35);border-radius:8px;font-size:12px;line-height:1.6">'
            + '<strong style="color:var(--amber)">⚠ CPL + Crónico — Avaliar alinhamento</strong><br>'
            + 'Se varo mecânico: enxerto CPL não tolera varo (estica e falha). <strong>OSTEOTOMIA VALGIZANTE PRIMEIRO</strong>, reconstrução CPL 2º tempo.</div>';
        }

        var cat = stagingNeeded ? 'lig_staged' : 'lig_surgery';
        var title = (stagingNeeded ? '🔄 Reconstrução Estadiada' : '🔧 Reconstrução Estágio Único') + ' — ' + pattLabel + ' · ' + mlkiClass + schenckRef;

        var body = ctxLine + vascAlert + nerveAlert + amiAlert + alignAlert;

        if (stagingNeeded) {
          var reasons = [];
          if (romFlex < 120) reasons.push('ROM flexão ' + romFlex + '° (<120°)');
          if (tissue === 'edema' || tissue === 'blisters') reasons.push('Tecidos moles comprometidos (' + tissue + ')');
          if (tissue === 'wound') reasons.push('Ferida aberta — desbridamento urgente');
          if (ami === 'santi_2a' || ami === 'santi_2b' || ami === 'santi_3') reasons.push('AMI ' + ami.replace('santi_', '') + ' (≥2)');
          if (bicruciate && hasMCL && hasPLC) reasons.push('KD-IV (4 estruturas)');
          if (vasc === 'intimal') reasons.push('Lesão intimal vascular');

          body += '<div style="margin:10px 0;padding:10px 12px;background:rgba(59,135,123,.08);border:1px solid rgba(59,135,123,.25);border-radius:8px;font-size:12px;line-height:1.7">'
            + '<strong>Razões para estadiamento:</strong> ' + reasons.join('; ') + '.'
            + '<br><br><strong>Estágio 1 (agudo, <3 sem):</strong> Reparação colaterais + fixador externo se necessário. Reabilitação 4-6 semanas → ROM >120° + AMI <2.'

        } else {
          body += '<div style="margin:10px 0;padding:10px 12px;background:rgba(59,135,123,.08);border:1px solid rgba(59,135,123,.25);border-radius:8px;font-size:12px;line-height:1.7">'
            + '<strong>Estágio único recomendado</strong> (LoA 92.3%, Murray BJSM 2024):<br>'
            + 'ROM ≥120° ✓ · Tecidos íntegros ✓ · AMI <2 ✓ · Sem compromisso vascular ✓<br>'
            + 'Timing ideal: 3ª-4ª semana (tecidos capsulares estabilizados).</div>';
        }

        body += graftPlan + tensionSeq;

        body += '<div style="margin:10px 0;padding:10px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:8px;font-size:12px;line-height:1.7">'
          + '<strong>Reabilitação pós-operatória multiligamentar:</strong><br>'

        if (hasSg('noble') || (pat === 'activity' && loc === 'lateral')) ddx.push({
          name: 'Síndrome banda iliotibial', prob: hasSg('noble') ? 'likely' : 'possible',

          exam: 'Diagnóstico clínico. RM se dúvida.'

        if (hasSg('varus') || hasSg('dial')) ddx.push({

          keys: 'Varus stress + rotação ext tibial. Dial +30°: PLC. +30°+90°: PLC+LCP.',

      // ── POSTERIOR ──

          name: 'Rotura LCP', prob: 'likely',

        exam: 'RM mandatória: LCA parcial/completa, meniscos, contusões ósseas, ligamentos.'
      });

      // Fallback: always at least 1 DDx
      if (ddx.length === 0) {
        const fb = {
          medial: { name: 'Gonalgia medial inespecífica', keys: 'Dor medial sem sinais patognomónicos. Ponderar artrose incipiente, meniscal degenerativa, tendinopatia anserina.', exam: 'RX carga Schuss + Rosenberg + RM joelho.' },
          pf: { name: 'Dor anterior do joelho', keys: 'Retropatelar/peripatelar sem sinais específicos. Condromalácia, síndrome PF, tendinopatia.', exam: 'RX axial Merchant + perfil carga. Eco tendão rotuliano.' },
          lateral: { name: 'Gonalgia lateral inespecífica', keys: 'Dor lateral sem sinais patognomónicos. Meniscal, ITB, artrose lateral, PLC ligeiro.', exam: 'RM joelho.' },
          posterior: { name: 'Dor posterior do joelho', keys: 'Quisto Baker, tendinopatia isquiotibial, lesão LCP ligeira.', exam: 'Eco poplítea + RM joelho.' },

        };
        ddx.push({ ...(fb[loc] || fb.diffuse), prob: 'possible' });
      }
      // Sort DDx
      const po = { likely: 0, possible: 1 };
      ddx.sort((a, b) => (po[a.prob] || 1) - (po[b.prob] || 1));

      // Compile exams
      let ex = new Map();
      if (pat === 'mech' || pat === 'inflam' || loc === 'diffuse') ex.set('RX Joelho carga (Schuss+Rosenberg+Perfil)', 'Baseline artrose.');
      ddx.forEach(d => {
        if (d.exam) d.exam.split('. ').forEach(e => {
          let cl = e.replace(/\./g, '').trim();
          if (cl && !ex.has(cl)) ex.set(cl, 'Para: ' + d.name);
        });
      });
      if (pat === 'inflam') {
        ex.set('VS, PCR, Hemograma', 'Marcadores inflamatórios — se elevados: doença activa.');
        ex.set('FR, Anti-CCP', 'Se suspeita AR. Anti-CCP: Se 95%, Sp 98%.');
        ex.set('Ácido úrico', 'Se suspeita gota.');
        ex.set('Artrocentese (se derrame)', 'Celularidade, cristais (gota/pseudogota), cultura. Líquido inflamatório: >2000 cél/mm³.');

      return { ddx, exams: [...ex.entries()].map(([n, w]) => ({ n, w })) };
    }

    // ── CONSTRAINT LEVEL ASSESSMENT (PTJ) ──
    function assessConstraint(a, dd, patCtx) {
      const alerts = [];
      const levels = ['CR_PS', 'CCK', 'HINGE'];
      let minLevel = 0; // 0=CR_PS, 1=CCK, 2=HINGE
      const up = lvl => { const i = levels.indexOf(lvl); if (i > minLevel) minLevel = i; };
      const dev = dd.deviationFromNeutral || 0, absDev = Math.abs(dev);
      const isValgus = dd.isValgus || false, isVarus = dd.isVarus || false;
      var AS = (a.assoc || []).slice();
      const R = a.reduc || 'not_assessed';
      // Auto-derive fixed/recurvatum from ROM
      var romExt = typeof a.rom_ext === 'number' ? a.rom_ext : 0;
      if (romExt > 15 && !AS.includes('fixed')) AS.push('fixed');
      if (romExt < -10 && !AS.includes('recurvatum')) AS.push('recurvatum');
      const ha = v => AS.includes(v);
      const bmi = patCtx.ctx_bmi_val || 0;
      // CCK triggers
      if (isValgus && absDev > 15) { alerts.push({ lv: 'CCK', t: 'Valgo >15° (Ranawat Grau II provável) — risco LCM alongado/incompetente após correcção.' }); up('CCK'); }
      if (isVarus && absDev > 20 && (R === 'fixed' || R === 'partial')) { alerts.push({ lv: 'CCK', t: 'Varo >20° fixo — risco libertação excessiva LCM (instabilidade iatrogénica). Escada de release: osteófitos → LCM profundo + cápsula PM → semimembranoso → pie-crusting LCM superficial. Se LCM incompetente → CCK.' }); up('CCK'); }
      if (ha('hto_prev')) { alerts.push({ lv: 'CCK', t: 'Osteotomia prévia — balanço ligamentar imprevisível (cicatriz altera tensão LCM).' }); up('CCK'); }
      if (ha('inflam_active')) { alerts.push({ lv: 'CCK', t: 'AR destrutiva activa — risco rotura ligamentar espontânea / bone loss. Ponderar CCK ou hinge conforme achado intra-op.' }); up('CCK'); }
      if (bmi >= 40 && absDev > 10) { alerts.push({ lv: 'CCK', t: 'Obesidade mórbida (IMC ≥40) + deformidade >10° — avaliação tensão difícil, CCK protege contra instabilidade VV.' }); up('CCK'); }
      if (ha('post_trauma_plat')) { alerts.push({ lv: 'CCK', t: 'OA pós-traumática c/ afundamento prato tibial — depressão pode comprometer inserções ligamentares.' }); up('CCK'); }
      // HINGE triggers
      if (isValgus && absDev > 20 && R === 'fixed') { alerts.push({ lv: 'HINGE', t: 'Valgo fixo >20° (Ranawat Grau III) — tecidos laterais contraídos, mediais incompetentes. Charneira rotatória.' }); up('HINGE'); }
      if (ha('recurvatum')) { alerts.push({ lv: 'HINGE', t: 'Recurvatum >10° — CR/PS/CCK não têm stop de extensão robusto. Risco luxação posterior. Charneira rotatória obrigatória.' }); up('HINGE'); }
      if (ha('bone_loss')) { alerts.push({ lv: 'HINGE', t: 'Perda óssea epicondilar (AORI ≥2B) — inserções ligamentares comprometidas. Charneira rotatória + stems longos.' }); up('HINGE'); }
      if (ha('multidir_instab')) { alerts.push({ lv: 'HINGE', t: 'Instabilidade multidirecional — gaveta + varo/valgo positivos. Balanço impossível com CR/PS/CCK. Charneira rotatória.' }); up('HINGE'); }
      if (ha('sublux_lat')) { alerts.push({ lv: 'HINGE', t: 'Subluxação lateral da tíbia >1/3 — MCL inexistente + LCL contraído. Charneira rotatória simplifica balanceamento.' }); up('HINGE'); }
      return { level: levels[minLevel], alerts };
    }

      if (!result.alerts.length) return '<div class="constraint-box crps"><strong>✓ Nível de Constrição:</strong> CR/PS standard. Sem sinais de alerta para implantes constrained.</div>';
      const cls = result.level === 'HINGE' ? 'hinge' : 'cck';
